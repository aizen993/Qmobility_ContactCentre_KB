  {q:"I can't renew my Residence permit. What should I do?", a:"<p>If you are unable to renew your Mawaqif Residence parking permit through the Darb App or TAMM platform, please try the following:</p>\n<ul>\n<li>Verify your permit has not already expired (expired permits cannot be renewed; you must apply for a new one)</li>\n\n<li>Make sure you are not attempting renewal on the exact expiry date (wait until after midnight 12:01 AM)</li>\n\n<li>Ensure your tenancy contract and Emirates ID are still valid</li>\n\n<li>Check that your vehicle registration is up to date</li>\n</ul>\n<p>If the issue persists, contact Q Mobility support at <strong>8003009</strong> for assistance.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Resident permits I can't renew my Residence permit. What should I do", id:"FAQ-0247", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Resident Permits"},
  {q:"What are the Residential permit fees by duration?", a:"<table>\n<tr><th>Description</th><th>Fee</th></tr>\n<tr><td>12 months - First Vehicle</td><td class=\"amount\"><span class=\"amount\">800 AED</span></td></tr>\n<tr><td>6 Months - First Vehicle</td><td class=\"amount\"><span class=\"amount\">400 AED</span> </td></tr>\n<tr><td>12 Months - second Vehicle</td><td class=\"amount\"><span class=\"amount\">1200 AED</span> </td></tr>\n<tr><td>6 months - second Vehicle</td><td class=\"amount\"><span class=\"amount\">600 AED</span> </td></tr>\n</table>\n\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Resident permits What are the Residential permit fees by duration", id:"FAQ-0257", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Resident Permits"},
  {q:"How can I apply for a Resident Parking Permit?", a:"<p>You can apply for a Mawaqif Resident Parking Permit through the following channels:</p>\n<p>Darb App</p>\n<ul>\n<li>Sign in to the Darb app</li>\n\n<li>Go to the Mawaqif section on the home page</li>\n\n<li>Select \"Residential Permits\"</li>\n\n<li>Follow the on-screen instructions</li>\n</ul>\n<p>TAMM Platform</p>\n<ul>\n<li>Sign in to TAMM (app or website)</li>\n\n<li>Go to Services &gt; Individuals/Emirati</li>\n\n<li>Select Drive &amp; Transport &gt; Parking Section</li>\n\n<li>Choose \"Issuing a Permit for Residents' Parking\"</li>\n</ul>\n<h3>Required documents: Tenancy contract, electricity &amp; water bill (last 3 months), vehicle ownership proof, and Emirates ID.</h3>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Resident permits How can I apply for a Resident Parking Permit", id:"FAQ-0056", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Resident Permits"},
  {q:"I have changed my current address, and I want to update my residence permit. How can I do?", a:"<p>Yes, you can update your residence permit address by following the steps below:</p>\n<h4>Via Darb App</h4>\n<ol>\n<li>Sign in to the Darb App</li>\n<li>Click the three lines on the top left of the screen</li>\n<li>Select <strong>Mawaqif Permits</strong></li>\n<li>Select the permit you wish to modify</li>\n<li>Tap on the <strong>\"...\"</strong> at the top right corner of the permit</li>\n<li>Choose <strong>\"Edit Address\"</strong></li>\n</ol>\n<h4>Via TAMM</h4>\n<ol>\n<li>Go to <strong>Services</strong></li>\n<li>Select <strong>Individuals / Emirati</strong></li>\n<li>Select <strong>Drive &amp; Transport</strong></li>\n<li>Go to the <strong>Parking</strong> section</li>\n<li>Choose <strong>Modify Residents Parking Permit Data</strong></li>\n</ol>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Resident permits I have changed my current address, and I want to update my residence permit. How", id:"FAQ-0246", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Resident Permits"},
  {q:"I have sold my vehicle and need to cancel the current permit to apply for a new vehicle permit. What should I do?", a:"<p>You can’t cancel the permit directly, but you can modify your current permit to replace the previous vehicle with the new one and it’s free of charge, by following the below steps.</p>\n<p>Darb</p>\n<ul>\n<li>Sign in</li>\n\n<li>Click the three lines on the top left of the screen</li>\n\n<li>Select the permit you wish to modify</li>\n\n<li>Tap on the \"...\" at the top left corner of the permit</li>\n\n<li>Choose \"Edit Vehicle</li>\n</ul>\n<h4>\"TAMM</h4>\n<ul>\n<li>Services</li>\n\n<li>Individuals / Emirati</li>\n\n<li>Drive &amp; Transport</li>\n\n<li>Parking Section</li>\n\n<li>Modify Residents Parking Permit data</li>\n</ul>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Resident permits I have sold my vehicle and need to cancel the current permit to apply for a new ", id:"FAQ-0245", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Resident Permits"},
  {q:"I received a message \"Error: You no longer own this vehicle\", what should I do?", a:"<p>The most common reason is that the vehicle is a company vehicle or belongs to a relative.</p>\n<p>In this case, you need to wait until the permit expires and then apply for a new permit.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Resident permits I received a message \"Error: You no longer own this vehicle\", what should I do", id:"FAQ-0249", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Resident Permits"},
  {q:"How many vehicle permits can I apply?", a:"<table>\n<tr><th>Residence Type</th><th>Nationality</th><th>Max Vehicles</th></tr>\n<tr><td>Apartment</td><td>Expat</td><td><strong>2</strong></td></tr>\n<tr><td>Apartment</td><td>Emirati</td><td><strong>4</strong></td></tr>\n<tr><td>Villa</td><td>Expat</td><td><strong>4</strong></td></tr>\n<tr><td>Villa</td><td>Emirati</td><td><strong>10</strong></td></tr>\n</table>\n<div class=\"info-box\">Eligibility might differ based on the sector and current parking availability.</div>\n<h3>Required Documents</h3>\n<ul>\n<li>Tenancy Contract</li>\n<li>Electricity &amp; Water bill from last 3 months</li>\n<li>Vehicle ownership</li>\n<li>Emirates ID</li>\n</ul>\n<h3>How to Apply</h3>\n<h4>Darb App or Website</h4>\n<ol>\n<li>Sign in</li>\n<li>On the home page, go to the Mawaqif section</li>\n<li>Select the option for applying for Residential Permits</li>\n</ol>\n<h4>TAMM App or Website</h4>\n<ol>\n<li>Sign in</li>\n<li>Services</li>\n<li>Individuals / Emirati</li>\n<li>Drive &amp; Transport</li>\n<li>Parking Section</li>\n<li>Issuing a Permit for Residents' Parking</li>\n</ol>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Resident permits How many vehicle permits can I apply", id:"FAQ-0240", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Resident Permits"},
  {q:"What is the payment fee to issue a resident permit (Payment Fees)?", a:"<p>The fees for issuing a Resident Parking Permit are as follows:</p>\n<table>\n<tr><th>Vehicle</th><th>12 Months</th><th>6 Months</th></tr>\n<tr><td>1st Vehicle</td><td class=\"amount\"><span class=\"amount\">AED 800</span></td><td class=\"amount\"><span class=\"amount\">AED 400</span></td></tr>\n<tr><td>2nd Vehicle</td><td class=\"amount\"><span class=\"amount\">AED 1,200</span></td><td class=\"amount\"><span class=\"amount\">AED 600</span></td></tr>\n<tr><td>Emirati Citizens</td><td colspan=\"2\"><strong>Free</strong></td></tr>\n</table>\n<div class=\"info-box\">Please check the maximum permit quota for each sector, which is determined by the municipality &amp; parking operations team and is regularly updated based on traffic and parking infrastructure occupancy.</div>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Resident permits What is the payment fee to issue a resident permit (Payment Fees)", id:"FAQ-0202", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Resident Permits"},
  {q:"Can I apply for multiple vehicles?", a:"<p>Yes, but restrictions apply based on the number of vehicles registered at the same address.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Resident permits Can I apply for multiple vehicles", id:"FAQ-0060", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Resident Permits"},
  {q:"How many vehicles can be registered under the same apartment?", a:"<p>Residence permit holders: Up to 2 vehicles per apartment contract</p>\n<p>Emirati nationality: Up to 4 vehicles per apartment contract</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Resident permits How many vehicles can be registered under the same apartment", id:"FAQ-0239", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Resident Permits"},
  {q:"How long does it take to receive a resident parking permit?", a:"<h4>Via Darb App</h4>\n<ul>\n<li>Permits are issued upon completion of the payment process</li>\n<li>Attached documents are reviewed within a maximum of <strong>14 business days</strong></li>\n<li>Based on the review, the permit is either <strong>approved</strong> or <strong>cancelled</strong> (without refund of the paid amount)</li>\n</ul>\n<h4>Via TAMM Platform</h4>\n<ul>\n<li>Documents are verified within <strong>2 to 5 business days</strong></li>\n<li>A decision is made to either approve or reject the request</li>\n<li>Fees are only paid <strong>after</strong> the request is approved</li>\n</ul>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Resident permits How long does it take to receive a resident parking permit", id:"FAQ-0057", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Resident Permits"},
  {q:"How do I renew my Resident Permit?", a:"<p>You can renew your permit online via TAMM platform and Darb App. Renewal must be initiated and completed prior to the expiry of the existing permit.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Resident permits How do I renew my Resident Permit", id:"FAQ-0061", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Resident Permits"},
  {q:"I received a message \"Error: no utility account connected to your tenancy contract\", what should I do?", a:"<p>You need to add your residence and select the correct option that matches your contract on the <strong>TAMM platform</strong>:</p>\n<ul>\n<li>Rent Contract (Tawtheeq) + Water and Electricity account in other tenant name</li>\n<li>Rent Contract (Tawtheeq) + Shared Water and Electricity account</li>\n<li>Residency Contract (Court Order / Hotel Apartment / Government Contracts / School Contracts)</li>\n</ul>\n<p>Then fill in the required information and attach the required documents.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Resident permits I received a message \"Error: no utility account connected to your tenancy contra", id:"FAQ-0251", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Resident Permits"},
  {q:"If I apply for a new permit now, what will happen to the remaining days of my current permit?", a:"<p>The start date will automatically start after expiration date of your current permit.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Resident permits If I apply for a new permit now, what will happen to the remaining days of my cu", id:"FAQ-0244", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Resident Permits"},
  {q:"Is there a grace period after a permit expires?", a:"<p>No, there is no grace period after your Mawaqif parking permit has expired. Once the permit expires, parking violations may be issued immediately. To avoid fines, make sure to renew your permit before the expiry date. You can renew up to 30 days before expiration through the Darb App or TAMM platform. If your permit has already expired, you will need to apply for a new permit rather than renewing.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Resident permits Is there a grace period after a permit expires", id:"FAQ-0243", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Resident Permits"},
  {q:"When I apply for renewal, it shows me 1200 AED instead of 800 AED however I have only one vehicle, what should I do?", a:"<p>This usually happens when you're trying to <strong>issue a new permit</strong> instead of renewing your existing one. The system treats a new application as a second vehicle permit, which is why it shows <span class=\"amount\">AED 1,200</span> instead of <span class=\"amount\">AED 800</span>.</p>\n<p>To renew your current permit correctly, please follow these steps:</p>\n<h4>Via Darb App or Website</h4>\n<ol>\n<li>Sign in to your account</li>\n<li>Tap the three lines (☰) on the top left of the screen</li>\n<li>Select <strong>Mawaqif Permits</strong></li>\n<li>Select your current permit, then tap <strong>Renew</strong></li>\n</ol>\n<h4>Via TAMM App or Website</h4>\n<ol>\n<li>Sign in to your account</li>\n<li>Go to <strong>Services</strong></li>\n<li>Select <strong>Individuals / Emirati</strong></li>\n<li>Select <strong>Drive &amp; Transport</strong></li>\n<li>Go to <strong>Parking Section</strong></li>\n<li>Choose <strong>Renewal of Residents Parking Permit</strong></li>\n</ol>\n<div class=\"info-box\">Make sure you select <strong>Renew</strong> on your existing permit rather than applying for a new one. This will ensure you are charged the correct first-vehicle renewal fee.</div>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Resident permits When I apply for renewal, it shows me 1200 AED instead of 800 AED however I have", id:"FAQ-0250", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Resident Permits"},
  {q:"Why is my resident permit (RP) not showing in the renewal section in Darb or TAMM?", a:"<h4>The most common reasons are</h4>\n<p>The permit has already expired. In this case, you need to apply for a new permit.</p>\n<p>You tried to renew it on the expiry date. The permit remains valid until 12:00 AM (midnight). After 12:01 AM, you can apply for a new permit.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Resident permits Why is my resident permit (RP) not showing in the renewal section in Darb or TAM", id:"FAQ-0248", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Resident Permits"},
  {q:"Are there certain conditions for adding visitors' phone numbers to a residential permit?", a:"<p>The residential permit must be for villas and the permit must be active so that the permit owner can add the phone numbers of visitors.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Resident permits Are there certain conditions for adding visitors' phone numbers to a residential", id:"FAQ-0221", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Resident Permits"},
  {q:"Can I apply for a residents' parking permit by requesting an exemption through TAMM?", a:"<p>No , there is no exemption for Resident Parking Permit</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Resident permits Can I apply for a residents' parking permit by requesting an exemption through T", id:"FAQ-0255", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Resident Permits"},
  {q:"Can I issue a Residential permit for a Motorcycle?", a:"<p>Yes you can by following the same steps for the vehicle and same rules and regulations applied on it.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Resident permits Can I issue a Residential permit for a Motorcycle", id:"FAQ-0253", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Resident Permits"},
  {q:"Can I issue a Residential permit for a rented car?", a:"<p>Yes, but the contract must be at least for 6 months and it required NOC (Non objection letter from rented company ).</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Resident permits Can I issue a Residential permit for a rented car", id:"FAQ-0252", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Resident Permits"},
  {q:"Can I issue a Residential permit for a yacht, boat / trailer?", a:"<p>No, there is <strong>no residential permit available</strong> for a yacht, boat, or trailer.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Resident permits Can I issue a Residential permit for a yacht, boat   trailer", id:"FAQ-0254", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Resident Permits"},
  {q:"How can I define the phone numbers of villa visitors through Darb platform?", a:"<p>Using Darb platform on the website or the Mobile App, the user can add the phone numbers of visitors to the active permit for villas with a maximum of 9 numbers by following these steps:</p>\n<p>From Mawaqif permits screen, select Manage Phone Numbers from the list of actions for active villas permits.</p>\n<p>Select on Add a new phone number.</p>\n<p>Enter the required phone number and then press add.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Resident permits How can I define the phone numbers of villa visitors through Darb platform", id:"FAQ-0219", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Resident Permits"},
  {q:"If I don’t have all the required documents to apply for residential permit, what should I do?", a:"<p>You can apply for Limited-Term Permit for Standard Parking. It allows you to park in standard parking only  (non residential - non Villa - non premium parking) anywhere in Abu Dhabi.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Resident permits If I don’t have all the required documents to apply for residential permit, what", id:"FAQ-0256", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Resident Permits"},
  {q:"What  exceptions apply to residential parking permits in different sectors?", a:"<p>Q Mobility Operations teams are constantly reviewing the parking infrastructure and availability in every sector.</p>\n<p>In case of any exceptions, we will notify customers by <strong>SMS</strong>.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Resident permits What  exceptions apply to residential parking permits in different sectors", id:"FAQ-0326", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Resident Permits"},
  {q:"What is the maximum number of visitors' phone numbers that can be added to a residential permit through Darb platform?", a:"<p>There is a maximum of 9 numbers per permit, and the permit owner can delete and add these numbers whenever needed.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Resident permits What is the maximum number of visitors' phone numbers that can be added to a res", id:"FAQ-0220", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Resident Permits"},
  {q:"Who is eligible for a Resident Parking Permit?", a:"<p>Resident permits are available to individuals residing in areas with controlled parking. You will need to provide:</p>\n<ul>\n<li><strong>Proof of residency</strong> (Tawtheeq)</li>\n<li><strong>Vehicle registration</strong> (Mulkiya)</li>\n<li><strong>Valid Emirates ID</strong></li>\n<li><strong>Utility bill</strong></li>\n</ul>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Resident permits Who is eligible for a Resident Parking Permit", id:"FAQ-0201", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Resident Permits"},
  {q:"How can a permit holder add additional visitor phone number to their permit?", a:"<p>Yes. A maximum of <strong>9 phone numbers</strong> can be added under the same permit (villa permits only).</p>\n\n<h4>Option 1 — Via SMS</h4>\n<p>Send an SMS from the owner's number to <strong>3009</strong> with the following format:</p>\n<p><code>ADD 05xxxxxxx E20</code></p>\n\n<h4>Option 2 — Via Darb App or Website</h4>\n<ol>\n<li>Go to the <strong>Mawaqif Permits</strong> screen</li>\n<li>Select <strong>Manage Phone Numbers</strong> from the actions list on your active villa permit</li>\n<li>Click <strong>Add a new phone number</strong></li>\n<li>Enter the required phone number and press <strong>Add</strong></li>\n</ol>\n\n<div class=\"info-box\">The residential permit must be for <strong>villas</strong> and the permit must be <strong>active</strong>.</div>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Resident permits How can a permit holder add additional visitor phone number to their permit", id:"FAQ-0242", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Resident Permits"},
  {q:"Can a customer send visitor SMS using any active Residence permit?", a:"<p>No. SMS for visitor parking is only available for Residence permits of villas.</p>\n<p>A maximum of 10 messages per day can be sent using the following format to 3009:</p>\n<h4>AUH10 000 E20 6</h4>\n<p>Visitor permits allow parking from 2 AM to 8 AM, with a maximum of 6 hours per day.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Resident permits Can a customer send visitor SMS using any active Residence permit", id:"FAQ-0241", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Resident Permits"},
  {q:"What are the fees for residents' parking permits and how many permits are allowed per property?", a:"<h4>Expat Residents — Apartments (Max 2 Permits)</h4>\n<table>\n<tr><th>Permit</th><th>12 Months</th><th>6 Months</th></tr>\n<tr><td>1st Permit</td><td class=\"amount\"><span class=\"amount\">AED 800</span></td><td class=\"amount\"><span class=\"amount\">AED 400</span></td></tr>\n<tr><td>2nd Permit</td><td class=\"amount\"><span class=\"amount\">AED 1,200</span></td><td class=\"amount\"><span class=\"amount\">AED 600</span></td></tr>\n</table>\n\n<h4>Emirati Citizens — Free</h4>\n<table>\n<tr><th>Property Type</th><th>Max Permits</th><th>Duration</th><th>Fee</th></tr>\n<tr><td>Apartment</td><td>4 permits</td><td>6 or 12 months</td><td><strong>Free</strong></td></tr>\n<tr><td>Villa</td><td>10 permits</td><td>6 or 12 months</td><td><strong>Free</strong></td></tr>\n</table>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Resident permits What are the fees for residents' parking permits and how many permits are allowe", id:"FAQ-0211", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Resident Permits"},
  {q:"Who is eligible to issue a resident parking permit?", a:"<p>The owner or tenant of the property can issue parking permits for residents within the parking organization areas or for a family member of the first and second degree.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Resident permits Who is eligible to issue a resident parking permit", id:"FAQ-0210", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Resident Permits"},
  {q:"What is a Limited-Term Permit?", a:"<p>These are permits for all Mawaqif-regulated areas in the Emirate of Abu Dhabi that allow the use of public parking spaces with sidewalks painted in <strong>black and turquoise</strong>.</p>\n<h4>Exclusions</h4>\n<p>Limited-term permits do <strong>not</strong> cover:</p>\n<ul>\n<li><strong>Premium Parking</strong> — any time of the day</li>\n<li><strong>Residential parking</strong> — after 9:00 PM</li>\n<li><strong>Multi-storey parking</strong> — any time of the day (a separate Multi-Storey parking permit is required)</li>\n</ul>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Limited term permit What is a Limited-Term Permit", id:"FAQ-0019", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Limited Term"},
  {q:"What documents are required to apply for a parking permit?", a:"<p>To apply for a limited-term permit, you need:</p>\n<ul>\n<li>Valid <strong>Emirates ID</strong></li>\n<li>Valid <strong>Vehicle Registration</strong> (Mulkiya)</li>\n</ul>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Limited term permit What documents are required to apply for a parking permit", id:"FAQ-0260", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Limited Term"},
  {q:"How long is a Limited-Term Permit valid for?", a:"<p>Limited-term permits are available for the following durations:</p>\n<ul>\n<li><strong>1 Month</strong></li>\n<li><strong>3 Months</strong></li>\n<li><strong>6 Months</strong></li>\n<li><strong>1 Year</strong></li>\n</ul>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Limited term permit How long is a Limited-Term Permit valid for", id:"FAQ-0176", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Limited Term"},
  {q:"What is the process duration (Limited-Term Duration)?", a:"<p>Limited-Term Permits will be issued <strong>immediately</strong> after payment is completed.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Limited term permit What is the process duration (Limited-Term Duration)", id:"FAQ-0157", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Limited Term"},
  {q:"How do I apply for a limited-term permit for standard parking?", a:"<h4>Via Darb App or Website</h4>\n<ol>\n<li>Sign in at <a href=\"https://www.qmobility.ae\" target=\"_blank\">www.qmobility.ae</a></li>\n<li>On the home page, go to the <strong>Mawaqif</strong> section</li>\n<li>Select <strong>Limited-Term Permit for Standard Parking</strong></li>\n</ol>\n<h4>Via TAMM App or Website</h4>\n<ol>\n<li>Sign in at <a href=\"https://www.tamm.abudhabi\" target=\"_blank\">www.tamm.abudhabi</a></li>\n<li>Go to <strong>Services</strong></li>\n<li>Select <strong>Business</strong></li>\n<li>Select <strong>Safety &amp; Mobility</strong></li>\n<li>Select <strong>Parking</strong></li>\n<li>Choose <strong>Issue a Limited-Term Permit for Standard Parking</strong></li>\n</ol>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Limited term permit How do I apply for a limited-term permit for standard parking", id:"FAQ-0258", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Limited Term"},
  {q:"Is it possible to renew a Limited-Term Permit ?", a:"<p>The limited-term permit <strong>cannot be renewed</strong>. However, you can issue a new permit after the expiry of the previous one.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Limited term permit Is it possible to renew a Limited-Term Permit ", id:"FAQ-0180", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Limited Term"},
  {q:"How can I apply for a Limited term permit (How to apply(Channel))?", a:"<p>Customers can apply for the limited permit through Darb App and Tamm Platform.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Limited term permit How can I apply for a Limited term permit (How to apply(Channel))", id:"FAQ-0021", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Limited Term"},
  {q:"Who is eligible to apply for this permit (Eligibility Process)?", a:"<p>Anyone can apply for this permit.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Limited term permit Who is eligible to apply for this permit (Eligibility Process)", id:"FAQ-0032", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Limited Term"},
  {q:"How long is a Limited-Term Permit valid?", a:"<p>Permits are available for durations such as one month, three months, six months, or one year.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Limited term permit How long is a Limited-Term Permit valid", id:"FAQ-0020", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Limited Term"},
  {q:"How much is the payment fee (Payment Fees)?", a:"<p>The fees for a Limited-Term Permit are as follows:</p>\n<table>\n<tr><th>Duration</th><th>Fee</th></tr>\n<tr><td>1 Month</td><td class=\"amount\"><span class=\"amount\">AED 391</span></td></tr>\n<tr><td>3 Months</td><td class=\"amount\"><span class=\"amount\">AED 1,174</span></td></tr>\n<tr><td>6 Months</td><td class=\"amount\"><span class=\"amount\">AED 2,348</span></td></tr>\n<tr><td>12 Months</td><td class=\"amount\"><span class=\"amount\">AED 4,695</span></td></tr>\n</table>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Limited term permit How much is the payment fee (Payment Fees)", id:"FAQ-0026", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Limited Term"},

  {q:"How to appeal a towing fine?", a:"<p>If you believe a fine was issued in error and your vehicle was towed, you can file a grievance online. If the grievance committee accepts your appeal, the vehicle will be released for free, or the amount will be refunded to your bank account or debit/credit card if you made a payment.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Car Pound How to appeal a towing fine", id:"FAQ-0168", page:"faq-maw-pound", cat:"MAWAQIF — Car Pound", subcat:"Car Pound"},
  {q:"What are the terms and conditons for cars that are impounded for long periods?", a:"<p>Cars impounded for more than <strong>six months</strong> are sold at public auction according to the executive regulations of the Parking Law.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Car Pound What are the terms and conditons for cars that are impounded for long periods", id:"FAQ-0164", page:"faq-maw-pound", cat:"MAWAQIF — Car Pound", subcat:"Car Pound"},
  {q:"What are the documents required to release an impounded vehicle?", a:"<p>To release your vehicle, you must present the following ownership documents:</p>\n<ul>\n<li>Owner's Emirates ID</li>\n<li>Copy of the vehicle registration (Mulkiya)</li>\n<li>Possession certificate (for vehicles without plate numbers)</li>\n</ul>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Car Pound What are the documents required to release an impounded vehicle", id:"FAQ-0165", page:"faq-maw-pound", cat:"MAWAQIF — Car Pound", subcat:"Car Pound"},
  {q:"What payment methods are accepted?", a:"<p>Payment can be made <strong>in person</strong> at the Car Pound customer service counter using a <strong>debit/credit card only</strong>.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Car Pound What payment methods are accepted", id:"FAQ-0167", page:"faq-maw-pound", cat:"MAWAQIF — Car Pound", subcat:"Car Pound"},
  {q:"Is there an additional fee if a vehicle is not released on the same day from The CarPound?", a:"<p>If your vehicle is not released on the same day it was impounded, daily storage fees will apply:</p>\n<table>\n<tr><th>Period</th><th>Fee</th></tr>\n<tr><td>First 30 days</td><td class=\"amount\"><span class=\"amount\">AED 100</span> per day</td></tr>\n<tr><td>Next 5 months (months 2–6)</td><td class=\"amount\"><span class=\"amount\">AED 500</span> per month</td></tr>\n<tr><td>After 6 months</td><td>Storage fees stop — vehicle will be auctioned</td></tr>\n</table>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Car Pound Is there an additional fee if a vehicle is not released on the same day from The", id:"FAQ-0163", page:"faq-maw-pound", cat:"MAWAQIF — Car Pound", subcat:"Car Pound"},
  {q:"What are the towing yards working hours?", a:"<table>\n<tr><th>Towing Yard</th><th>Operating Hours</th><th>Days</th></tr>\n<tr><td><strong>Al Karama Pound</strong></td><td>24 hours</td><td>7 days a week</td></tr>\n<tr><td><strong>Al Ain Pound</strong></td><td>8:00 AM to 12:00 Midnight</td><td>7 days a week</td></tr>\n<tr><td><strong>Musaffah Pound</strong></td><td>8:00 AM to 12:00 Midnight</td><td>7 days a week</td></tr>\n</table>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Car Pound What are the towing yards working hours", id:"FAQ-0169", page:"faq-maw-pound", cat:"MAWAQIF — Car Pound", subcat:"Car Pound"},
  {q:"What is the towing fee (Towing Fees)?", a:"<p>The standard towing fee is <span class=\"amount\">AED 500</span> per vehicle. This fee is mandated by law, <strong>cannot be waived</strong>, and must be paid in full before the vehicle can be released from the impound yard.</p>\n<p>Additional daily storage fees may also apply if the vehicle is not collected promptly.</p>\n<p>Payment can be made at the impound yard.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Car Pound What is the towing fee (Towing Fees)", id:"FAQ-0011", page:"faq-maw-pound", cat:"MAWAQIF — Car Pound", subcat:"Car Pound"},
  {q:"Where are the towing yards location (Yard's locations)?", a:"<p>There are three towing yard locations across Abu Dhabi and Al Ain:</p>\n<table>\n<tr><th>Towing Yard</th><th>Location</th></tr>\n<tr><td><strong>Al Karama Car Pound</strong></td><td><a href=\"https://maps.app.goo.gl/5sdreQ9627HRjrMt7\" target=\"_blank\">View on Google Maps</a></td></tr>\n<tr><td><strong>Al Ain Car Pound</strong></td><td><a href=\"https://maps.app.goo.gl/46xQZzxhsZiCZ4Ki7\" target=\"_blank\">View on Google Maps</a></td></tr>\n<tr><td><strong>Musaffah Car Pound</strong></td><td><a href=\"https://maps.app.goo.gl/eXe2XcwAuuaU6nJC9\" target=\"_blank\">View on Google Maps</a></td></tr>\n</table>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Car Pound Where are the towing yards location (Yard's locations)", id:"FAQ-0007", page:"faq-maw-pound", cat:"MAWAQIF — Car Pound", subcat:"Car Pound"},

  {q:"Is there any insurance for parking in a mall?", a:"<p>The mall does <strong>not</strong> assume responsibility for damage or theft of vehicles. Users park at their own risk.</p>\n<p>Please refer to the Terms and Conditions for Parking at Abu Dhabi Mall.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Private Parking Is there any insurance for parking in a mall", id:"FAQ-0281", page:"faq-priv-general", cat:"Private Parking", subcat:"Private Parking"},
  {q:"How can I contact customer support?", a:"<p>For support, please contact customer care at <a href=\"/cdn-cgi/l/email-protection#98fbedebecf7f5fdeab6fbf9eafdd8e9f5f7faf1f4f1ece1b6f9fd\"><span class=\"__cf_email__\" data-cfemail=\"7615030502191b1304581517041336071b19141f1a1f020f581713\">[email&#160;protected]</span></a>.</p>\n<p>Or call <strong>8003009</strong>.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Private Parking How can I contact customer support", id:"FAQ-0282", page:"faq-priv-general", cat:"Private Parking", subcat:"Private Parking"},
  {q:"What is the People of Determination Parking Permit Inquiry System?", a:"<p>This is a system designed to manage parking spaces for People of Determination in malls and private entities, ensuring optimal use of the parking spaces.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Private Parking What is the People of Determination Parking Permit Inquiry System", id:"FAQ-0286", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"POD Permits"},
  {q:"What are the delivery vehicle parking hours?", a:"<p>This is dependent on each individual private parking operator's rules, however in most instances delivery vehicles can park for free between <strong>6:00 AM and 8:00 AM</strong>.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Private Parking What are the delivery vehicle parking hours", id:"FAQ-0284", page:"faq-priv-general", cat:"Private Parking", subcat:"Private Parking"},
  {q:"At Abu Dhabi Mall, are there designated areas for electric vehicle (EV) parking with charging stations?", a:"<p>Yes, there are designated parking spaces for electric vehicles, which include charging stations.</p>\n<p>Terms and Conditions for Parking at Abu Dhabi Mall.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Private Parking At Abu Dhabi Mall, are there designated areas for electric vehicle (EV) parking ", id:"FAQ-0276", page:"faq-priv-general", cat:"Private Parking", subcat:"Private Parking"},
  {q:"Are there any specific rules for vehicles at Abu Dhabi Mall?", a:"<p>Vehicles without license plates are not allowed to park, and children’s cars or bikes are not allowed in parking spaces.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Private Parking Are there any specific rules for vehicles at Abu Dhabi Mall", id:"FAQ-0275", page:"faq-priv-general", cat:"Private Parking", subcat:"Private Parking"},
  {q:"Who is eligible for premium parking permits?", a:"<p>There is <strong>no permit available</strong> for Premium parking.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Private Parking Who is eligible for premium parking permits", id:"FAQ-0266", page:"faq-priv-general", cat:"Private Parking", subcat:"Private Parking"},
  {q:"What happens if I park in an unauthorized area or block charging stations?", a:"<p>Parking in unauthorized areas, especially near charging stations, can result in <strong>fines</strong> or <strong>vehicle towing</strong>.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Private Parking What happens if I park in an unauthorized area or block charging stations", id:"FAQ-0280", page:"faq-priv-general", cat:"Private Parking", subcat:"Private Parking"},
  {q:"What happens if I park outside designated areas?", a:"<p>Vehicles parked outside designated spaces may be fined and towed at the owner's expense.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Private Parking What happens if I park outside designated areas", id:"FAQ-0278", page:"faq-priv-general", cat:"Private Parking", subcat:"Private Parking"},
  {q:"What happens if someone parks more than 13 hours at Abu Dhabi Mall?", a:"<p>If someone stays over 13 hours and leaves the mall and comes back after a short break, they would need to pay for parking again. They can access free parking during normal visiting hours (8:00 AM to 2:00 AM).</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Private Parking What happens if someone parks more than 13 hours at Abu Dhabi Mall", id:"FAQ-0268", page:"faq-priv-general", cat:"Private Parking", subcat:"Private Parking"},
  {q:"Can I park in designated spaces for People of Determination?", a:"<p>You can only park in these designated spaces if you have a valid <strong>People of Determination permit</strong>. A permit is required at all times.</p>\n<p>Failure to comply may result in the <strong>levying of fines</strong> and/or <strong>vehicle impoundment</strong>.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Private Parking Can I park in designated spaces for People of Determination", id:"FAQ-0279", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"POD Permits"},
  {q:"How can i apply for POD permit?", a:"<p>You can apply for it from TAMM platform by following the below steps:</p>\n<p>TAMM app or website (TAMM - Log in Page):</p>\n<p>Sign In</p>\n<p>Services.</p>\n<p>Individuals / Emriti</p>\n<p>Social Care.</p>\n<p>PoD Support.</p>\n<p>Issuing a Parking Permit for People of Determination.</p>\n<p>Or by going to Zayed Higher organization for people of determination website and following the below steps:</p>\n<p>Go to Zayed Higher Organization then select apply for parking permit for POD and he will transferee you to fill the form in TAMM.</p>\n<h3>Required documents for Citizen POD</h3>\n<p>Emirates ID of POD person.</p>\n<p>Evidence of first- and second-degree kinship (if he is not the owner of the vehicle).</p>\n<p>Official letter from entities requesting to issue parking permit with POD details and vehicle details and used by the person of determination.</p>\n<p>Rental contract for a rented vehicle, or FAZZA contract.</p>\n<h3>Required Documents for Senior citizen POD</h3>\n<p>This service does not require any documents.</p>\n<h3>Required Documents for Parking Permit for Visitors and Tourists with Determination</h3>\n<p>The following documents must be submitted during the application.</p>\n<p>People of Determination card or People of Determination parking permit for tourists and visitors issued by their country.</p>\n<p>Rental contract for rented vehicle.</p>\n<p>Copy of vehicle licence registered outside UAE (Driving licence ).</p>\n<p>Link for Citizen POD: <a href=\"https://www.tamm.abudhabi/en/life-events/individual/SupportCommunityEnvironment/PoD-Support/ApplyforaParkingPermitforPeopleofDetermination.\" target=\"_blank\">https://www.tamm.abudhabi/en/life-events/individual/SupportCommunityEnvironment/PoD-Support/ApplyforaParkingPermitforPeopleofDetermination.</a></p>\n<p>Link for Senior citizen POD: <a href=\"https://www.tamm.abudhabi/en/life-events/individual/SupportCommunityEnvironment/PoD-Support/IssueParkingPermitforPeopleofDeterminationforSeniorEmiratis.\" target=\"_blank\">https://www.tamm.abudhabi/en/life-events/individual/SupportCommunityEnvironment/PoD-Support/IssueParkingPermitforPeopleofDeterminationforSeniorEmiratis.</a></p>\n<p>Link for Parking Permit for Visitors and Tourists with Determination: <a href=\"https://www.tamm.abudhabi/en/life-events/individual/SupportCommunityEnvironment/PoD-Support/IssueParkingPermitforPeopleofDeterminationforVisitorsandTourists.\" target=\"_blank\">https://www.tamm.abudhabi/en/life-events/individual/SupportCommunityEnvironment/PoD-Support/IssueParkingPermitforPeopleofDeterminationforVisitorsandTourists.</a></p>\n<p>Link for Renewal of POD card: <a href=\"https://www.tamm.abudhabi/en/life-events/individual/SupportCommunityEnvironment/PoD-Support/RenewaParkingPermitforPeopleofDetermination.\" target=\"_blank\">https://www.tamm.abudhabi/en/life-events/individual/SupportCommunityEnvironment/PoD-Support/RenewaParkingPermitforPeopleofDetermination.</a></p>\n<p>And for any additional inquiries related to POD permits you needs to contact Zayed Higher organization for people of determination.</p>\n<p>Website: <a href=\"https://www.za.gov.ae/\" target=\"_blank\">https://www.za.gov.ae/</a></p>\n<p>Via Email: <a href=\"/cdn-cgi/l/email-protection#4e272028210e34262160292138602f2b\"><span class=\"__cf_email__\" data-cfemail=\"573e393138172d3f3879303821793632\">[email&#160;protected]</span></a>.</p>\n<p>Via Phone: <strong>800 555</strong></p>\n<p>Location: 91, Al Ri'ayah St, Shakhbout City, Abu Dhabi 23647.</p>\n<p>People of Determination Parking Permit Inquiry System.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Private Parking How can i apply for POD permit", id:"FAQ-0285", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"POD Permits"},
  {q:"How can visitors pay for parking?", a:"<p>Visitors can pay by scanning the QR code available on-site or by using the mall’s payment methods or visit <a href=\"https://freeflow.qmobility.ae.\" target=\"_blank\">https://freeflow.qmobility.ae.</a></p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Private Parking How can visitors pay for parking", id:"FAQ-0274", page:"faq-priv-general", cat:"Private Parking", subcat:"Private Parking"},
  {q:"What about weekends and public holidays?", a:"<p>Parking is free on weekends (Saturday &amp; Sunday) and public holidays from 6:00 AM to 2:00 AM.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Private Parking What about weekends and public holidays", id:"FAQ-0283", page:"faq-priv-general", cat:"Private Parking", subcat:"Private Parking"},
  {q:"What are the rules for parking at Abu Dhabi Mall?", a:"<p>Vehicles must have license plates</p>\n<p>No vehicle should be left running for more than 30 minutes or unattended.</p>\n<p>Only designated areas are available for pick-up and drop-off.</p>\n<p>Stopping at entry and exit transit zones is prohibited.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Private Parking What are the rules for parking at Abu Dhabi Mall", id:"FAQ-0277", page:"faq-priv-general", cat:"Private Parking", subcat:"Private Parking"},
  {q:"Is there free parking for People of Determination?", a:"<p>Yes, valid People of Determination parking permits allow free parking at designated spaces.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Private Parking Is there free parking for People of Determination", id:"FAQ-0271", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"POD Permits"},
  {q:"What are the free parking hours at Abu Dhabi Mall?", a:"<p>The first 3 hours per day are free during Abu Dhabi Mall’s visiting hours (8:00 AM to 2:00 AM).</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Private Parking What are the free parking hours at Abu Dhabi Mall", id:"FAQ-0272", page:"faq-priv-general", cat:"Private Parking", subcat:"Private Parking"},
  {q:"What are the parking payment methods at Abu Dhabi Mall?", a:"<p>Visitors can pay for parking by <strong>scanning a QR code</strong>.</p>\n<p>For complete hassle-free parking, <strong>DARB wallet auto deduction</strong> will be introduced soon.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Private Parking What are the parking payment methods at Abu Dhabi Mall", id:"FAQ-0267", page:"faq-priv-general", cat:"Private Parking", subcat:"Private Parking"},
  {q:"What happens if I don’t pay for parking on time?", a:"<p>If you do not pay for parking, you will receive a <strong>fine</strong> as per applicable regulations.</p>\n<p>Visitors are required to pay parking fees to avoid fines. Fines will be applied after <strong>24 business hours</strong>.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Private Parking What happens if I don’t pay for parking on time", id:"FAQ-0273", page:"faq-priv-general", cat:"Private Parking", subcat:"Private Parking"},
  {q:"What is the parking rate after the free hours?", a:"<p>The rate is <span class=\"amount\">AED 10</span> per hour or part of an hour.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Private Parking What is the parking rate after the free hours", id:"FAQ-0270", page:"faq-priv-general", cat:"Private Parking", subcat:"Private Parking"},
];

// Mushrif Mall extra FAQs
var MUSHRIF_DATA = [
  {q:"What is the Free Flow Paid Parking system at Mushrif Mall?", a:`<p>The system is an <strong>AI-powered, fully automated parking solution</strong> that allows vehicles to enter and exit without stopping. There are no boom gates or ticket machines.</p><ul><li>Operating hours are <strong>6:00 AM to 2:00 AM</strong></li><li>Cameras read your license plate on entry and exit</li><li>For Darb-registered vehicles: fees are <strong>auto-deducted</strong> from the Darb wallet</li><li>For non-Darb-registered vehicles: pay within <strong>24 hours after exit</strong> via <a href="https://freeflow.qmobility.ae" target="_blank">freeflow.qmobility.ae</a> or scan the QR code</li></ul><div class="footer"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>`, id:"MM-001", page:"faq-mushrif", cat:"Private Parking", subcat:"Mushrif Mall"},
  {q:"How are parking fees paid at Mushrif Mall?", a:`<p><strong>For Darb-registered vehicles:</strong> parking fees are automatically deducted from the Darb wallet.</p><p><strong>For non-Darb-registered vehicles:</strong> payment must be completed within <strong>24 hours after exit</strong> via:</p><ul><li><a href="https://freeflow.qmobility.ae" target="_blank">freeflow.qmobility.ae</a></li><li>Scanning the QR code</li></ul><div class="info-box">If the Darb wallet balance is insufficient, the customer must top up within 24 hours after exit to avoid fines.</div><div class="footer"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>`, id:"MM-002", page:"faq-mushrif", cat:"Private Parking", subcat:"Mushrif Mall"},
  {q:"Do I need to download an app to use Mushrif Mall parking?", a:`<p>Darb-registered vehicles benefit from automatic deduction through the Darb wallet, so the vehicle should be registered and the wallet should have sufficient balance.</p><p>Non-Darb-registered vehicles can still park, but the customer must pay within <strong>24 hours after exit</strong> through the QR code or <a href="https://freeflow.qmobility.ae" target="_blank">freeflow.qmobility.ae</a>.</p><div class="footer"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>`, id:"MM-003", page:"faq-mushrif", cat:"Private Parking", subcat:"Mushrif Mall"},
  {q:"Is there a free parking period at Mushrif Mall?", a:`<p>Yes. The <strong>first 3 hours are free once per day</strong>, excluding overnight parking.</p><div class="info-box">The free period does not cover overnight parking from 2:00 AM to 6:00 AM.</div><div class="footer"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>`, id:"MM-004", page:"faq-mushrif", cat:"Private Parking", subcat:"Mushrif Mall"},
  {q:"What are the parking tariffs at Mushrif Mall?", a:`<p>Mushrif Mall operating hours are <strong>6:00 AM to 2:00 AM</strong>.</p><table><tr><th>Duration</th><th>Fee</th></tr><tr><td>First 3 hours</td><td class="amount">Free once per day, excluding overnight parking</td></tr><tr><td>From 3 to 7 hours</td><td class="amount">AED 10 per hour or part thereof</td></tr><tr><td>More than 7 hours</td><td class="amount">Capped at AED 80 per day per visit</td></tr><tr><td>Overnight parking, 2:00 AM to 6:00 AM</td><td class="amount">AED 250</td></tr><tr><td>Saturday, Sunday, and public holidays</td><td class="amount">Free, excluding overnight parking</td></tr></table><div class="footer"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>`, id:"MM-005", page:"faq-mushrif", cat:"Private Parking", subcat:"Mushrif Mall"},
  {q:"What is the maximum daily parking fee at Mushrif Mall?", a:`<p>For parking over 7 hours, Mushrif Mall is capped at <span class="amount">AED 80</span> per day per visit during the regular operating period.</p><div class="info-box">This cap excludes overnight parking from 2:00 AM to 6:00 AM, which is charged separately at AED 250.</div><div class="footer"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>`, id:"MM-006", page:"faq-mushrif", cat:"Private Parking", subcat:"Mushrif Mall"},
  {q:"Can I park overnight (after 2:00 AM) at Mushrif Mall?", a:`<p>Overnight parking at Mushrif Mall from <strong>2:00 AM to 6:00 AM</strong> is charged <span class="amount">AED 250</span>.</p><div class="footer"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>`, id:"MM-007", page:"faq-mushrif", cat:"Private Parking", subcat:"Mushrif Mall"},
  {q:"Is parking free on weekends and public holidays at Mushrif Mall?", a:`<p>Yes. Parking is free on <strong>Saturdays, Sundays, and public holidays</strong>, excluding overnight parking.</p><div class="info-box">Overnight parking from 2:00 AM to 6:00 AM is still charged AED 250.</div><div class="footer"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>`, id:"MM-008", page:"faq-mushrif", cat:"Private Parking", subcat:"Mushrif Mall"},
  {q:"What happens if there is insufficient balance in the Darb wallet at Mushrif Mall?", a:`<p>For Darb-registered vehicles, customers must ensure sufficient Darb wallet balance. If the balance is insufficient, they must top up within <strong>24 hours after exit</strong> to avoid fines.</p><div class="footer"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>`, id:"MM-009", page:"faq-mushrif", cat:"Private Parking", subcat:"Mushrif Mall"},
  {q:"How can non-Darb registered vehicles pay for parking at Mushrif Mall?", a:`<p>Non-Darb-registered vehicles must settle parking fees within <strong>24 hours after exit</strong> through the QR code or <a href="https://freeflow.qmobility.ae" target="_blank">freeflow.qmobility.ae</a> to avoid fines.</p><div class="footer"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>`, id:"MM-010", page:"faq-mushrif", cat:"Private Parking", subcat:"Mushrif Mall"},
  {q:"Who can I contact for Mushrif Mall parking inquiries?", a:`<p>For Mushrif Mall parking inquiries, customers may call <strong>800 3009</strong>. For complaints or cases that need follow-up, ask the customer to use the <strong>Darb App</strong> or <strong>Darb X App</strong> complaint/support section.</p><div class="footer"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>`, id:"MM-011", page:"faq-mushrif", cat:"Private Parking", subcat:"Mushrif Mall"},
];


// ===== NEW FAQs — Synced from official qmobility.ae (May 2026) =====
var OFFICIAL_NEW_FAQS = [
  // DARB — Al Qurm & Ghantout (24/7 gates — missing from original KB)
  {q:"Where are the Al Qurm and Ghantout toll gates located?", a:"<p><strong>Al Qurm Toll Gate:</strong> Located on Wahat Al Karama Street at the entrance and exit of Sheikh Zayed Road.</p><p><strong>Ghantout Toll Gate:</strong> Located on Sheikh Maktoum bin Rashid Road in the Ghantout area.</p><div class=\"info-box\"><strong>These two gates operate 24 hours a day, 7 days a week — including Sundays and public holidays.</strong></div><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"", a_ar:"", kw:"Toll General Information Al Qurm Ghantout toll gate location 24 7", id:"FAQ-AQGH-001", page:"faq-darb-general", cat:"DARB — General", subcat:"Toll Gates"},
  {q:"What are the alternative routes to avoid Al Qurm and Ghantout toll gates?", a:"<ul><li><strong>Al Qurm Toll Gate (Wahat Al Karama St):</strong> Drivers may use Sheikh Rashid bin Saeed Street or Al Khaleej Al Arabi Street as alternative routes.</li><li><strong>Ghantout Toll Gate (Sheikh Maktoum bin Rashid Road):</strong> Motorists can use Sheikh Mohammed bin Rashid Al Maktoum Road as an alternative route.</li></ul><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"", a_ar:"", kw:"Toll General Information Al Qurm Ghantout alternative route bypass", id:"FAQ-AQGH-002", page:"faq-darb-general", cat:"DARB — General", subcat:"Toll Gates"},
  {q:"Is there a speed limit on the toll gates?", a:"<p>Speed limits at toll gates are governed by the regulations of the competent authority — <strong>Abu Dhabi Police General Command</strong>. Standard road speed limits apply when passing through toll gates.</p><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"", a_ar:"", kw:"Toll General Information speed limit toll gate", id:"FAQ-SPD-001", page:"faq-darb-general", cat:"DARB — General", subcat:"General Info"},
  {q:"What are the peak times for the 4 main toll gates during Ramadan?", a:"<p>During Ramadan, toll fees apply at different hours. Official peak hours are announced through Q Mobility's official channels.</p><p><strong>Al Qurm and Ghantout</strong> gates remain operational <strong>24 hours a day, 7 days a week</strong> throughout Ramadan.</p><div class=\"info-box\">Check <a href=\"https://www.qmobility.ae\" target=\"_blank\">qmobility.ae</a> for the latest Ramadan schedule.</div><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"", a_ar:"", kw:"Toll General Information Ramadan peak hours toll gate", id:"FAQ-RAM-001", page:"faq-darb-general", cat:"DARB — General", subcat:"General Info"},

  // DARB — Establishment registration
  {q:"Can an establishment register multiple vehicles at once?", a:"<p>Yes. Establishment accounts can click <strong>\"Register All Vehicles\"</strong> on the vehicles page, provided the wallet balance is sufficient to cover all registration fees.</p><p>Note: A separate account is required for each branch.</p><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"", a_ar:"", kw:"Toll Registration establishment register multiple vehicles bulk", id:"FAQ-EST-001", page:"faq-darb-reg", cat:"DARB — Registration", subcat:"Registration"},

  // Mawaqif — MSCP
  {q:"How does the Multi-Storey Car Park (MSCP) work?", a:"<p>Multi-storey public parking is available in some areas of Abu Dhabi Island. The system uses <strong>entrance and exit gates with cameras or ticket readers</strong>:</p><ol><li>Vehicle information is recorded electronically on entry</li><li>Park on any floor</li><li>On departure, the time is calculated and payment is made at a toll collection device</li><li>The gate opens automatically upon payment</li></ol><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"", a_ar:"", kw:"Parking MSCP Multi Story Car Park how does it work", id:"FAQ-MSCP-001", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"MSCP"},
  {q:"How much does it cost to park in a Multi-Storey Car Park (MSCP)?", a:"<p>The rate is <span class=\"amount\">AED 2 per hour</span>, capped at <span class=\"amount\">AED 15 for 24 hours</span>.</p><div class=\"info-box\">Parking fees apply on weekends and public holidays as well.</div><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"", a_ar:"", kw:"Parking MSCP Multi Story Car Park cost fee rate", id:"FAQ-MSCP-002", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"MSCP"},
  {q:"Are there monthly subscriptions for Multi-Storey Car Parks (MSCP)?", a:"<table><tr><th>Duration</th><th>Fee</th></tr><tr><td>3 Months</td><td class=\"amount\">AED 1,369</td></tr><tr><td>6 Months</td><td class=\"amount\">AED 2,738</td></tr><tr><td>1 Year</td><td class=\"amount\">AED 5,475</td></tr></table><p>Permits are issued immediately. Renewal must be completed before the current permit expires. Anyone can apply.</p><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"", a_ar:"", kw:"Parking MSCP Multi Story Car Park monthly subscription permit fee", id:"FAQ-MSCP-003", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"MSCP"},
  {q:"Are there special parking spots in multi-storey car parks?", a:"<p>Yes. There are designated spots for <strong>People of Determination</strong> and <strong>women drivers</strong> in multi-storey car parks. These spots are clearly marked and reserved.</p><p>Wheelchairs are available at the Control Room.</p><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"", a_ar:"", kw:"Parking MSCP Multi Story Car Park People of Determination women spots", id:"FAQ-MSCP-004", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"MSCP"},

  // Mawaqif — Commercial Permits (new category)
  {q:"What is a Commercial Parking Permit?", a:"<p>A Commercial Permit allows businesses to apply for various parking services including:</p><ul><li>Parking reservation for construction &amp; infrastructure maintenance</li><li>Removal of PDM &amp; Mawaqif signage</li><li>Parking reservation for charity campaigns</li><li>Parking basement extension</li><li>Parking space removal</li><li>Sidewalk use for maintenance purposes</li><li>Parking reservation for eligible entities</li></ul><p>Applications are submitted through the <strong>TAMM platform</strong>.</p><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"", a_ar:"", kw:"Parking Commercial Permit what is it business tamm", id:"FAQ-COM-001", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Commercial Permits"},
  {q:"How much do Commercial Parking Permits cost?", a:"<table><tr><th>Permit Type</th><th>Fee</th></tr><tr><td>Request submission fee (non-government)</td><td class=\"amount\">AED 200</td></tr><tr><td>Parking Reservation — Government, per space, per day</td><td class=\"amount\">AED 55</td></tr><tr><td>Parking Reservation — Government, per space, per 6 months</td><td class=\"amount\">AED 10,000</td></tr><tr><td>Parking Reservation — Government, per space, per year</td><td class=\"amount\">AED 20,000</td></tr><tr><td>Parking Reservation — Private, per space, per day</td><td class=\"amount\">AED 85</td></tr><tr><td>Parking Reservation — Private, per space, per 6 months</td><td class=\"amount\">AED 15,000</td></tr><tr><td>Parking Reservation — Private, per space, per year</td><td class=\"amount\">AED 30,000</td></tr><tr><td>Removing machine or signboard</td><td class=\"amount\">AED 2,000</td></tr></table><p>Processing takes <strong>3 working days</strong> once all documents and payment are provided.</p><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"", a_ar:"", kw:"Parking Commercial Permit fees cost government private", id:"FAQ-COM-002", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Commercial Permits"},

  // Mawaqif — Car Pound
  {q:"What are the towing yards' working hours?", a:"<table><tr><th>Yard</th><th>Hours</th></tr><tr><td><strong>Al Karama Car Pound</strong></td><td>24 hours, 7 days a week</td></tr><tr><td><strong>Al Ain Car Pound</strong></td><td>8:00 AM – 12:00 AM (midnight), 7 days a week</td></tr><tr><td><strong>Musaffah Car Pound</strong></td><td>8:00 AM – 12:00 AM (midnight), 7 days a week</td></tr></table><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"", a_ar:"", kw:"Parking Car Pound towing yard hours working times", id:"FAQ-TOW-001", page:"faq-maw-pound", cat:"MAWAQIF — Car Pound", subcat:"Car Pound"},
  {q:"What is the towing fee and daily storage charge?", a:"<p>The towing fee is <span class=\"amount\">AED 500</span>.</p><p>If the vehicle is not released on the same day, a daily storage fee applies:</p><ul><li><strong>AED 100 per day</strong> for the first 30 days</li><li><strong>AED 500 per month</strong> for the next 5 months</li><li>After 6 months: storage fees stop, and the vehicle may be sold at public auction</li></ul><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"", a_ar:"", kw:"Parking Car Pound towing fee storage daily charge", id:"FAQ-TOW-002", page:"faq-maw-pound", cat:"MAWAQIF — Car Pound", subcat:"Car Pound"},
  {q:"What payment methods are accepted at the car pound?", a:"<p>Payment can only be made <strong>in person</strong> at the pound customer service using a <strong>credit card only</strong>. Cash is not accepted.</p><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"", a_ar:"", kw:"Parking Car Pound payment methods credit card cash", id:"FAQ-TOW-003", page:"faq-maw-pound", cat:"MAWAQIF — Car Pound", subcat:"Car Pound"},

  // Mawaqif — Paid Public Parking
  {q:"What are the public parking charges in Abu Dhabi?", a:"<table><tr><th></th><th>Standard Parking</th><th>Premium Parking</th></tr><tr><td><strong>Colors</strong></td><td>Black &amp; Blue</td><td>White &amp; Blue</td></tr><tr><td><strong>Rate</strong></td><td>AED 2/hr (max AED 15/24h)</td><td>AED 3/hr (max 4 hours stay)</td></tr><tr><td><strong>Hours</strong></td><td>8 AM – Midnight</td><td>8 AM – Midnight</td></tr><tr><td><strong>Free days</strong></td><td colspan=\"2\">Sundays &amp; public holidays</td></tr></table><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"", a_ar:"", kw:"Parking Paid Public Parking charges rates standard premium", id:"FAQ-PPP-001", page:"faq-maw-hours", cat:"MAWAQIF — Parking", subcat:"Parking Rates"},
  {q:"How do I pay for public parking?", a:"<p>You can pay for public parking using:</p><ul><li><strong>DARB mobile app</strong></li><li><strong>Parking Meters</strong> (accept coins, bank cards, and rechargeable cards)</li><li><strong>SMS</strong></li></ul><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"", a_ar:"", kw:"Parking Paid Public Parking how to pay app meter SMS", id:"FAQ-PPP-002", page:"faq-maw-hours", cat:"MAWAQIF — Parking", subcat:"Payment Methods"},
  {q:"How can I extend a parking ticket?", a:"<p>You can extend your ticket <strong>before it expires</strong>, after receiving a message that your ticket is about to expire.</p><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"", a_ar:"", kw:"Parking Paid Public Parking extend ticket", id:"FAQ-PPP-003", page:"faq-maw-hours", cat:"MAWAQIF — Parking", subcat:"Payment Methods"},

  // ===== POD Permits — Mawaqif (properly tagged) =====
  {q:"What is the People of Determination (POD) Parking Permit?", a:"<p>The POD Parking Permit allows People of Determination to park in <strong>designated POD spaces</strong> across Abu Dhabi free of charge.</p><ul><li>For <strong>Abu Dhabi plate numbers</strong>: the POD card is linked to the vehicle — no physical card display needed</li><li>For <strong>other Emirates</strong>: the physical POD card must be <strong>visible at all times</strong></li></ul><div class=\"info-box\">For Mawaqif parking, <strong>no application is needed</strong> — the exemption is automatically linked to the POD card holder's vehicle.</div><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"", a_ar:"", kw:"POD People of Determination parking permit what is mawaqif exemption", id:"FAQ-POD-001", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"POD Permits"},
  {q:"How do I get a POD card to apply for a parking permit?", a:"<p>You first need to obtain your <strong>People of Determination (POD) Card</strong> from one of the following:</p><ul><li><strong>Zayed Higher Organization</strong> — <a href=\"https://www.za.gov.ae/\" target=\"_blank\">za.gov.ae</a> | Phone: 800 555</li><li><strong>Ministry of Community Empowerment</strong></li></ul><p>Once you have the POD card, you can proceed with the parking permit application through TAMM.</p><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"", a_ar:"", kw:"POD People of Determination card how to get Zayed Higher Organization apply", id:"FAQ-POD-002", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"POD Permits"},
  {q:"How do I apply for a Mawaqif POD parking permit?", a:"<h4>Via TAMM App or Website</h4><ol><li>Sign in at <a href=\"https://www.tamm.abudhabi\" target=\"_blank\">tamm.abudhabi</a></li><li>Services → Individuals / Emirati</li><li>Social Care → PoD Support</li><li>Select <strong>Issuing a Parking Permit for People of Determination</strong></li></ol><h4>Quick Links</h4><ul><li><a href=\"https://www.tamm.abudhabi/en/life-events/individual/SupportCommunityEnvironment/PoD-Support/ApplyforaParkingPermitforPeopleofDetermination\" target=\"_blank\">Citizen POD Permit</a></li><li><a href=\"https://www.tamm.abudhabi/en/life-events/individual/SupportCommunityEnvironment/PoD-Support/IssueParkingPermitforPeopleofDeterminationforSeniorEmiratis\" target=\"_blank\">Senior Citizen POD Permit</a></li><li><a href=\"https://www.tamm.abudhabi/en/life-events/individual/SupportCommunityEnvironment/PoD-Support/IssueParkingPermitforPeopleofDeterminationforVisitorsandTourists\" target=\"_blank\">Visitors & Tourists POD Permit</a></li><li><a href=\"https://www.tamm.abudhabi/en/life-events/individual/SupportCommunityEnvironment/PoD-Support/RenewaParkingPermitforPeopleofDetermination\" target=\"_blank\">Renew POD Permit</a></li></ul><div class=\"footer\"><strong>Need help?</strong><br>Call Q Mobility: <strong>800 3009</strong> | Zayed Higher Org: <strong>800 555</strong></div>", q_ar:"", a_ar:"", kw:"POD People of Determination parking permit apply TAMM how to application steps", id:"FAQ-POD-003", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"POD Permits"},
  {q:"What documents are required for a Citizen POD parking permit?", a:"<ul><li><strong>Emirates ID</strong> of the POD person</li><li><strong>Evidence of 1st or 2nd degree kinship</strong> (if vehicle is not owned by the POD person)</li><li><strong>Official letter</strong> from entity requesting the permit (with POD and vehicle details), if applicable</li><li><strong>Rental contract</strong> for a rented vehicle, or FAZZA contract</li></ul><div class=\"info-box\">1st degree: Father, Mother, Spouse, Spouse's parents, Spouse's children<br>2nd degree: Grandfather, Grandmother, Brother, Sister, Grandchild</div><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"", a_ar:"", kw:"POD People of Determination parking permit documents citizen required Emirates ID kinship", id:"FAQ-POD-004", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"POD Permits"},
  {q:"What documents are required for a Senior Citizen POD parking permit?", a:"<p><strong>No documents are required</strong> for the Senior Citizen POD parking permit application.</p><div class=\"info-box\">Senior citizens are defined as UAE nationals aged <strong>60 years or above</strong>. The vehicle must be registered in their name.</div><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"", a_ar:"", kw:"POD Senior Citizen parking permit documents required none age 60", id:"FAQ-POD-005", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"POD Permits"},
