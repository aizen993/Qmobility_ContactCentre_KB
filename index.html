  {q:"How can I refund the failed payment that might occur during the top up process?", a:"<p>The system will refund failed payments <strong>automatically once daily</strong> to the related accounts.</p>\n<p>If there are any problems with a payment, you can:</p>\n<ul>\n<li>Submit a complaint/grievance via the <a href=\"https://darb.qmobility.ae\" target=\"_blank\">Darb website</a></li>\n<li>Contact the call center at <strong>800 3009</strong></li>\n</ul>\n<div class=\"info-box\">If the grievance is accepted, the amount will be refunded within <strong>7 working days</strong>.</div>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Toll Toll Payments & Recharge How can I refund the failed payment that might occur during the top up process", id:"FAQ-0104", page:"faq-darb-wallet", cat:"DARB — Wallet", subcat:"Payments"},
  {q:"What should I do if I pass through a toll gate without sufficient balance in my wallet?", a:"<p>For vehicles registered outside Abu Dhabi Emirate: You must recharge your wallet within <strong>5 working days</strong>, otherwise you will receive a fine.</p>\n<div class=\"info-box\">Vehicles from other emirates must be registered and have <strong>sufficient balance</strong> in the wallet to avoid violations.</div>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Toll Toll Payments & Recharge What should I do if I pass through a toll gate without sufficient balance in my ", id:"FAQ-0207", page:"faq-darb-wallet", cat:"DARB — Wallet", subcat:"Payments"},
  {q:"How can I top up my wallet?", a:"<p>Your Darb wallet can be used for both <strong>toll gate crossings</strong> and <strong>paying for public parking</strong>. Paying for parking with your wallet is cheaper than SMS as you avoid mobile service provider transaction fees.</p>\n<p>You can top up your Darb wallet using any of the following methods:</p>\n<h4>Option 1 — From the Dashboard</h4>\n<p>Log in and press the <strong>Top Up</strong> button beside the wallet name (top left corner of the dashboard).</p>\n<h4>Option 2 — From the Vehicles Page</h4>\n<p>Go to the <strong>Vehicles</strong> page and press the <strong>Top Up</strong> button next to any vehicle — this will top up the wallet assigned to that vehicle.</p>\n<h4>Option 3 — From the Profile Page</h4>\n<p>Click on your <strong>name</strong> (top right corner) after logging in, and select the wallet top-up option.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Toll Toll Payments & Recharge How can I top up my wallet", id:"FAQ-0100", page:"faq-darb-wallet", cat:"DARB — Wallet", subcat:"Payments"},
  {q:"What are Darb toll charges and wallet rules?", a:"<p>A fee of <span class=\"amount\">AED 4</span> is charged per vehicle for each crossing during peak hours.</p>\n<div class=\"info-box\">Users must ensure they have <strong>sufficient balance</strong> in their Darb wallet to avoid any violations. (Non-Abu Dhabi plates only)</div>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Toll Toll Payments & Recharge What are Darb toll charges and wallet rules", id:"FAQ-0224", page:"faq-darb-wallet", cat:"DARB — Wallet", subcat:"Payments"},
  {q:"Why were my transactions not paid while I have topped up my wallet?", a:"<h4>Abu Dhabi Vehicles</h4>\n<p>You can activate or pause the <strong>\"Auto-Payment\"</strong> feature from the vehicle page. Once activated, toll transaction fees will be paid automatically from your linked wallet balance.</p>\n<h4>Vehicles from Other Emirates</h4>\n<p>Transaction fees are paid <strong>automatically from the wallet</strong>. Sufficient balance is mandatory.</p>\n<div class=\"info-box\">You have <strong>5 working days</strong> to top up your wallet to ensure unpaid fees are deducted and to avoid violations.</div>\n<div class=\"info-box\">After topping up and enabling Auto-Payment, deductions may take <strong>1-2 hours</strong> to process as other customer requests are in the queue. The system will deduct automatically — please be patient. Check again after 1-2 hours. If the balance remains outstanding, contact customer support.</div>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Toll Toll Payments & Recharge Why were my transactions not paid while I have topped up my wallet", id:"FAQ-0097", page:"faq-darb-wallet", cat:"DARB — Wallet", subcat:"Payments"},
  {q:"How is the toll fee collected?", a:"<p>Toll fees are collected according to the rules and regulations:</p>\n<h4>Vehicles from Other Emirates</h4>\n<p>Toll fees are collected <strong>automatically from the financial wallet</strong> for every pass under the gates (if the vehicle is registered in the Darb system).</p>\n<h4>Abu Dhabi Vehicles</h4>\n<p>The user has the option to <strong>enable or disable</strong> the Auto-Payment feature for their vehicle's transactions.</p>\n<div class=\"info-box\">All toll fees must be paid before any <strong>renewal, waiver, amendment, cancellation, or export</strong> of the vehicle at the Vehicles and Drivers Licensing Department.</div>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Toll Toll Payments & Recharge How is the toll fee collected", id:"FAQ-0087", page:"faq-darb-wallet", cat:"DARB — Wallet", subcat:"Payments"},
  {q:"Can I transfer the balance of my wallet to another customer?", a:"<p><strong>No</strong>, you cannot transfer money from your wallet to another user's wallet.</p>\n<p>However, you can <strong>top up someone else's wallet</strong> through a debit/credit card by following these steps:</p>\n<ol>\n<li>Click <strong>\"Start Service\"</strong> on the Wallet Top Up service from the list of Public Services</li>\n<li>Select the account to charge by entering the <strong>Traffic File Code</strong>, email, or Emirates ID number</li>\n<li>Select the vehicle linked to the wallet you want to recharge (you can skip this if you know the wallet name)</li>\n<li>Select the desired <strong>financial wallet</strong> and press <strong>Next</strong></li>\n<li>Choose the desired balance amount from the list</li>\n<li>Click <strong>\"Recharge using a credit card\"</strong></li>\n<li>Enter your card details and click <strong>\"Pay\"</strong></li>\n<li>Payment will be confirmed — you can print a financial receipt</li>\n</ol>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Toll Toll Payments & Recharge Can I transfer the balance of my wallet to another customer", id:"FAQ-0144", page:"faq-darb-wallet", cat:"DARB — Wallet", subcat:"Payments"},
  {q:"Does the system require prepaid cards?", a:"<p>No toll cards are required. Users can simply recharge their wallets using their credit cards.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Toll Toll Payments & Recharge Does the system require prepaid cards", id:"FAQ-0103", page:"faq-darb-wallet", cat:"DARB — Wallet", subcat:"Payments"},
  {q:"Where can I pay my toll gate fines?", a:"<p>You can pay your toll gate fines using:</p>\n<ul>\n<li>Available balance in your <strong>Darb wallet</strong></li>\n<li><strong>Credit card</strong></li>\n</ul>\n<p>Log in via the <a href=\"https://darb.qmobility.ae\" target=\"_blank\">Darb website</a> or the <strong>Darb Mobile App</strong> to make a payment.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Toll Toll Payments & Recharge Where can I pay my toll gate fines", id:"FAQ-0117", page:"faq-darb-wallet", cat:"DARB — Wallet", subcat:"Payments"},
  {q:"Can I enable or pause the auto payment for group of vehicles in a single step?", a:"<p>Yes, the system allows you to activate or pause automatic payment for <strong>multiple vehicles at once</strong>.</p>\n<h4>How to Use Bulk Auto-Payment</h4>\n<ol>\n<li>Go to the <strong>Vehicles</strong> screen</li>\n<li>Select the required vehicles</li>\n<li>Press <strong>\"Activate Auto-payment for vehicles\"</strong> or <strong>\"Pause Auto-payment for vehicles\"</strong></li>\n</ol>\n<div class=\"info-box\">This feature is available for <strong>Abu Dhabi vehicles only</strong>.</div>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Toll Toll Payments & Recharge Can I enable or pause the auto payment for group of vehicles in a single step", id:"FAQ-0098", page:"faq-darb-wallet", cat:"DARB — Wallet", subcat:"Payments"},
  {q:"Can I assign a different wallet to a vehicle?", a:"<p>Yes, you can change the assigned wallet for a specific vehicle. Log in to your account and use one of the following options:</p>\n<h4>Option 1 — From the Dashboard</h4>\n<p>Press the <strong>(●●●)</strong> action menu on the registered vehicle and select <strong>Change Wallet</strong>.</p>\n<h4>Option 2 — From the Vehicles Page</h4>\n<p>Navigate to the <strong>Vehicles</strong> page, select one or more vehicles, then click <strong>Change Wallet</strong>.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Toll Toll Payments & Recharge Can I assign a different wallet to a vehicle", id:"FAQ-0145", page:"faq-darb-wallet", cat:"DARB — Wallet", subcat:"Payments"},
  {q:"Can I change the wallet assigned for vehicle to another wallet?", a:"<p>Yes, you can change the assigned wallet for a specific vehicle by logging in with your registered account. You have two options:</p>\n<p>From the dashboard, click the (●●●) action list on the registered vehicle and select Change Wallet.</p>\n<p>Go to the Vehicles page, select one or more vehicles, and click Change Walle</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Toll Toll Payments & Recharge Can I change the wallet assigned for vehicle to another wallet", id:"FAQ-0107", page:"faq-darb-wallet", cat:"DARB — Wallet", subcat:"Payments"},
  {q:"How can I add a new wallet?", a:"<p>To add a new wallet:</p>\n<ol>\n<li>Log in to your registered account</li>\n<li>Select <strong>Manage Wallets</strong> from the dashboard</li>\n<li>Click the <strong>Add New Wallet</strong> icon</li>\n</ol>\n<div class=\"info-box\">The number of wallets cannot exceed the number of vehicles in your account.</div>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Toll Toll Payments & Recharge How can I add a new wallet", id:"FAQ-0102", page:"faq-darb-wallet", cat:"DARB — Wallet", subcat:"Payments"},
  {q:"I want to withdraw the available balance in my account, what should I do?", a:"<p>According to approved regulations, you can only retrieve the available balance in your account if you <strong>completely close the account</strong>.</p>\n<div class=\"info-box\"><strong>Important:</strong> If the account is closed, you will need to create a new account and re-register your vehicles by paying the registration fees again when you use the toll gates during peak hours.</div>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Toll Toll Payments & Recharge I want to withdraw the available balance in my account, what should I do", id:"FAQ-0105", page:"faq-darb-wallet", cat:"DARB — Wallet", subcat:"Payments"},

  {q:"What happens if I don't pay my parking fine (Unpaid Fine Consequences)?", a:"<p>Failure to pay your parking fines will result in:</p>\n<ul>\n<li>Loss of the <strong>discount period</strong></li>\n<li>Prevention from <strong>renewing your car registration</strong></li>\n<li>Other potential consequences</li>\n</ul>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Parking Fines What happens if I don't pay my parking fine (Unpaid Fine Consequences)", id:"FAQ-0194", page:"faq-maw-grievances", cat:"MAWAQIF — Fines", subcat:"Parking Fines"},
  {q:"How can I download the account financial transaction history?", a:"<p>Follow these steps to generate a report on traffic or parking fines:</p>\n<p>Log in to your account on the Darb website</p>\n<p>Select Violations.</p>\n<p>Choose Mawaqif or Darb Violations.</p>\n<p>Select Mawaqif and identify the violation by entering the violation number and clicking search, or search for multiple violations by selecting the plate number.</p>\n<p>Choose the type of violations you want to view (Paid or Unpaid).</p>\n<p>Click Violation Report to generate the document.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Parking Fines How can I download the account financial transaction history", id:"FAQ-0296", page:"faq-maw-grievances", cat:"MAWAQIF — Fines", subcat:"Parking Fines"},
  {q:"Is there a discount for Parking violations?", a:"<p>Yes, all registered fines can be paid with discounted 25% of its total amount, if its paid within 60 days from the issuance date.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Parking Fines Is there a discount for Parking violations", id:"FAQ-0215", page:"faq-maw-grievances", cat:"MAWAQIF — Fines", subcat:"Parking Fines"},
  {q:"How can I check if I have a parking fine (Verify Parking Fines)?", a:"<p>You can check your parking fines online using the Darb application or TAMM platform.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Parking Fines How can I check if I have a parking fine (Verify Parking Fines)", id:"FAQ-0040", page:"faq-maw-grievances", cat:"MAWAQIF — Fines", subcat:"Parking Fines"},
  {q:"How can I inquire and pay parking violations for my vehicle?", a:"<p>Through the Fines screen, you can inquire by the vehicle number or the violation number and specify the violations to be paid with the possibility of paying one or more fines for your vehicles at the same time.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Parking Fines How can I inquire and pay parking violations for my vehicle", id:"FAQ-0214", page:"faq-maw-grievances", cat:"MAWAQIF — Fines", subcat:"Parking Fines"},

  {q:"How to apply for a grievance on Mawaqif fines?", a:"<p>Grievances can only be submitted through <strong>TAMM</strong>. A maximum of <strong>2 grievance requests</strong> can be submitted per fine, which must be unpaid and within <strong>60 days</strong> of issuance date.</p>\n\n<h4>For Individuals</h4>\n<ul>\n<li>Must be the vehicle owner's TAMM account</li>\n<li>Violation type must be Public Parking (Mawaqif)</li>\n</ul>\n<p><a href=\"https://www.tamm.abudhabi/en/life-events/individual/DriveTransport/fines-violations/RequestaGrievanceforTransportViolations\" target=\"_blank\">Apply for Individual Grievance on TAMM</a></p>\n\n<h4>For Companies</h4>\n<ul>\n<li>Must be the account linked to the company (typically the PRO or company owner account)</li>\n<li>For help linking a company account, contact <strong>TAMM support on 800 555</strong></li>\n</ul>\n<p><a href=\"https://www.tamm.abudhabi/en/life-events/individual/DriveTransport/fines-violations/RequestaGrievanceforTransportViolations\" target=\"_blank\">Apply for Company Grievance on TAMM</a></p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Parking Grievance How to apply for a grievance on Mawaqif fines", id:"FAQ-0316", page:"faq-maw-grievances", cat:"MAWAQIF — Grievances", subcat:"Parking Grievance"},
  {q:"What are common Mawaqif fine types and amounts?", a:"<h4>General Ticket &amp; Permit Violations</h4>\n<table>\n<tr><th>Violation</th><th>Fine</th></tr>\n<tr><td><strong>No Ticket/Permit</strong> — Failure to obtain a valid ticket or permit</td><td class=\"amount\"><span class=\"amount\">AED 200</span></td></tr>\n<tr><td><strong>Improper Display</strong> — Not displaying the ticket clearly or incorrect electronic data entry</td><td class=\"amount\"><span class=\"amount\">AED 200</span></td></tr>\n<tr><td><strong>Wrong Ticket Zone</strong> — Using a ticket designated for a different parking zone</td><td class=\"amount\"><span class=\"amount\">AED 100</span></td></tr>\n<tr><td><strong>Wrong Permit Zone</strong> — Using a permit designated for a different parking zone</td><td class=\"amount\"><span class=\"amount\">AED 200</span></td></tr>\n<tr><td><strong>Lost Ticket</strong> — Losing the ticket or permit in barrier-controlled parking systems</td><td class=\"amount\"><span class=\"amount\">AED 200</span> + due fees</td></tr>\n<tr><td><strong>Time Violation</strong> — Exceeding the parking duration allowed on the ticket</td><td class=\"amount\"><span class=\"amount\">AED 100</span></td></tr>\n<tr><td><strong>Max Limit Violation</strong> — Exceeding the maximum allowed parking limit for the sector</td><td class=\"amount\"><span class=\"amount\">AED 100</span></td></tr>\n<tr><td><strong>Occupying Extra Space</strong> — Occupying two or more parking spaces</td><td class=\"amount\"><span class=\"amount\">AED 200</span></td></tr>\n</table>\n\n<h4>Serious Violations (Higher Fines &amp; Towing)</h4>\n<table>\n<tr><th>Violation</th><th>Fine</th></tr>\n<tr><td><strong>Fee Evasion</strong> — Illegally evading parking fees or assisting others in doing so</td><td class=\"amount\"><span class=\"amount\">AED 1,000</span> + Fees + Immediate Towing</td></tr>\n<tr><td><strong>Forgery</strong> — Using a forged ticket or permit</td><td class=\"amount\"><span class=\"amount\">AED 10,000</span> + Immediate Towing</td></tr>\n<tr><td><strong>No Plates</strong> — Parking without license plates in organized areas</td><td class=\"amount\"><span class=\"amount\">AED 1,000</span> + Immediate Towing</td></tr>\n<tr><td><strong>Neglected Vehicle</strong> — Leaving a vehicle abandoned in public parking</td><td class=\"amount\"><span class=\"amount\">AED 200</span> (Subject to towing after warning)</td></tr>\n</table>\n\n<h4>Obstructive Parking (AED 500 – AED 1,000 + Immediate Towing)</h4>\n<table>\n<tr><th>Violation</th><th>Fine</th></tr>\n<tr><td><strong>Blocking Movement</strong> — Parking behind/beside vehicles obstructing traffic, or blocking entrances/aisles</td><td class=\"amount\"><span class=\"amount\">AED 500</span></td></tr>\n<tr><td><strong>Pedestrian/Sidewalk</strong> — Parking on pedestrian crossings or sidewalks</td><td class=\"amount\"><span class=\"amount\">AED 500</span></td></tr>\n<tr><td><strong>Forbidden Lines</strong> — Parking on yellow lines or prohibited markings</td><td class=\"amount\"><span class=\"amount\">AED 500</span></td></tr>\n<tr><td><strong>Public Service Spots</strong> — Parking in Bus/Taxi stops, Loading/Unloading zones, or blocking waste containers</td><td class=\"amount\"><span class=\"amount\">AED 500</span></td></tr>\n<tr><td><strong>Sand/Yards</strong> — Climbing the curb to park in sandy areas or yards</td><td class=\"amount\"><span class=\"amount\">AED 1,000</span></td></tr>\n<tr><td><strong>People of Determination</strong> — Parking in spots reserved for People of Determination</td><td class=\"amount\"><span class=\"amount\">AED 1,000</span></td></tr>\n<tr><td><strong>Emergency Spots</strong> — Parking in Ambulance spots or before Fire Hydrants</td><td class=\"amount\"><span class=\"amount\">AED 1,000</span></td></tr>\n</table>\n\n<h4>Reserved Space Violations (Tow on Request)</h4>\n<table>\n<tr><th>Violation</th><th>Fine</th></tr>\n<tr><td><strong>Resident Parking</strong> — Parking in \"Resident Only\" spots without a permit</td><td class=\"amount\"><span class=\"amount\">AED 200</span> (Towed after 4 hours)</td></tr>\n<tr><td><strong>Banks, Hotels, Construction, Mosques</strong> — Parking in reserved spots for these entities</td><td class=\"amount\"><span class=\"amount\">AED 500</span> (Towed upon request)</td></tr>\n<tr><td><strong>Government/Diplomatic</strong> — Parking in spots reserved for government or diplomatic bodies</td><td class=\"amount\"><span class=\"amount\">AED 500</span></td></tr>\n</table>\n\n<div class=\"info-box\">No black points are applied on Mawaqif fines.</div>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Parking Grievance What are common Mawaqif fine types and amounts", id:"FAQ-0328", page:"faq-maw-grievances", cat:"MAWAQIF — Grievances", subcat:"Parking Grievance"},
  {q:"What should I do if I receive a violation notice by mistake (Appeal a Parking Fine)?", a:"<p>You can appeal through the website or contact customer service for clarification <strong>within 60 days</strong> from the date the violation was issued.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Parking Grievance What should I do if I receive a violation notice by mistake (Appeal a Parking Fi", id:"FAQ-0200", page:"faq-maw-grievances", cat:"MAWAQIF — Grievances", subcat:"Parking Grievance"},
  {q:"Can I object to a fine issued by a smart vehicle?", a:"<p>Yes, you can submit a request to object to the violation.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Parking Grievance Can I object to a fine issued by a smart vehicle", id:"FAQ-0303", page:"faq-maw-grievances", cat:"MAWAQIF — Grievances", subcat:"Parking Grievance"},
  {q:"Do the vehicles cover all areas in Abu Dhabi?", a:"<p>The smart vehicles currently operate according to a coverage plan that includes vital residential and commercial areas in the Emirate of Abu Dhabi, with <strong>gradual expansion</strong>.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Parking Grievance Do the vehicles cover all areas in Abu Dhabi", id:"FAQ-0304", page:"faq-maw-grievances", cat:"MAWAQIF — Grievances", subcat:"Parking Grievance"},
  {q:"What happens if my grievance is rejected?", a:"<p>Pay your fine within <strong>60 days</strong> to get a <strong>25% discount</strong>.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Parking Grievance What happens if my grievance is rejected", id:"FAQ-0045", page:"faq-maw-grievances", cat:"MAWAQIF — Grievances", subcat:"Parking Grievance"},
  {q:"How long does it take to process grievance (Grievance Duration)?", a:"<p>No set guidelines are in place, though every attempt is taken to resolve grievances within <strong>7 working days</strong> for review and decision.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Parking Grievance How long does it take to process grievance (Grievance Duration)", id:"FAQ-0044", page:"faq-maw-grievances", cat:"MAWAQIF — Grievances", subcat:"Parking Grievance"},

  {q:"Can I use the Multi-Storey parking permit at all locations?", a:"<p>Yes, you can use the Multi-Storey permit in <strong>any public Multi-Storey parking facility (MSCP)</strong> managed by Mawaqif.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Multi Storey Car Park (MSCP) Can I use the Multi-Storey parking permit at all locations", id:"FAQ-0264", page:"faq-maw-hours", cat:"MAWAQIF — MSCP", subcat:"MSCP"},
  {q:"What are the Multi-Storey permit fees by duration?", a:"<p>Multi-Storey Car Park (MSCP) permit fees are as follows:</p>\n<table>\n<tr><th>Duration</th><th>Fee</th></tr>\n<tr><td>12 Months</td><td class=\"amount\"><span class=\"amount\">AED 5,475</span></td></tr>\n<tr><td>6 Months</td><td class=\"amount\"><span class=\"amount\">AED 2,738</span></td></tr>\n<tr><td>3 Months</td><td class=\"amount\"><span class=\"amount\">AED 1,369</span></td></tr>\n</table>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Multi Storey Car Park (MSCP) What are the Multi-Storey permit fees by duration", id:"FAQ-0261", page:"faq-maw-hours", cat:"MAWAQIF — MSCP", subcat:"MSCP"},
  {q:"Can I park per hour in Multi-Storey parking?", a:"<p>Yes, it will cost you <span class=\"amount\">2 AED</span> per Hour, and <span class=\"amount\">15 AED</span> per day</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Multi Storey Car Park (MSCP) Can I park per hour in Multi-Storey parking", id:"FAQ-0262", page:"faq-maw-hours", cat:"MAWAQIF — MSCP", subcat:"MSCP"},
  {q:"How does the Multi-Storey Car Park system work?", a:"<p>Multi-storey public parking is available in multiple areas of Abu Dhabi Island.</p>\n<h4>How It Works</h4>\n<ol>\n<li>At the <strong>entrance gate</strong>, cameras or ticket readers record your vehicle information or issue a ticket</li>\n<li>Park your vehicle on any available floor</li>\n<li>Upon departure, the time spent is calculated automatically</li>\n<li>Pay the parking fee via the <strong>toll collection device</strong></li>\n<li>The exit gate opens automatically or can be opened using your ticket after payment</li>\n</ol>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Multi Storey Car Park (MSCP) How does the Multi-Storey Car Park system work", id:"FAQ-0182", page:"faq-maw-hours", cat:"MAWAQIF — MSCP", subcat:"MSCP"},
  {q:"Are there monthly subscriptions for MSCPs (Membership Access for MSCPs)?", a:"<p>Yes, there are 3 period available: 3 Months (1,369) - 6 Months (2,738) and 1 Year (5,475)</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Multi Storey Car Park (MSCP) Are there monthly subscriptions for MSCPs (Membership Access for MSCPs)", id:"FAQ-0183", page:"faq-maw-hours", cat:"MAWAQIF — MSCP", subcat:"MSCP"},
  {q:"Are there special parking spots in multi-storey car parking?", a:"<p>Yes, there are designated spots in multi-storey car parks for:</p>\n<ul>\n<li><strong>People of Determination</strong> — clearly marked and reserved</li>\n<li><strong>Women drivers</strong> — clearly marked and reserved</li>\n</ul>\n<p>Wheelchairs are also available at the Control Room.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Multi Storey Car Park (MSCP) Are there special parking spots in multi-storey car parking", id:"FAQ-0033", page:"faq-maw-hours", cat:"MAWAQIF — MSCP", subcat:"MSCP"},
  {q:"How much does it cost to park in an MSCP (Membership Access for MSCPs)?", a:"<h4>Subscription Periods &amp; Fees</h4>\n<table>\n<tr><th>Duration</th><th>Fee</th></tr>\n<tr><td>3 Months</td><td class=\"amount\"><span class=\"amount\">AED 1,369</span></td></tr>\n<tr><td>6 Months</td><td class=\"amount\"><span class=\"amount\">AED 2,738</span></td></tr>\n<tr><td>1 Year</td><td class=\"amount\"><span class=\"amount\">AED 5,475</span></td></tr>\n</table>\n<h4>Key Details</h4>\n<ul>\n<li><strong>Eligibility:</strong> Anyone can apply for these permits</li>\n<li><strong>Benefits:</strong> Access to designated, often shaded, multi-storey parking facilities rather than standard street parking</li>\n<li><strong>Application:</strong> Permits can be applied for or renewed instantly through the <strong>TAMM platform</strong> or the <strong>Darb App</strong></li>\n</ul>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Multi Storey Car Park (MSCP) How much does it cost to park in an MSCP (Membership Access for MSCPs)", id:"FAQ-0029", page:"faq-maw-hours", cat:"MAWAQIF — MSCP", subcat:"MSCP"},
  {q:"How can the renewal be done (Renewal Process)?", a:"<p>Renewal must be initiated and completed prior to the expiry of the existing permit.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Multi Storey Car Park (MSCP) How can the renewal be done (Renewal Process)", id:"FAQ-0031", page:"faq-maw-hours", cat:"MAWAQIF — MSCP", subcat:"MSCP"},
  {q:"What is Mawaqif and what services does it manage?", a:"<p><strong>Mawaqif</strong> is Abu Dhabi's parking management system, designed to:</p>\n<ul>\n<li>Regulate public parking</li>\n<li>Reduce congestion</li>\n<li>Improve road safety</li>\n</ul>\n<p>It is operated by <strong>Q Mobility</strong> and covers various parking zones, permits, and payment methods.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Paid Public parking What is Mawaqif and what services does it manage", id:"FAQ-0230", page:"faq-maw-hours", cat:"MAWAQIF — Pay for Parking", subcat:"Paid Parking"},
  {q:"Which areas are under Mawaqif parking authority?", a:"<p>Mawaqif manages parking across the following areas:</p>\n\n<table>\n<tr><th>Area</th><th>Sectors / Zones</th></tr>\n<tr>\n<td><strong>Abu Dhabi Island</strong></td>\n<td>W64, W65, W54, W56, W66, W67, W57, W68, W58, W69, W59-01, W59-02, E42, E40, E35, W31, E34-02, E34-01, W49, W48, W47, E32, E33, E38, E37, E38-01, W52-01, W52-03, W52-02, W52, E31, E30, E39, E29, E28, E26, E21, W46-02, W46-01, W46, E27, E25, E19-02, E24, E22-02, E23, E22-01, W24-01, W24-02, W23-01, W23, W26, W22, W25, W21, W27, W25-01, W27-01, W28-01, W30, W28, W20, W19-01, W19-02, W15-01, W15-02, E20-01, E20-02, E19-01, W14-02, W14-01, W18-01, W18-02, W29, W18-03, W35, W34, W33, W16, W39, W36, W37, W17-03, W17-02, W17-01, W13-02, W13-01, E18-01, E18-02, E18-03, E36, E43, E41, E41-01, E11, E4-02, E4-01, W4, W9, W11, W10, W8, W7-02, W6, W5, W2, W1, E1, E2, E3-01, E3-02, E8, E6, E5, E7, E9-01, E9-02, E10, E16-02, E16-01, E16, E15, E12, E13, E14, W12, W45, W38, W41, W44, W43, W42, W40, SW2, SE-48, SE-45, RB11, RB12, RB9, RB8, RB7, RB5, RB4, RB3, RB2, RB1, Sas Al Nakhl, W7-01, Dolphin Park, Eastern Mangrove, Al Khaleej Al Arabi Park 1, 2, 4, 5, Al Gurm Plaza</td>\n</tr>\n<tr>\n<td><strong>Al Ain — Sanaiya</strong></td>\n<td>AS1, AS02, AS03, AS05, AS06, AS04, AS07, ASH03, ASH04, ASH01, ASH02</td>\n</tr>\n<tr>\n<td><strong>Al Ain — City</strong></td>\n<td>Sector-1, Sector-2, Sector-3, Sector-4, Sector-5, Sector-6, Sector-7, Sector-8A, Sector-8B, Sector-9, Sector-10, Sector-12, Sector-13, Sector-14, Sector-15, Sector-26, Sector-32, Sector-33, Hai Al Musalla, Falaj Hazaa School Zone</td>\n</tr>\n<tr>\n<td><strong>Mohamed Bin Zayed City</strong></td>\n<td>ME9, ME10, ME11, ME12</td>\n</tr>\n<tr>\n<td><strong>Al Shahama</strong></td>\n<td>Al Shahama, Al Shahama New</td>\n</tr>\n<tr>\n<td><strong>Mussafah</strong></td>\n<td>M1, M2, M3, M4, M5, M6, M7, M8, M9, M14, M15, M21, M22, M23, M24</td>\n</tr>\n<tr>\n<td><strong>Rachael City</strong></td>\n<td>ICAD V</td>\n</tr>\n</table>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Paid Public parking Which areas are under Mawaqif parking authority", id:"FAQ-0235", page:"faq-maw-hours", cat:"MAWAQIF — Pay for Parking", subcat:"Paid Parking"},
  {q:"What are the Mawaqif paid parking hours?", a:"<p>Monday to Saturday: 8:00 AM – 12:00 AM (midnight). Free on Sundays and public holidays.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Paid Public parking What are the Mawaqif paid parking hours", id:"FAQ-0038", page:"faq-maw-hours", cat:"MAWAQIF — Pay for Parking", subcat:"Paid Parking"},
  {q:"How do I pay a parking fine?", a:"<p>You can pay your parking fines online using the Darb application and TAMM platform. Ensure to pay within 60 days of the fine issuance date to available the 25% discount.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Paid Public parking How do I pay a parking fine", id:"FAQ-0192", page:"faq-maw-hours", cat:"MAWAQIF — Pay for Parking", subcat:"Paid Parking"},
  {q:"What payment methods are available for Mawaqif parking?", a:"<h3>Mawaqif Parking Payment Methods</h3>\n<h4>1. Mawaqif Machines</h4>\n<p>Accept coins only</p>\n<h4>2. SMS Payment</h4>\n<p>Send an SMS to 3009 using the following format:</p>\n<p><strong>AUH00 0000 P/S 1</strong></p>\n<p>Shortcuts for UAE Emiratis: AUH, DXB, SHJ, AJM, FUJ, UAQ, RAK</p>\n<p>For GCC plates</p>\n<p><strong>Saudi: KSA, SAU</strong></p>\n<p>Kuwait: KWT</p>\n<p><strong>Bahrain: BHR, BAH</strong></p>\n<p>Oman: OMN</p>\n<p>Qatar: QAT</p>\n<p>Classic Cars SMS: AUHC 0000 P/S 1</p>\n<ul>\n<li>Note: SMS payment is only for private vehicles. Other vehicle types must use the Darb app, website, or Mawaqif machines</li>\n</ul>\n<h3>Important Notes for SMS Payments</h3>\n<p>Must have a valid SIM card (postpaid or prepaid)</p>\n<p>Postpaid: Ensure sufficient credit and that you haven’t reached your hard cap limit</p>\n<p>Prepaid: Ensure you haven’t reached your hard cap limit and activate the M-Parking wallet by contacting your network provider</p>\n<p>Network codes</p>\n<p>Etisalat: 101</p>\n<p>Du: 155</p>\n<p>Virgin: 165</p>\n<h4>4. Third-Party Applications</h4>\n<p>Darb App: Sign in, Home screen, Select Paying for parking</p>\n<p>TAMM App: Sign in, My TAMM, Select Pay for parking</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Paid Public parking What payment methods are available for Mawaqif parking", id:"FAQ-0237", page:"faq-maw-hours", cat:"MAWAQIF — Pay for Parking", subcat:"Paid Parking"},
  {q:"Are there any exceptions to parking fees in school areas?", a:"<p>There are no exceptions;</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Paid Public parking Are there any exceptions to parking fees in school areas", id:"FAQ-0295", page:"faq-maw-hours", cat:"MAWAQIF — Pay for Parking", subcat:"Paid Parking"},
  {q:"How do I pay Mawaqif fees through Darb Mobile Application?", a:"<p>You can pay Mawaqif fees through the service available on Darb Mobile App as follows:</p>\n<p>Start using the service by pressing on \"Pay For Parking\".</p>\n<p>Select the vehicle from the vehicles list, or add another vehicle.</p>\n<p>Select the type of parking according to the type of sidewalk - premium or standard.</p>\n<p>Select the period required to park.</p>\n<p>Pay the fees, which will be deducted from the available balance on the e-wallet that linked with the vehicle.</p>\n<p>Ticket validity is displayed on the system with the option to renew it for one hour.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Paid Public parking How do I pay Mawaqif fees through Darb Mobile Application", id:"FAQ-0216", page:"faq-maw-hours", cat:"MAWAQIF — Pay for Parking", subcat:"Paid Parking"},
  {q:"How do I renew the parking fees through Darb Mobile App?", a:"<p>The user can renew the vehicle's parking fees by pressing the Extend Ticket button that appears on the dashboard or on the Mawaqif Tickets screen and the parking Ticket will be renewed for one hour where the fees will be deducted from the associated wallet with the vehicle.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Paid Public parking How do I renew the parking fees through Darb Mobile App", id:"FAQ-0217", page:"faq-maw-hours", cat:"MAWAQIF — Pay for Parking", subcat:"Paid Parking"},
  {q:"Can I continue using my current rechargeable card?", a:"<p>No. The rechargeable card feature is no longer supported. You must now use the \"Darb\" app to access your remaining balance.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Paid Public parking Can I continue using my current rechargeable card", id:"FAQ-0318", page:"faq-maw-hours", cat:"MAWAQIF — Pay for Parking", subcat:"Paid Parking"},
  {q:"How can I access and use my balance now?", a:"<p>You can access and use your balance through the Darb application. Simply log in using your UAE Pass, and your balance will appear within your account.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Paid Public parking How can I access and use my balance now", id:"FAQ-0320", page:"faq-maw-hours", cat:"MAWAQIF — Pay for Parking", subcat:"Paid Parking"},
  {q:"What happens to the balance on my rechargeable card?", a:"<p>Your balance is not lost. Any remaining amount has been transferred directly to your account and can be used immediately via the \"Darb\" app.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Paid Public parking What happens to the balance on my rechargeable card", id:"FAQ-0319", page:"faq-maw-hours", cat:"MAWAQIF — Pay for Parking", subcat:"Paid Parking"},
  {q:"Why should I use the DARB app instead of the rechargeable card?", a:"<h4>The \"Darb\" app offers several benefits</h4>\n<p>Instant balance updates</p>\n<p>Faster and safer payment methods.</p>\n<p>Convenient top-up options</p>\n<p>Reliable service.</p>\n<p>Direct integration with the UAE Pass.</p>\n<h3>Important notes</h3>\n<p>Mawaqif only responsible about mentioned sectors and cities.</p>\n<p>Mawaqif only responsible about parking inside Abu Dhabi mall only.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Paid Public parking Why should I use the DARB app instead of the rechargeable card", id:"FAQ-0325", page:"faq-maw-hours", cat:"MAWAQIF — Pay for Parking", subcat:"Paid Parking"},
  {q:"Why was the rechargeable card feature closed?", a:"<p>The feature was discontinued as part of a service modernization to improve the user experience. The \"Darb\" app now offers a safer method with simplified payment options.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Paid Public parking Why was the rechargeable card feature closed", id:"FAQ-0317", page:"faq-maw-hours", cat:"MAWAQIF — Pay for Parking", subcat:"Paid Parking"},
  {q:"How to extend a parking ticket?", a:"<p>You can extend your parking ticket after receiving a notification that your ticket is about to expire, and <strong>before</strong> the actual expiry time.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Paid Public parking How to extend a parking ticket", id:"FAQ-0037", page:"faq-maw-hours", cat:"MAWAQIF — Pay for Parking", subcat:"Paid Parking"},
  {q:"Can I use Darb Mobile App to view the parking fees that have been deducted from my wallet?", a:"<p>Yes, the user can view all the financial transactions on the wallet through the payments screen (Financial Transactions), after selecting the service type as \"Virtual Parking by wallet\".</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Paid Public parking Can I use Darb Mobile App to view the parking fees that have been deducted from ", id:"FAQ-0218", page:"faq-maw-hours", cat:"MAWAQIF — Pay for Parking", subcat:"Paid Parking"},
  {q:"How can I pay a parking fine?", a:"<p>You can pay your parking fines online using:</p>\n<ul>\n<li><strong>Darb App</strong></li>\n<li><strong>TAMM platform</strong></li>\n</ul>\n<div class=\"info-box\">Pay within <strong>60 days</strong> of the fine issuance date to get a <strong>25% discount</strong>.</div>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Paid Public parking How can I pay a parking fine", id:"FAQ-0039", page:"faq-maw-hours", cat:"MAWAQIF — Pay for Parking", subcat:"Paid Parking"},
  {q:"How can I pay for public parking?", a:"<p>You can pay for public parking using any of the following methods:</p>\n<ul>\n<li><strong>Darb Wallet</strong> — Pay directly from your wallet balance. This is the cheapest option as there are no transaction fees, unlike SMS where mobile service provider charges apply per request</li>\n<li><strong>Darb Mobile App</strong> — Sign in and select \"Pay for Parking\" from the home screen</li>\n<li><strong>TAMM App</strong> — Sign in, go to My TAMM, and select \"Pay for Parking\"</li>\n<li><strong>SMS</strong> — Send an SMS to <strong>3009</strong> with your plate details</li>\n<li><strong>Parking Meters</strong> — Accept coins only</li>\n</ul>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Paid Public parking How can I pay for public parking", id:"FAQ-0034", page:"faq-maw-hours", cat:"MAWAQIF — Pay for Parking", subcat:"Paid Parking"},
  {q:"What are the public parking charges (Public Parking Fees)?", a:"<table>\n<tr><th>Parking Type</th><th>Rate</th><th>Details</th></tr>\n<tr><td><strong>Standard Parking</strong><br>(Black and Blue)</td><td class=\"amount\"><span class=\"amount\">AED 2</span> per hour</td><td>Capped at <span class=\"amount\">AED 15</span> for 24 hours<br>Available 8:00 AM to Midnight<br>Free on Sundays and public holidays</td></tr>\n<tr><td><strong>Premium Parking</strong><br>(White and Blue)</td><td class=\"amount\"><span class=\"amount\">AED 3</span> per hour</td><td>Maximum stay: 4 hours only<br>Free on Sundays and public holidays</td></tr>\n</table>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Paid Public parking What are the public parking charges (Public Parking Fees)", id:"FAQ-0035", page:"faq-maw-hours", cat:"MAWAQIF — Pay for Parking", subcat:"Paid Parking"},

  {q:"Are there any changes to parking laws or regulations?", a:"<p>Parking laws and regulations may be updated periodically by the Integrated Transport Centre (ITC) and Abu Dhabi authorities.</p>\n<p>Any changes to Mawaqif parking rules, fees, or regulations are communicated through official channels:</p>\n<ul>\n<li><strong>Darb App</strong></li>\n<li><strong>Q Mobility website</strong> — <a href=\"https://www.qmobility.ae\" target=\"_blank\">www.qmobility.ae</a></li>\n<li><strong>SMS notifications</strong> to registered users</li>\n</ul>\n<p>For the latest information on any regulatory changes, please contact Q Mobility support at <strong>800 3009</strong>.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking General Information Are there any changes to parking laws or regulations", id:"FAQ-0300", page:"faq-maw-others", cat:"MAWAQIF — General", subcat:"General Info"},
  {q:"What are Q Mobility vision and mission?", a:"<h4>Q Mobility Vision and Mission</h4>\n<p>Vision: Redefining urban mobility for a sustainable future.</p>\n<p>Mission: Delivering best-in-class, digitally enabled mobility experiences to enhance livability.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking General Information What are Q Mobility vision and mission", id:"FAQ-0233", page:"faq-maw-others", cat:"MAWAQIF — General", subcat:"General Info"},
  {q:"What is Q Mobility?", a:"<p>Q Mobility is a wholly owned subsidiary of ADQ (Abu Dhabi's investment and holding company). It focuses on providing sustainable and integrated smart mobility solutions to enhance the efficiency, reliability, and convenience of transport across the Abu Dhabi emirate. Q Mobility develops and manages key mobility infrastructure including the Darb electronic toll system and Mawaqif parking management system.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking General Information What is Q Mobility", id:"FAQ-0232", page:"faq-maw-others", cat:"MAWAQIF — General", subcat:"General Info"},
  {q:"Who is currently responsible for Mawaqif operations?", a:"<p>Mawaqif parking operations are currently managed by Q Mobility Company, a wholly owned subsidiary of ADQ (Abu Dhabi's investment and holding company). Q Mobility assumed responsibility for Mawaqif operations, including parking management, permit issuance, fine enforcement, and customer support across all zones in Abu Dhabi, Al Ain, and surrounding areas.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking General Information Who is currently responsible for Mawaqif operations", id:"FAQ-0231", page:"faq-maw-others", cat:"MAWAQIF — General", subcat:"General Info"},
  {q:"How can I apply for a job with Q Mobility?", a:"<h4>To explore career opportunities with Q Mobility</h4>\n<ul>\n<li>Send your CV and cover letter to: <a href=\"/cdn-cgi/l/email-protection#97f4f6e5f2f2e5e4d7e6faf8f5fefbfee3eeb9f6f2\"><span class=\"__cf_email__\" data-cfemail=\"284b495a4d4d5a5b685945474a4144415c5106494d\">[email&#160;protected]</span></a></li>\n\n<li>Include the position you are applying for in the subject line</li>\n</ul>\n<p>You can also check available positions on LinkedIn by searching for Q Mobility. All applications are reviewed by the HR team, and shortlisted candidates will be contacted directly.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking General Information How can I apply for a job with Q Mobility", id:"FAQ-0236", page:"faq-maw-others", cat:"MAWAQIF — General", subcat:"General Info"},
  {q:"How can I contact Q Mobility?", a:"<p>You can contact the Call center: <strong>8003009</strong> (free of charge).</p>\n<p>Or through email: <a href=\"/cdn-cgi/l/email-protection#1c7f696f687371796e6f5c6d71737e7570756865327d79\"><span class=\"__cf_email__\" data-cfemail=\"7714020403181a12050437061a18151e1b1e030e591612\">[email&#160;protected]</span></a></p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking General Information How can I contact Q Mobility", id:"FAQ-0234", page:"faq-maw-others", cat:"MAWAQIF — General", subcat:"General Info"},
  {q:"What are the operating hours of the Q Mobility call center?", a:"<p>The call center operates 24 hours, 7 days a week</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking General Information What are the operating hours of the Q Mobility call center", id:"FAQ-0002", page:"faq-maw-others", cat:"MAWAQIF — General", subcat:"General Info"},
  {q:"What is Q Mobility call center?", a:"<p>Q Mobility call center is the official customer support hotline for <strong>Q Mobility</strong>, the company responsible for managing Abu Dhabi's <strong>DARB</strong> (road toll system) and <strong>Mawaqif</strong> (public parking system).</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking General Information What is Q Mobility call center", id:"FAQ-0162", page:"faq-maw-others", cat:"MAWAQIF — General", subcat:"General Info"},
  {q:"Can I request the photo or video to support my objection?", a:"<p>When submitting an objection, the images are reviewed internally. Users can view the evidence according to the applicable procedures.</p>\n<h4>Judicial Rulings and Violation Waivers</h4>\n<p>Attachments related to judicial rulings may be required as part of the objection process.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Parking Inspection Can I request the photo or video to support my objection", id:"FAQ-0314", page:"faq-maw-others", cat:"MAWAQIF — Inspection", subcat:"Parking Inspection"},
  {q:"Do cameras record video or only photos?", a:"<p>The cameras capture <strong>high-resolution images for violations only</strong>, in line with applicable laws and regulations.</p>\n<p>They do <strong>not</strong> perform continuous video recording, in order to protect public privacy.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Parking Inspection Do cameras record video or only photos", id:"FAQ-0311", page:"faq-maw-others", cat:"MAWAQIF — Inspection", subcat:"Parking Inspection"},
  {q:"Do these cameras monitor individuals?", a:"<p>No. The cameras are designed solely to monitor public parking data and vehicle compliance.</p>\n<p>All data is processed and protected in full accordance with applicable laws to ensure complete privacy for individuals.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Parking Inspection Do these cameras monitor individuals", id:"FAQ-0298", page:"faq-maw-others", cat:"MAWAQIF — Inspection", subcat:"Parking Inspection"},
  {q:"Does the vehicle take photos?", a:"<p>Yes, the vehicle captures images of the <strong>license plate</strong> and the <strong>surrounding environment</strong> constantly, which then get run through our system to validate before fines are issued or not.</p>\n<p>These images are used as evidence to document the case, and data is secured according to privacy policies.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Parking Inspection Does the vehicle take photos", id:"FAQ-0302", page:"faq-maw-others", cat:"MAWAQIF — Inspection", subcat:"Parking Inspection"},
  {q:"Is it possible for the technology to make mistakes?", a:"<p>All systems may encounter a very limited error rate; however, every case can be <strong>reviewed and verified by authorized inspectors</strong> before being issued.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Parking Inspection Is it possible for the technology to make mistakes", id:"FAQ-0308", page:"faq-maw-others", cat:"MAWAQIF — Inspection", subcat:"Parking Inspection"},
  {q:"Was the public informed beforehand about the system?", a:"<p>Yes, the public is informed through official channels, social media, and awareness campaigns to ensure the system is understood.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Parking Inspection Was the public informed beforehand about the system", id:"FAQ-0309", page:"faq-maw-others", cat:"MAWAQIF — Inspection", subcat:"Parking Inspection"},
  {q:"What happens during a parking inspection?", a:"<p>During a parking inspection, Mawaqif inspectors check for potential violations such as:</p>\n<ul>\n<li>Expired parking tickets</li>\n<li>Incorrect parking</li>\n<li>Unauthorized use of permit spaces</li>\n</ul>\n<p>They issue fines and take appropriate measures as needed to enforce parking laws.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Parking Inspection What happens during a parking inspection", id:"FAQ-0199", page:"faq-maw-others", cat:"MAWAQIF — Inspection", subcat:"Parking Inspection"},
  {q:"What is the function of smart vehicles?", a:"<p>It is a smart vehicle dedicated to inspecting public parking automatically. It ensures vehicles comply with parking regulations (e.g., valid permit or payment).</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Parking Inspection What is the function of smart vehicles", id:"FAQ-0301", page:"faq-maw-others", cat:"MAWAQIF — Inspection", subcat:"Parking Inspection"},
  {q:"What is the goal of using smart vehicles and AI in Mawaqif?", a:"<p>The initiative aims to upgrade public parking management using modern technologies and Artificial Intelligence (AI).</p>\n<p>It facilitates automatic payment checks, reduces occupancy errors, improves system efficiency, and provides a smoother experience for users.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Parking Inspection What is the goal of using smart vehicles and AI in Mawaqif", id:"FAQ-0297", page:"faq-maw-others", cat:"MAWAQIF — Inspection", subcat:"Parking Inspection"},
  {q:"What types of violations do the cameras detect?", a:"<p>They detect almost all violations such as (but not limited to):</p>\n<ul>\n<li>Parking in unauthorized places</li>\n<li>Parking without payment or a permit</li>\n<li>Exceeding the paid time limit</li>\n</ul>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Parking Inspection What types of violations do the cameras detect", id:"FAQ-0312", page:"faq-maw-others", cat:"MAWAQIF — Inspection", subcat:"Parking Inspection"},
  {q:"Who reviews the videos or photos?", a:"<p>Images are reviewed by precise automated systems and specialized audit teams to ensure accuracy before any measure is taken.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Parking Inspection Who reviews the videos or photos", id:"FAQ-0313", page:"faq-maw-others", cat:"MAWAQIF — Inspection", subcat:"Parking Inspection"},
  {q:"Will current inspectors be replaced?", a:"<p>No. Their role is to focus on <strong>awareness and field monitoring</strong>, while smart vehicles handle the routine checks to cover a larger number of locations.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Parking Inspection Will current inspectors be replaced", id:"FAQ-0307", page:"faq-maw-others", cat:"MAWAQIF — Inspection", subcat:"Parking Inspection"},
  {q:"How is parking enforced in Abu Dhabi (Parking Rules Enforcement)?", a:"<p>Parking inspectors regularly monitor areas to ensure compliance with paid and permit parking regulations. The inspectors are assisted by a number of modern tools, such as <strong>smart cars</strong>.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Parking Inspection How is parking enforced in Abu Dhabi (Parking Rules Enforcement)", id:"FAQ-0197", page:"faq-maw-others", cat:"MAWAQIF — Inspection", subcat:"Parking Inspection"},
  {q:"What should I do if I notice illegal parking?", a:"<p>Complaints about improper parking or misuse of spaces can be submitted by calling the call center.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Parking Inspection What should I do if I notice illegal parking", id:"FAQ-0198", page:"faq-maw-others", cat:"MAWAQIF — Inspection", subcat:"Parking Inspection"},

  {q:"What documents are required for a commercial permit?", a:"<p>To apply for a commercial permit, you will need to provide the following:</p>\n<ul>\n<li><strong>Emirates ID</strong></li>\n<li><strong>Trade License</strong></li>\n<li>Additional documentation specific to the permit type you are applying for</li>\n</ul>\n<div class=\"info-box\">Ensure all information is accurate to avoid delays in processing.</div>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Commercial Permits What documents are required for a commercial permit", id:"FAQ-0068", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Commercial Permits"},
  {q:"What is a Commercial Parking Permit?", a:"<p>A Commercial Permit allows businesses to apply for various types of permits, including:</p>\n<ul>\n<li>Parking reservation for construction &amp; infrastructure maintenance</li>\n<li>Removal of PDM &amp; Mawaqif signage</li>\n<li>Parking reservation for charity campaigns</li>\n<li>Parking basement extension</li>\n<li>Parking space removal</li>\n<li>Utilize sidewalk for maintenance purposes</li>\n<li>Parking reservation for eligible entities</li>\n</ul>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Commercial Permits What is a Commercial Parking Permit", id:"FAQ-0062", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Commercial Permits"},
  {q:"How do I apply for a Commercial Permit?", a:"<p>Applications can be submitted through the <strong>TAMM platform</strong>.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Commercial Permits How do I apply for a Commercial Permit", id:"FAQ-0063", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Commercial Permits"},
  {q:"What is the eligibility process?", a:"<h4>Commercial Permit Eligibility by Entity Type</h4>\n<p>The following table outlines the number of free and paid parking spaces allocated per entity type:</p>\n<table>\n<tr><th>No.</th><th>Entity</th><th>Free Spaces</th><th>Paid Spaces</th><th>Note</th></tr>\n<tr><td>1</td><td>Hotel (One or Two Stars)</td><td>1</td><td>2</td><td>Treating hotel apartments and furnished apartments operating under a hotel system and properly licensed as classified hotels (one or two stars).</td></tr>\n<tr><td>2</td><td>Hotel (Three Stars)</td><td>2</td><td>3</td><td></td></tr>\n<tr><td>3</td><td>Hotel (Four Stars)</td><td>2</td><td>4</td><td></td></tr>\n<tr><td>4</td><td>Hotel (Five Stars)</td><td>2</td><td>5</td><td></td></tr>\n<tr><td>5</td><td>Hotel Private Road</td><td>0</td><td>As determined by the administration</td><td></td></tr>\n<tr><td>6</td><td>Banks and Financial Institutions</td><td>0</td><td>4</td><td>The Central Bank is treated according to what is determined by the administration (Public or Private).</td></tr>\n<tr><td>7</td><td>Hospitals and Medical and Health Centers</td><td>4</td><td>4</td><td>Whether public or private.</td></tr>\n<tr><td>8</td><td>Diplomatic and Consular Missions, Political Offices, and International Organizations</td><td>-</td><td>-</td><td>The number depends on the principle of reciprocity or courtesy and the arrangements determined by the Ministry of Foreign Affairs, whether paid or free.</td></tr>\n<tr><td>9</td><td>Government Entities</td><td>4</td><td>4</td><td>The number is calculated per building separately.</td></tr>\n<tr><td>10</td><td>Construction Companies</td><td>-</td><td>As determined by the administration</td><td>The administration may determine the parking space area depending on whether it is located in a crowded area or not.</td></tr>\n<tr><td>11</td><td>Construction Companies (Lower Extensions of Buildings Outside the Plot)</td><td>As determined by the department</td><td>-</td><td>Free permits are granted for reserving public parking spaces affected by construction works located within the lower extension of buildings under construction.</td></tr>\n<tr><td>12</td><td>Construction Companies (Building Mosques, Places of Worship, Charitable Institutions, Government Buildings, Government Schools, and UAE National Houses, including demolition for renovation, re-renovation, or maintenance)</td><td>As determined by the department</td><td>-</td><td>Free permits are granted in numbers that meet the project’s needs, based on a request from the contractor accompanied by approvals from relevant authorities.</td></tr>\n<tr><td>13</td><td>Imams and Mu’adhins of Mosques</td><td>2</td><td>-</td><td>The administration grants permits to reserve one parking space for the Imam and another for the Mu’adhin near the mosque upon request from the General Authority of Islamic Affairs and Endowments.</td></tr>\n<tr><td>14</td><td>Licensed Social or Charitable Events</td><td>-</td><td>-</td><td>Free parking permits are granted for licensed social or charitable events in numbers proportional to the size of the event.</td></tr>\n<tr><td>15</td><td>Schools</td><td>-</td><td>-</td><td>As agreed upon.</td></tr>\n</table>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Commercial Permits What is the eligibility process", id:"FAQ-0159", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Commercial Permits"},
  {q:"How much are the payment fees?", a:"<p>The fees vary depending on the permit type and the applying entity classification.</p>\n<table>\n<tr><th>Permit Type</th><th>Fee</th></tr>\n<tr><td>Request Submission Fee for non-government entities</td><td class=\"amount\"><span class=\"amount\">AED 200</span></td></tr>\n<tr><td>Parking Reservation Permit – Government – per parking space per day</td><td class=\"amount\"><span class=\"amount\">AED 55</span></td></tr>\n<tr><td>Parking Reservation Permit – Government – per parking space per 6 months</td><td class=\"amount\"><span class=\"amount\">AED 10,000</span></td></tr>\n<tr><td>Parking Reservation Permit – Government – per parking space per year</td><td class=\"amount\"><span class=\"amount\">AED 20,000</span></td></tr>\n<tr><td>Parking Reservation Permit – Private – per parking space per day</td><td class=\"amount\"><span class=\"amount\">AED 85</span></td></tr>\n<tr><td>Parking Reservation Permit – Private – per parking space per 6 months</td><td class=\"amount\"><span class=\"amount\">AED 15,000</span></td></tr>\n<tr><td>Parking Reservation Permit – Private – per parking space per year</td><td class=\"amount\"><span class=\"amount\">AED 30,000</span></td></tr>\n<tr><td>Fees for removing machine or signboard</td><td class=\"amount\"><span class=\"amount\">AED 2,000</span></td></tr>\n</table>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Commercial Permits How much are the payment fees", id:"FAQ-0156", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Commercial Permits"},
  {q:"Is there a limit to the number of Commercial Permits a company can hold (Max Permits per Company)?", a:"<p>Yes, the maximum number of permits allowed depends on:</p>\n<ul>\n<li><strong>Entity classification</strong></li>\n<li><strong>Parking availability</strong></li>\n<li><strong>Project requirements</strong> (for construction companies)</li>\n</ul>\n<p>In addition, the number of approved parking spaces will depend on the operational status and occupancy of the sector.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Commercial Permits Is there a limit to the number of Commercial Permits a company can hold (Max Per", id:"FAQ-0069", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Commercial Permits"},
  {q:"What is the renewal process?", a:"<p>Renewal must be initiated and completed prior to the expiry of the existing permit through TAMM.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Commercial Permits What is the renewal process", id:"FAQ-0066", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Commercial Permits"},
  {q:"How do I apply for an institution/government permit?", a:"<p>Each entity must assign a contact person to process the application with Q Mobility.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Government Permits How do I apply for an institution government permit", id:"FAQ-0015", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Government Permits"},
  {q:"How do I apply, and where do I send the required documents?", a:"<p>You can apply by:</p>\n<ul>\n<li>Sending the required documents via email to <a href=\"/cdn-cgi/l/email-protection#accbc3da82dcdeecddc1c3cec5c0c5d8d582cdc9\"><span class=\"__cf_email__\" data-cfemail=\"8cebe3faa2fcfeccfde1e3eee5e0e5f8f5a2ede9\">[email&#160;protected]</span></a></li>\n<li>Through the <strong>TAMM</strong> app or website</li>\n</ul>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Government Permits How do I apply, and where do I send the required documents", id:"FAQ-0292", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Government Permits"},
  {q:"Which documents are required to issue or renew permits?", a:"<p>To issue or renew permits, you'll need the following:</p>\n<h4>Initial Request</h4>\n<ul>\n<li>A formal request to the Mawaqif team for approval to issue permits and authorize the total quota</li>\n<li>A letter specifying the number of permits required (Issuance / Renewal)</li>\n<li>A list of employee names containing: Employee Name, Vehicle Number &amp; Category, Kinship Relationship (if applicable)</li>\n</ul>\n<h4>Attachments Required for Each Employee</h4>\n<ul>\n<li>Work ID Card (issued by the entity)</li>\n<li>Employee Emirates ID (valid, both sides)</li>\n<li>Vehicle Registration / Mulkiya (valid, both sides)</li>\n<li>Proof of kinship, if applicable (Spouse / Parents / Siblings)</li>\n</ul>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Government Permits Which documents are required to issue or renew permits", id:"FAQ-0293", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Government Permits"},
  {q:"Who can apply for an Institution / Government Permit?", a:"<p>Institution and government permits are issued to employees of government institutions and other approved organizations. These permits allow parking in designated areas.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Government Permits Who can apply for an Institution   Government Permit", id:"FAQ-0012", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Government Permits"},
  {q:"Which areas and hours are covered by government parking permits?", a:"<p>Please note the following regulations for government permits:</p>\n<table>\n<tr><th>Rule</th><th>Details</th></tr>\n<tr><td><strong>Location</strong></td><td>Government permits cover only the sector where the workplace is located</td></tr>\n<tr><td><strong>Time Validity</strong></td><td>The permit itself will state the applicable timings. Refer to your permit for precise hours. Outside permitted hours, parking fees apply</td></tr>\n<tr><td><strong>Exclusions</strong></td><td>Government permits do not cover residential parking areas</td></tr>\n</table>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Government Permits Which areas and hours are covered by government parking permits", id:"FAQ-0294", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Government Permits"},
  {q:"How long are these institution/government parking permits valid?", a:"<p>Government permits are valid for <strong>1 year</strong> and cost <span class=\"amount\">AED 1,200</span>.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Government Permits How long are these institution government parking permits valid", id:"FAQ-0171", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Government Permits"},
  {q:"How can I renew this permit (Renewal Process)?", a:"<p>You can renew your permit by submitting the correct documentation and payment <strong>before the expiry</strong> of the current permit.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Government Permits How can I renew this permit (Renewal Process)", id:"FAQ-0175", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Government Permits"},
  {q:"Who is eligible for institution/government parking permits (Eligibility Process)?", a:"<p>This service is applicable for government entities.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Government Permits Who is eligible for institution government parking permits (Eligibility Process)", id:"FAQ-0016", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Government Permits"},
  {q:"Can these permits be transferred to another vehicle (Move Permit to Another Car)?", a:"<p>Yes, however, the request must be processed through the entity's contact person.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Government Permits Can these permits be transferred to another vehicle (Move Permit to Another Car)", id:"FAQ-0014", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Government Permits"},
  {q:"How long are these permits valid for?", a:"<p>They are valid for 1 year and cost 1200.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Government Permits How long are these permits valid for", id:"FAQ-0013", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Government Permits"},
  {q:"What is the duration process (Processing Duration)?", a:"<p>The permit takes 3 working days after the payment has been made.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Government Permits What is the duration process (Processing Duration)", id:"FAQ-0017", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Government Permits"},
