  {q:"What documents are required for a Visitor/Tourist POD parking permit?", a:"<ul><li><strong>People of Determination card</strong> or POD parking permit issued by their country</li><li><strong>Rental contract</strong> for rented vehicle</li><li><strong>Copy of vehicle licence</strong> registered outside UAE (driving licence)</li></ul><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"", a_ar:"", kw:"POD visitor tourist parking permit documents required rental", id:"FAQ-POD-006", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"POD Permits"},
  {q:"Is the Mawaqif POD parking permit free?", a:"<p>Yes. The POD parking permit is <strong>free of charge</strong>.</p><table><tr><th>Permit Type</th><th>Fee</th></tr><tr><td>People of Determination</td><td class=\"amount\">Free</td></tr><tr><td>Senior Citizen</td><td class=\"amount\">Free</td></tr><tr><td>Visitor/Tourist POD</td><td class=\"amount\">Free</td></tr></table><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"", a_ar:"", kw:"POD parking permit free cost fee payment", id:"FAQ-POD-007", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"POD Permits"},
  {q:"How do I renew a POD parking permit?", a:"<p>Renewal is done through the TAMM platform:</p><p><a href=\"https://www.tamm.abudhabi/en/life-events/individual/SupportCommunityEnvironment/PoD-Support/RenewaParkingPermitforPeopleofDetermination\" target=\"_blank\">Renew POD Parking Permit on TAMM ↗</a></p><p>For additional inquiries contact Zayed Higher Organization:<br>📞 <strong>800 555</strong> | 🌐 <a href=\"https://www.za.gov.ae/\" target=\"_blank\">za.gov.ae</a></p><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"", a_ar:"", kw:"POD parking permit renew renewal TAMM", id:"FAQ-POD-008", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"POD Permits"},
  {q:"What is the fine for parking in a POD space without a valid permit?", a:"<p>Parking in a space reserved for People of Determination without a valid POD permit carries a fine of:</p><div style=\"text-align:center;font-size:28px;font-weight:800;color:#c62828;padding:12px;\">AED 1,000</div><p>+ Immediate towing may apply.</p><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"", a_ar:"", kw:"POD parking fine violation disabled space no permit AED 1000", id:"FAQ-POD-009", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"POD Permits"},
  {q:"Does the DARB toll system also have a POD exemption?", a:"<p>Yes. People of Determination can apply for a <strong>DARB toll exemption</strong> through the Darb app:</p><ol><li>Open the <strong>Darb App</strong></li><li>Go to <strong>Requests → Add New Request</strong></li><li>Select <strong>Exemption → People of Determination</strong></li><li>Upload: POD Card + Emirates ID + Vehicle Registration + Proof of kinship (if applicable)</li></ol><p>The exemption covers <strong>one vehicle</strong> per POD card holder. It can be transferred between vehicles by first cancelling the exemption on the first vehicle.</p><div class=\"info-box\">POD holders may also qualify for an <strong>additional exemption</strong> if they meet another category (Senior Citizen, Retiree, Low Income).</div><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"", a_ar:"", kw:"POD DARB toll exemption people of determination apply Darb app", id:"FAQ-POD-010", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"POD Permits"},
  {q:"What is an Institution/Government Parking Permit?", a:"<p>These permits are issued to employees of government institutions and other approved organizations. They allow parking in designated areas near the institution without additional charges.</p><ul><li>Valid for <strong>1 year</strong></li><li>Cost: <span class=\"amount\">AED 1,200</span></li><li>Processing time: <strong>3 working days</strong> after payment</li><li>Permits can be transferred to another vehicle, but the request must go through the entity's contact person</li></ul><p>Each entity must assign a <strong>contact person</strong> to process the application with Q Mobility.</p><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"", a_ar:"", kw:"Parking Institution Government Permit employee organization", id:"FAQ-IGP-001", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Institution Permits"},

  // ===== NEW CONTENT — added 2026-06-07 (Free Flow, Musaffah/MBZ Phase 3, DARB X bank card) =====

  // --- Free Flow / Auto-Deduction Paid Parking (general) ---
  {q:"What is the Free Flow paid parking system (auto-deduction via Darb wallet)?", a:"<p>Free Flow is an <strong>AI-powered, fully automated paid parking system</strong> launched by Q Mobility in Abu Dhabi on <strong>1 June 2026</strong>. There are <strong>no tickets, no barriers, and no cash payments</strong>.</p><ul><li>Cameras with automatic license-plate recognition register your vehicle on entry</li><li>On exit, the parking fee is calculated and <strong>deducted directly from your Darb wallet</strong></li><li>No SMS, no QR code scanning, and no payment machine needed</li></ul><div class=\"info-box\">Vehicles <strong>not registered in Darb</strong> can pay within 24 hours of exit at <a href=\"https://freeflow.qmobility.ae\" target=\"_blank\">freeflow.qmobility.ae</a>.</div><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"ما هو نظام المواقف الذكية المدفوعة (الخصم التلقائي عبر محفظة درب)؟", a_ar:"<p>نظام المواقف الذكية هو حل تقني ذكي مدعوم بالذكاء الاصطناعي، أطلقته كيو موبيليتي في أبوظبي بتاريخ 1 يونيو 2026. لا حاجة للتذاكر أو الحواجز أو الدفع النقدي.</p><ul><li>يتم تسجيل لوحة مركبتك تلقائياً عبر كاميرات مدعومة بالذكاء الاصطناعي عند الدخول</li><li>عند الخروج تُحتسب الرسوم وتُخصم مباشرة من محفظة درب</li></ul><p>المركبات غير المسجلة في درب يمكنها الدفع خلال 24 ساعة عبر: freeflow.qmobility.ae</p>", kw:"Free Flow freeflow auto deduction auto-deduction smart parking AI plate recognition darb wallet barrier free no ticket private parking how it works what is", id:"FAQ-FF-001", page:"faq-priv-general", cat:"Private Parking", subcat:"Free Flow"},
  {q:"How does Free Flow auto-deduction payment work?", a:"<p>When you <strong>enter</strong> a Free Flow parking area, AI cameras automatically read your license plate and start the parking session.</p><p>When you <strong>exit</strong>, the parking fee is calculated and deducted directly from your <strong>Darb wallet</strong> — with no need to send an SMS, scan a QR code, or use a payment machine.</p><div class=\"info-box\">Make sure your vehicle is registered in the Darb app and your wallet has <strong>sufficient balance</strong> before using the service.</div><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"", a_ar:"", kw:"Free Flow freeflow auto deduction how does it work payment darb wallet exit entry plate", id:"FAQ-FF-002", page:"faq-priv-general", cat:"Private Parking", subcat:"Free Flow"},
  {q:"Where is Free Flow paid parking currently available (key locations)?", a:"<p>In its initial phase, Free Flow auto-deduction parking is available at several key locations across Abu Dhabi, including multi-storey car parks and selected private parking areas:</p><ul><li><strong>Abu Dhabi Mall</strong> parking</li><li><strong>Parking Building No. 1</strong> — Sector East 6 (Tawi An Nasb St.)</li><li><strong>Parking Building No. 2</strong> — Sheikh Sultan Bin Zayed the First St. (at Al Saj'ah St.)</li><li><strong>Parking Building No. 5</strong> — Soughiyyah St.</li><li><strong>MBZ City:</strong> ME9 (Barqa Al 'Iqaylah St.), ME10 (Um Al Bisr St. &amp; Al Ahella St.), ME12 (Razim St.)</li><li><strong>Sector W5</strong> — Corniche St.</li><li><strong>Sector W13-01</strong> — Airport Road</li><li><strong>Sector E19</strong> — Rashid Bin Saeed St. (at Sheikha Fatima Bint Mubarak St.)</li><li><strong>Sector E18-01</strong> — Rashid Bin Saeed St. (and at Hazza' Bin Zayed the First St.)</li></ul><div class=\"info-box\">Coverage is expanding gradually to additional locations across the emirate.</div><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"", a_ar:"", kw:"Free Flow freeflow key locations where available abu dhabi mall parking building MSCP W5 W13 E18 E19 ME9 ME10 ME12 corniche airport coverage list", id:"FAQ-FF-003", page:"faq-priv-general", cat:"Private Parking", subcat:"Free Flow"},
  {q:"Do I need to download an app to use Free Flow parking?", a:"<p>Yes. To benefit from automatic fee deduction you must:</p><ol><li>Download the <strong>Darb app</strong></li><li>Make sure your <strong>vehicle is registered</strong> in Darb</li><li>Keep a <strong>sufficient wallet balance</strong></li></ol><p>If your vehicle is not registered in Darb, you can still pay within 24 hours of exit at <a href=\"https://freeflow.qmobility.ae\" target=\"_blank\">freeflow.qmobility.ae</a>.</p><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"", a_ar:"", kw:"Free Flow freeflow app download darb register vehicle balance needed required", id:"FAQ-FF-004", page:"faq-priv-general", cat:"Private Parking", subcat:"Free Flow"},
  {q:"What happens if my vehicle is not registered in Darb at a Free Flow car park?", a:"<p>For vehicles <strong>not registered in the Darb app</strong>, parking fees can be paid <strong>within 24 hours of exit</strong> through the website:</p><p><a href=\"https://freeflow.qmobility.ae\" target=\"_blank\">https://freeflow.qmobility.ae</a></p><div class=\"info-box\">Pay within 24 hours to avoid a violation.</div><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"", a_ar:"", kw:"Free Flow freeflow not registered unregistered vehicle pay 24 hours website non darb user", id:"FAQ-FF-005", page:"faq-priv-general", cat:"Private Parking", subcat:"Free Flow"},
  {q:"If I enter a Free Flow car park but don't find a space and leave, am I charged?", a:"<p><strong>No.</strong> If your vehicle <strong>exits within 10 minutes</strong> of entering, no parking fee is charged.</p><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"", a_ar:"", kw:"Free Flow freeflow grace period 10 minutes no space exit no charge free", id:"FAQ-FF-006", page:"faq-priv-general", cat:"Private Parking", subcat:"Free Flow"},
  {q:"What if there is insufficient balance in my Darb wallet when using Free Flow?", a:"<p>You must <strong>recharge your Darb wallet within 24 hours</strong> of exit so the parking fee can be deducted automatically and to avoid any fines.</p><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"", a_ar:"", kw:"Free Flow freeflow insufficient balance recharge 24 hours top up wallet fine avoid", id:"FAQ-FF-007", page:"faq-priv-general", cat:"Private Parking", subcat:"Free Flow"},

  // --- Musaffah Paid Parking — Phase 3 ---
  {q:"When did paid parking start in the new Musaffah sectors (Phase 3)?", a:"<p>Paid parking in the new Musaffah sectors began on <strong>18 May 2026</strong> under Phase 3, covering sectors <strong>M5, M6, M21, M22, and M23</strong>.</p><p>A total of <strong>3,921 surface parking spaces</strong> were activated, including dedicated spaces for People of Determination:</p><table><tr><th>Sector</th><th>Spaces</th></tr><tr><td>M5</td><td>661</td></tr><tr><td>M6</td><td>710</td></tr><tr><td>M21</td><td>1,100</td></tr><tr><td>M22</td><td>800</td></tr><tr><td>M23</td><td>650</td></tr></table><p>The fee is <span class=\"amount\">AED 2 per hour</span>.</p><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"متى بدأ تطبيق نظام المواقف المدفوعة في القطاعات الجديدة في مصفح (المرحلة الثالثة)؟", a_ar:"<p>بدأ تطبيق النظام اعتباراً من 18 مايو 2026 في القطاعات M5 وM6 وM21 وM22 وM23، بإجمالي 3,921 موقفاً. الرسوم 2 درهم للساعة.</p>", kw:"Musaffah Mussafah phase 3 paid parking start date 18 may 2026 M5 M6 M21 M22 M23 sectors spaces 2 AED hour", id:"FAQ-MUS-001", page:"faq-maw-mussafah", cat:"MAWAQIF — Parking", subcat:"Mussafah"},
  {q:"Which Musaffah sectors have paid parking (all phases)?", a:"<p>Paid parking in Musaffah has been rolled out in phases:</p><table><tr><th>Phase</th><th>Start date</th><th>Sectors</th></tr><tr><td>Phase 1</td><td>12 January 2026</td><td>M1, M2, M3, M4, M24</td></tr><tr><td>Phase 2</td><td>20 April 2026</td><td>M7, M8, M9, M14, M15</td></tr><tr><td>Phase 3</td><td>18 May 2026</td><td>M5, M6, M21, M22, M23</td></tr></table><p>Fee: <span class=\"amount\">AED 2 per hour</span>, Monday–Saturday 8:00 AM–12:00 AM (midnight). Free on Sundays and public holidays.</p><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"", a_ar:"", kw:"Musaffah Mussafah sectors covered paid parking phase 1 2 3 list M1 M2 M3 M4 M24 M7 M8 M9 M14 M15 M5 M6 M21 M22 M23 dates", id:"FAQ-MUS-002", page:"faq-maw-mussafah", cat:"MAWAQIF — Parking", subcat:"Mussafah"},
  {q:"How do I pay for parking in Musaffah, and what are the fees?", a:"<p>The fee for standard surface parking in Musaffah is <span class=\"amount\">AED 2 per hour</span> (capped at <span class=\"amount\">AED 15 per day</span>), Monday–Saturday 8:00 AM–12:00 AM. Free on Sundays and public holidays.</p><p>Payment channels:</p><ul><li><strong>Darb</strong> app</li><li><strong>TAMM</strong> app</li><li><strong>SMS</strong></li><li><strong>Payment machines</strong> available in the area</li></ul><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"", a_ar:"", kw:"Musaffah Mussafah parking fee how to pay 2 AED hour 15 day darb tamm sms machine payment", id:"FAQ-MUS-003", page:"faq-maw-mussafah", cat:"MAWAQIF — Parking", subcat:"Mussafah"},

  // --- Mohamed Bin Zayed City Paid Parking — Phase 3 ---
  {q:"When did paid parking start in the new MBZ City commercial sectors (Phase 3)?", a:"<p>Paid parking in the new commercial sectors of Mohamed Bin Zayed City began on <strong>6 May 2026</strong> under Phase 3, covering sectors <strong>ME9 and ME12</strong>.</p><p>A total of <strong>10,205 parking spaces</strong> were activated (ME9: 3,219 &middot; ME12: 6,986), including dedicated spaces for People of Determination. The fee is <span class=\"amount\">AED 2 per hour</span>.</p><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"متى بدأ تطبيق نظام المواقف المدفوعة في القطاعات التجارية الجديدة بمدينة محمد بن زايد (المرحلة الثالثة)؟", a_ar:"<p>بدأ تفعيل النظام اعتباراً من 6 مايو 2026 في القطاعين التجاريين ME9 وME12، بإجمالي 10,205 موقفاً (ME9: 3,219 وME12: 6,986). الرسوم 2 درهم للساعة.</p>", kw:"MBZ Mohamed Bin Zayed City phase 3 paid parking start date 6 may 2026 ME9 ME12 commercial sectors spaces 2 AED hour", id:"FAQ-MBZ-001", page:"faq-maw-mbz", cat:"MAWAQIF — Parking", subcat:"MBZ City"},
  {q:"Which Mohamed Bin Zayed City sectors have paid parking (all phases)?", a:"<p>Paid parking in MBZ City has been rolled out in phases:</p><table><tr><th>Phase</th><th>Date</th><th>Coverage</th></tr><tr><td>Phase 1</td><td>15 December 2025</td><td>Parking regulated (initially free) in ME9, ME10, ME11, ME12</td></tr><tr><td>Phase 2</td><td>6 April 2026</td><td>Paid parking in ME10 &amp; ME11, plus main-street commercial areas in villa zones Z17-01, Z19, Z20, Z27</td></tr><tr><td>Phase 3</td><td>6 May 2026</td><td>Paid parking in commercial sectors ME9 &amp; ME12</td></tr></table><p>Fee: <span class=\"amount\">AED 2 per hour</span>.</p><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"", a_ar:"", kw:"MBZ Mohamed Bin Zayed City sectors covered paid parking phase 1 2 3 ME9 ME10 ME11 ME12 villa zones Z17 Z19 Z20 Z27 dates history", id:"FAQ-MBZ-002", page:"faq-maw-mbz", cat:"MAWAQIF — Parking", subcat:"MBZ City"},
  {q:"How do I pay for parking in MBZ City, and what are the fees?", a:"<p>The fee for parking in Mohamed Bin Zayed City is <span class=\"amount\">AED 2 per hour</span>. Payment can be made through:</p><ul><li><strong>Darb</strong> app</li><li><strong>TAMM</strong> app</li><li><strong>SMS</strong></li><li><strong>Payment machines</strong> available in the area</li></ul><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"", a_ar:"", kw:"MBZ Mohamed Bin Zayed City parking fee how to pay 2 AED hour darb tamm sms machine payment", id:"FAQ-MBZ-003", page:"faq-maw-mbz", cat:"MAWAQIF — Parking", subcat:"MBZ City"},

  // --- DARB X app — bank card setup ---
  {q:"How do I set up a bank card in the new DARB X app?", a:"<p>To add a credit/debit card in the new <strong>DARB X</strong> application:</p><ol><li>Open the <strong>DARB X</strong> app and log in using <strong>UAE Pass</strong></li><li>Tap the <strong>wallet icon</strong> in the top-left corner</li><li>Select your wallet, then tap <strong>Top-Up</strong></li><li>Choose the desired amount, then select the <strong>payment method</strong></li><li>Tap <strong>Add Credit/Debit Card</strong></li><li>Enter your card details to complete the setup and use it for payment</li></ol><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"", a_ar:"", kw:"DARB X app bank card credit debit card setup add UAE Pass wallet top up payment method new application", id:"FAQ-DX-001", page:"faq-darb-wallet", cat:"DARB — Wallet", subcat:"Payments"},

  // ===== PLAYBOOK CONTENT — added 2026-06-07 (from call-center scenarios PDF) =====

  // --- Key contact numbers ---
  {q:"What are the important contact numbers (Q Mobility, ITC, RTA, impound)?", a:"<table><tr><th>Entity</th><th>Number</th><th>Use for</th></tr><tr><td><strong>Q Mobility</strong></td><td class=\"amount\">800 3009</td><td>DARB toll &amp; Mawaqif parking — call/WhatsApp</td></tr><tr><td><strong>ITC (Integrated Transport Centre)</strong></td><td class=\"amount\">800 850</td><td>Grievances that are rejected/exceeded SLA; fines in sectors NOT under Mawaqif (Marsad team)</td></tr><tr><td><strong>Zayed Higher Organization</strong></td><td class=\"amount\">800 555</td><td>People of Determination (POD) permit help</td></tr><tr><td><strong>Dubai RTA</strong></td><td class=\"amount\">800 9090</td><td>POD permit issued by Dubai / linking to Abu Dhabi</td></tr><tr><td><strong>Emirates Auctions</strong></td><td class=\"amount\">800 0666666</td><td>Vehicle impounded outside Q Mobility coverage (Bani Yas, outside AD city, 6+ months)</td></tr><tr><td><strong>Confiscated Impound Yard</strong></td><td class=\"amount\">02 513 4278</td><td>Confiscated / Marsad-impounded vehicles</td></tr></table><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"ما هي أرقام الاتصال المهمة (كيو موبيليتي، مركز النقل، RTA، الحجز)؟", a_ar:"<table><tr><th>الجهة</th><th>الرقم</th><th>الاستخدام</th></tr><tr><td><strong>كيو موبيليتي</strong></td><td class=\"amount\">800 3009</td><td>درب والمواقف — اتصال/واتساب</td></tr><tr><td><strong>مركز النقل المتكامل (ITC)</strong></td><td class=\"amount\">800 850</td><td>التظلمات المرفوضة أو المتأخرة، والمخالفات في القطاعات غير التابعة لمواقف</td></tr><tr><td><strong>مؤسسة زايد العليا</strong></td><td class=\"amount\">800 555</td><td>تصاريح أصحاب الهمم</td></tr><tr><td><strong>هيئة طرق دبي RTA</strong></td><td class=\"amount\">800 9090</td><td>تصريح أصحاب الهمم الصادر من دبي وربطه بأبوظبي</td></tr><tr><td><strong>مزادات الإمارات</strong></td><td class=\"amount\">800 0666666</td><td>حجز المركبة خارج تغطية كيو موبيليتي (بني ياس، خارج المدينة، 6 أشهر فأكثر)</td></tr><tr><td><strong>ساحة الحجز/المصادرة</strong></td><td class=\"amount\">02 513 4278</td><td>المركبات المصادرة أو المحجوزة من فريق مرصد</td></tr></table>", kw:"contact numbers phone ITC 800850 zayed 800555 RTA 8009090 emirates auctions 800 0666666 confiscated impound 02 5134278 escalation hotline reach", id:"FAQ-PB-CONTACT", page:"faq-maw-others", cat:"MAWAQIF — General", subcat:"Contact"},

  // --- SMS payment formats ---
  {q:"What is the SMS format to pay for parking, and the emirate/GCC codes?", a:"<p>Make sure your phone has credit, then send an SMS to <strong>3009</strong> (private vehicles only):</p><ul><li><strong>Abu Dhabi vehicle:</strong> <code>AUH10 00000 S/P 1:24</code> (plate code, plate number, S=Standard/P=Premium, hours)</li><li><strong>GCC vehicle (e.g. Qatar):</strong> <code>QAT 00000 S/P 1:24</code></li></ul><h4>UAE emirate short codes</h4><p>Abu Dhabi = <strong>AUH</strong>, Dubai = <strong>DXB</strong>, Sharjah = <strong>SHJ</strong>, Ajman = <strong>AJM</strong>, Fujairah = <strong>FUJ</strong>, Umm Al Quwain = <strong>UAQ</strong>, Ras Al Khaimah = <strong>RAK</strong></p><h4>GCC short codes</h4><p>Saudi = <strong>KSA</strong> or <strong>SAU</strong>, Qatar = <strong>QAT</strong>, Kuwait = <strong>KWT</strong>, Bahrain = <strong>BAH</strong> or <strong>BHR</strong>, Oman = <strong>OMN</strong></p><div class=\"info-box\">SMS payment works for <strong>private cars only</strong>. Non-private categories (Green/Yellow/Orange/1st/2nd) must pay via Darb app/website or Mawaqif machines. If the SMS fails, it is usually low credit or a SIM issue — use another method and contact the telecom provider.</div><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"ما هي صيغة الرسالة النصية لدفع رسوم المواقف ورموز الإمارات ودول الخليج؟", a_ar:"<p>تأكد من وجود رصيد، ثم أرسل رسالة إلى <strong>3009</strong> (للسيارات الخصوصية فقط):</p><ul><li><strong>مركبة أبوظبي:</strong> <code>AUH10 00000 S/P 1:24</code></li><li><strong>مركبة خليجية (قطر مثلاً):</strong> <code>QAT 00000 S/P 1:24</code></li></ul><p><strong>رموز الإمارات:</strong> أبوظبي AUH، دبي DXB، الشارقة SHJ، عجمان AJM، الفجيرة FUJ، أم القيوين UAQ، رأس الخيمة RAK</p><p><strong>رموز الخليج:</strong> السعودية KSA/SAU، قطر QAT، الكويت KWT، البحرين BAH/BHR، عُمان OMN</p><div class=\"info-box\">الدفع بالرسائل للسيارات الخصوصية فقط. الفئات غير الخصوصية تدفع عبر تطبيق درب أو أجهزة مواقف.</div>", kw:"sms format pay parking 3009 AUH DXB SHJ AJM FUJ UAQ RAK KSA QAT KWT BAH OMN emirate gcc code standard premium private vehicle how to text message", id:"FAQ-PB-SMS", page:"faq-maw-others", cat:"MAWAQIF — Pay for Parking", subcat:"Pay for Parking"},

  // --- Combined / merged residential sectors ---
  {q:"Which nearby sectors can a resident permit holder park in (combined sectors)?", a:"<p>Some residential sectors are <strong>combined</strong>, so a resident permit issued for one sector also allows parking in the listed nearby sectors:</p><table><tr><th>Permit sector</th><th>Also allowed in</th></tr><tr><td>E9-02</td><td>E7 &amp; E9-01</td></tr><tr><td>W1</td><td>W2</td></tr><tr><td>W2</td><td>W1</td></tr><tr><td>W7-01</td><td>W7-02</td></tr><tr><td>W5</td><td>W7-02</td></tr><tr><td>E19</td><td>W14-02</td></tr><tr><td>W14-02</td><td>E19</td></tr><tr><td>W10</td><td>W12</td></tr><tr><td>W12</td><td>W10</td></tr><tr><td>E18</td><td>E18-02 + E18-03</td></tr><tr><td>E16</td><td>E16-01 + E16-02</td></tr><tr><td>E1</td><td>E5 &amp; E2</td></tr><tr><td>E2</td><td>E6 &amp; E1</td></tr><tr><td>W17-01</td><td>W17-02 + W17-03 + W13-02</td></tr><tr><td>W17-02</td><td>W17-01 + W17-03 + W13-02</td></tr><tr><td>W17-03</td><td>W17-01 + W17-02 + W13-02 + W36 + W37 + W39 + W16</td></tr><tr><td>W13-02</td><td>W17-01 + W17-02 + W17-03</td></tr><tr><td>W16</td><td>W36 + W37 + W39 + W17-03</td></tr><tr><td>W36 / W37 / W39</td><td>each other + W16 + W17-03</td></tr><tr><td>E33</td><td>E32</td></tr><tr><td>E32</td><td>E33</td></tr><tr><td>W46 group</td><td>W46-01, W46-02, W52, W52-01, W52-02, W47, W48 (all combined)</td></tr><tr><td>W18-01 / W18-02 / W18-03</td><td>each other</td></tr><tr><td>W21</td><td>W22</td></tr><tr><td>W22</td><td>W21</td></tr><tr><td>W31</td><td>W49</td></tr><tr><td>W49</td><td>W31</td></tr><tr><td>E20-02</td><td>W15-02</td></tr><tr><td>E36 / E37 / E38</td><td>each other</td></tr><tr><td>E41</td><td>E41-01</td></tr><tr><td>E41-01</td><td>E41</td></tr><tr><td>E38-01</td><td>E43</td></tr><tr><td>E43</td><td>E38-01</td></tr></table><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"في أي قطاعات مجاورة يمكن لحامل تصريح السكان الوقوف (القطاعات المدموجة)؟", a_ar:"<p>بعض القطاعات السكنية <strong>مدموجة</strong>، فيُسمح لحامل تصريح قطاع بالوقوف أيضاً في القطاعات المجاورة المذكورة (مثل: E9-02 مع E7 وE9-01، وW1 مع W2 ...). راجع الجدول في النسخة الإنجليزية للقائمة الكاملة.</p>", kw:"combined merged sectors resident permit park nearby allowed E9 W1 W2 W17 W46 E18 E16 list zone residential which sectors", id:"FAQ-PB-COMBINED", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Resident Permits"},

  // --- Branches ---
  {q:"Where are the Q Mobility branches and what are their working hours?", a:"<h4>Abu Dhabi Branch (main driver &amp; vehicle licensing centre)</h4><ul><li><strong>Location:</strong> Junction of Sultan Bin Zayed the First St. &amp; Al Dhafra St., Al Mushrif (opposite Mushrif Mall)</li><li><strong>Hours:</strong> Monday–Thursday 7:30 AM–3:30 PM; Friday 7:30 AM–11:30 AM</li></ul><h4>Al Ain Branch</h4><ul><li><strong>Location:</strong> Falaj Hazza, Al Hala Street, Al Ain</li></ul><p><strong>Visit a branch only for:</strong> modifying a temporary permit; converting a resident permit to a villa permit (or vice-versa); viewing Mawaqif violation images on request; cancelling a resident permit; or providing a vehicle-data certificate for old-owner fines.</p><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"أين فروع كيو موبيليتي وما هي أوقات العمل؟", a_ar:"<h4>فرع أبوظبي (المركز الرئيسي لترخيص السائقين والمركبات)</h4><ul><li><strong>الموقع:</strong> تقاطع شارع سلطان بن زايد الأول وشارع الظفرة، المشرف (مقابل مشرف مول)</li><li><strong>الأوقات:</strong> الاثنين–الخميس 7:30 ص–3:30 م؛ الجمعة 7:30 ص–11:30 ص</li></ul><h4>فرع العين</h4><ul><li><strong>الموقع:</strong> فلج هزاع، شارع الهلا، العين</li></ul><p><strong>التوجه للفرع فقط في حال:</strong> تعديل تصريح مؤقت؛ تحويل تصريح سكان إلى فلل أو العكس؛ الاطلاع على صور المخالفات عند الطلب؛ إلغاء تصاريح السكان؛ أو تقديم شهادة بيانات مركبة لمخالفات المالك القديم.</p>", kw:"branch branches location working hours abu dhabi mushrif al ain falaj hazza office address open times visit when", id:"FAQ-PB-BRANCH", page:"faq-maw-others", cat:"MAWAQIF — General", subcat:"Branches"},

  // --- School parking hours ---
  {q:"What are the paid parking hours around schools?", a:"<p>Parking around schools in Abu Dhabi and Al Ain is regulated:</p><h4>Abu Dhabi Emirate</h4><ul><li>Morning: <strong>7:00 AM – 9:00 AM</strong></li><li>Afternoon: <strong>12:00 PM – 4:00 PM</strong></li></ul><h4>Al Ain City</h4><ul><li><strong>8:00 AM – 11:59 PM</strong> (midnight)</li></ul><div class=\"info-box\">There are <strong>no exemptions</strong> — vehicles may not park free during these periods without paying the due fees.</div><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"ما هي أوقات المواقف المدفوعة حول المدارس؟", a_ar:"<p>تنظيم مواقف السيارات حول المدارس في أبوظبي والعين:</p><h4>إمارة أبوظبي</h4><ul><li>صباحاً: <strong>7:00 – 9:00 ص</strong></li><li>بعد الظهر: <strong>12:00 – 4:00 م</strong></li></ul><h4>مدينة العين</h4><ul><li><strong>8:00 صباحاً – 11:59 مساءً</strong> (منتصف الليل)</li></ul><div class=\"info-box\">لا توجد أي استثناءات؛ لا يُسمح بالوقوف مجاناً خلال هذه الفترات دون دفع الرسوم.</div>", kw:"school schools parking hours timing abu dhabi al ain morning afternoon 7 9 12 4 no exemption fees", id:"FAQ-PB-SCHOOL", page:"faq-maw-hours", cat:"MAWAQIF — Parking", subcat:"Parking Hours"},

  // --- Prayer time fine ---
  {q:"I got a Mawaqif fine during prayer time — is prayer time exempt?", a:"<p>The prayer-time exemption applies <strong>only in mosque-designated parking areas</strong>. If the vehicle was parked in a regular public parking area without a valid ticket, the fine is valid even during prayer time.</p><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"حصلت على مخالفة مواقف وقت الصلاة — هل وقت الصلاة مستثنى؟", a_ar:"<p>إعفاء وقت الصلاة ينطبق <strong>فقط في مواقف المساجد المخصصة</strong>. إذا كانت المركبة في موقف عام عادي بدون تذكرة سارية، فالمخالفة صحيحة حتى في وقت الصلاة.</p>", kw:"prayer time fine mosque parking exemption salah regular public area ticket valid", id:"FAQ-PB-PRAYER", page:"faq-maw-grievances", cat:"MAWAQIF — Fines", subcat:"Parking Fines"},

  // --- 10-minute grace period ---
  {q:"I got a fine but didn't get my 10-minute grace period — why?", a:"<p>The <strong>10-minute grace period</strong> applies only when there was <strong>no parking ticket reserved on the same day</strong>. If you already had a valid ticket that expired, the grace period does not apply — and a reminder is usually sent 15 minutes before expiry.</p><p>To dispute, submit a grievance via the TAMM app/platform (sign in to the vehicle owner's account → Grievance for Transport Violations). Feedback by SMS within 7 working days.</p><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"حصلت على مخالفة ولم أحصل على مهلة الـ10 دقائق — لماذا؟", a_ar:"<p>تنطبق <strong>مهلة الـ10 دقائق</strong> فقط عند عدم وجود تذكرة وقوف محجوزة في نفس اليوم. إذا كانت لديك تذكرة سارية وانتهت صلاحيتها فلا تنطبق المهلة، ويُرسل تذكير عادةً قبل 15 دقيقة من الانتهاء.</p><p>للاعتراض قدّم تظلماً عبر تطبيق/منصة تم، وستصلك النتيجة برسالة خلال 7 أيام عمل.</p>", kw:"grace period 10 minutes fine ticket reserved same day reminder 15 minutes grievance tamm dispute", id:"FAQ-PB-GRACE", page:"faq-maw-grievances", cat:"MAWAQIF — Fines", subcat:"Parking Fines"},

  // --- Fine in non-Mawaqif sector ---
  {q:"My fine is in a sector not covered by Mawaqif (Marsad/ITC) — what do I do?", a:"<p>Some fines are issued by the <strong>Marsad team</strong> in sectors under the <strong>ITC</strong>, not Mawaqif (for example M40, or areas like Bani Yas). In that case, Q Mobility cannot action the fine — please contact <strong>ITC on 800 850</strong>.</p><div class=\"info-box\">To check whether a sector is under Mawaqif, use the <strong>Smart Sector Map</strong>.</div><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"مخالفتي في قطاع غير تابع لمواقف (مرصد/مركز النقل) — ماذا أفعل؟", a_ar:"<p>بعض المخالفات يصدرها <strong>فريق مرصد</strong> في قطاعات تابعة لمركز النقل المتكامل (ITC) وليست مواقف (مثل M40 أو مناطق مثل بني ياس). في هذه الحالة يرجى التواصل مع <strong>مركز النقل على 800 850</strong>.</p><div class=\"info-box\">للتأكد إن كان القطاع تابعاً لمواقف، استخدم خريطة القطاعات الذكية.</div>", kw:"fine sector not mawaqif marsad ITC 800850 M40 bani yas smart sector map escalation transport centre", id:"FAQ-PB-NONMAW", page:"faq-maw-grievances", cat:"MAWAQIF — Fines", subcat:"Parking Fines"},

  // --- Grievance follow-up / SLA ---
  {q:"I submitted a grievance/complaint and haven't heard back — how long does it take?", a:"<p>Grievances and complaints take <strong>up to 7 working days</strong> from the application date. You can follow up with the <strong>fine number or plate number</strong> (the grievance request number is not required).</p><ul><li>If a grievance was <strong>rejected</strong> or has <strong>exceeded 7 working days</strong>, the authorised department is <strong>ITC — call 800 850</strong>.</li><li>If a Mawaqif complaint has exceeded its SLA, we escalate it to the concerned department for immediate action.</li></ul><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"قدّمت تظلماً/شكوى ولم يصلني رد — كم يستغرق؟", a_ar:"<p>تستغرق التظلمات والشكاوى <strong>حتى 7 أيام عمل</strong> من تاريخ التقديم. يمكن المتابعة برقم المخالفة أو رقم اللوحة (لا حاجة لرقم التظلم).</p><ul><li>إذا رُفض التظلم أو تجاوز 7 أيام عمل، فالجهة المختصة هي <strong>مركز النقل ITC — 800 850</strong>.</li><li>إذا تجاوزت شكوى مواقف المدة المحددة، نقوم بتصعيدها للجهة المعنية.</li></ul>", kw:"grievance complaint follow up status 7 working days SLA rejected exceeded ITC 800850 escalate feedback", id:"FAQ-PB-GRVSLA", page:"faq-maw-grievances", cat:"MAWAQIF — Grievances", subcat:"Parking Grievance"},

  // --- Old-owner fines ---
  {q:"There are parking fines from the previous owner on my vehicle — how to remove them?", a:"<p>If fines belong to the <strong>previous owner</strong>, the current owner must obtain a <strong>Vehicle Data Certificate</strong> from Traffic (proving the vehicle was not under their name at the time of the violation) and bring it to a Q Mobility branch. The fines are then transferred back to the previous owner.</p><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"توجد مخالفات مواقف من المالك السابق على مركبتي — كيف تُزال؟", a_ar:"<p>إذا كانت المخالفات تخص <strong>المالك السابق</strong>، على المالك الحالي إحضار <strong>شهادة بيانات مركبة</strong> من المرور (تثبت أن المركبة لم تكن باسمه وقت المخالفة) وتقديمها لفرع كيو موبيليتي، ليتم تحويل المخالفات على المالك السابق.</p>", kw:"old previous owner fines vehicle data certificate traffic branch transfer remove sold car violations", id:"FAQ-PB-OLDOWNER", page:"faq-maw-grievances", cat:"MAWAQIF — Grievances", subcat:"Parking Grievance"},

  // --- Court / old fine documents ---
  {q:"What documents are needed for a court-paid or old fine update?", a:"<p>If a fine was paid through the court (the system shows it as Locked), email the documents to <strong>customer.care@qmobility.ae</strong> (or bring them to a branch):</p><ul><li>Stop-search document (كف البحث)</li><li>Court judgment / judge's order</li><li>Emirates ID</li><li>Traffic code</li><li>Court payment receipt</li><li>Stamped Mawaqif violations statement + Traffic stamp from the Public Prosecution</li></ul><div class=\"info-box\">The total number of violations in the judgment must match the number attached in the statements.</div><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"ما المستندات المطلوبة لتحديث مخالفة مدفوعة عبر المحكمة أو مخالفة قديمة؟", a_ar:"<p>إذا دُفعت المخالفة عبر المحكمة (يظهرها النظام Locked)، أرسل المستندات إلى <strong>customer.care@qmobility.ae</strong> أو أحضرها للفرع:</p><ul><li>كف البحث</li><li>نص الحكم / أمر القاضي</li><li>الهوية الإماراتية</li><li>الرمز المروري</li><li>إيصال الدفع من المحكمة</li><li>كشف مخالفات مواقف مختوم + ختم مرور من نيابة المرور</li></ul><div class=\"info-box\">يجب أن يتطابق عدد المخالفات في نص الحكم مع المرفق في الكشوفات.</div>", kw:"court fine old fine locked documents stop search judgment emirates id traffic code receipt statement customer.care email update paid", id:"FAQ-PB-COURT", page:"faq-maw-grievances", cat:"MAWAQIF — Grievances", subcat:"Parking Grievance"},

  // --- Fine waivers: judicial, statute, death, embassy ---
  {q:"What documents waive a fine for a judge, deceased owner, GCC embassy, or old (5+ years) violation?", a:"<table><tr><th>Case</th><th>Required documents</th></tr><tr><td><strong>Judicial authority member</strong></td><td>Public Prosecution letter + work card (judicial member) + vehicle ownership</td></tr><tr><td><strong>Statute of limitations</strong> (violations 5+ years old)</td><td>Archiving letter from Public Prosecution + vehicle ownership</td></tr><tr><td><strong>Deceased owner</strong></td><td>Archiving letter from Public Prosecution + death certificate + vehicle ownership (of the deceased)</td></tr><tr><td><strong>GCC embassy / diplomatic</strong></td><td>External (MOFA) letter addressed to the Transport Centre + embassy letter listing plate numbers / traffic code + diplomatic-category ownership</td></tr></table><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"ما المستندات التي تُسقط المخالفة عن القاضي أو المتوفى أو سفارة خليجية أو مخالفة قديمة (5 سنوات فأكثر)؟", a_ar:"<table><tr><th>الحالة</th><th>المستندات</th></tr><tr><td><strong>عضو سلطة قضائية</strong></td><td>رسالة نيابة المرور + بطاقة العمل + ملكية المركبة</td></tr><tr><td><strong>التقادم</strong> (5 سنوات فأكثر)</td><td>رسالة حفظ من نيابة المرور + ملكية المركبة</td></tr><tr><td><strong>وفاة المالك</strong></td><td>رسالة حفظ + شهادة الوفاة + ملكية المركبة (للمتوفى)</td></tr><tr><td><strong>سفارة خليجية/دبلوماسي</strong></td><td>رسالة خارجية موجهة لمركز النقل + رسالة السفارة بأرقام اللوحات/الرمز المروري + ملكية فئة دبلوماسية</td></tr></table>", kw:"fine waiver archive judicial authority judge statute limitations 5 years deceased death certificate embassy GCC diplomatic public prosecution documents", id:"FAQ-PB-WAIVER", page:"faq-maw-grievances", cat:"MAWAQIF — Grievances", subcat:"Parking Grievance"},

  // --- Commercial reservation permits detail ---
  {q:"What are the commercial parking reservation services and their fees (mosque, diplomatic, maintenance)?", a:"<p>Q Mobility offers parking-reservation services via the website (qmobility.ae → Parking Services → Establishments). Service request fee is generally <strong>AED 200</strong> and the reservation price depends on the request type:</p><ul><li><strong>First 4 spaces</strong> for government departments &amp; hospitals: <strong>free</strong></li><li><strong>Mosque imam</strong> reservation: AED 200 service fee — <em>imams are exempt from fees</em> (letter from the Awqaf authority to Mawaqif required)</li><li><strong>Diplomatic missions / embassies &amp; charities:</strong> AED 200 service fee — exempt from reservation fees (MOFA letter to the Transport Centre required)</li><li><strong>Infrastructure expansion</strong> parking: free until the building finishes the expansion works</li><li><strong>Maintenance reservation</strong> (no reservation board): refundable security deposit of <strong>AED 1,000</strong> per space, paid at the customer service centre after the project ends</li><li><strong>Temporary fence</strong> for demolition/construction works: available as a reservation</li></ul><div class=\"info-box\">If payment machines/boards (PDM) fall within the work area, a separate removal request must be submitted. Emergency maintenance works may start immediately and the request submitted ASAP. Commercial permits cannot be edited after approval and are cancelled if the conditions are breached.</div><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"ما هي خدمات حجز المواقف التجارية ورسومها (المسجد، الدبلوماسي، الصيانة)؟", a_ar:"<p>تقدم كيو موبيليتي خدمات حجز المواقف عبر الموقع (qmobility.ae). رسوم تقديم الخدمة غالباً <strong>200 درهم</strong> وسعر الحجز يعتمد على نوع الطلب:</p><ul><li><strong>أول 4 مواقف</strong> للدوائر الحكومية والمستشفيات: مجانية</li><li><strong>إمام مسجد:</strong> رسوم خدمة 200 درهم — الأئمة معفون من الرسوم (تلزم رسالة من الأوقاف لمواقف)</li><li><strong>السفارات/البعثات الدبلوماسية والأعمال الخيرية:</strong> رسوم خدمة 200 درهم — معفاة من رسوم الحجز (تلزم رسالة الخارجية لمركز النقل)</li><li><strong>التوسعة التحتية:</strong> مجانية حتى انتهاء أعمال التوسعة</li><li><strong>حجز الصيانة</strong> (بدون لوح حجز): مبلغ تأميني مسترد <strong>1000 درهم</strong> للموقف يُدفع في مركز خدمة العملاء ويُسترد بعد المشروع</li><li><strong>سور مؤقت</strong> لأعمال الهدم والبناء: متاح كحجز</li></ul>", kw:"commercial permit reservation fees mosque imam diplomatic embassy charity maintenance 1000 deposit first 4 free government hospital infrastructure PDM removal 200 tamm establishment", id:"FAQ-PB-COMRES", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Commercial Permits"},

  // --- Government permit details ---
  {q:"What documents and rules apply to Government parking permits?", a:"<p><strong>To issue/renew:</strong> the entity submits a request to the Mawaqif team to approve issuing permits and the total number, including:</p><ul><li>A letter stating the number of permits required (issue/renew)</li><li>A staff list (employee name / vehicle number &amp; category / kinship if any)</li><li>Per employee: entity work card, employee Emirates ID (both sides, valid), vehicle ownership (both sides, valid), and kinship proof if applicable (spouse, parents, siblings)</li></ul><p><strong>To change a permit's vehicle:</strong> email from the entity's coordinator + new employee work card + new vehicle ownership + new employee Emirates ID.</p><div class=\"info-box\">Government permits are valid <strong>only in the sector where the entity is located</strong>, and only from <strong>6:00 AM to 6:00 PM</strong> (outside that, parking is paid). They do <strong>not</strong> cover residential parking. Validity 1 year; fee AED 1,200.</div><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"ما المستندات والقواعد الخاصة بالتصاريح الحكومية؟", a_ar:"<p><strong>للإصدار/التجديد:</strong> تقدم الجهة طلباً لفريق مواقف لاعتماد الإصدار والعدد الإجمالي، ويشمل: رسالة بعدد التصاريح، كشف بأسماء الموظفين (الاسم/رقم وفئة المركبة/صلة القرابة إن وُجدت)، ولكل موظف: بطاقة عمل الجهة، هوية الموظف (الوجهين سارية)، ملكية المركبة (الوجهين سارية)، وإثبات القرابة إن وُجد.</p><p><strong>لتغيير مركبة التصريح:</strong> بريد من منسق الجهة + بطاقة عمل الموظف الجديد + ملكية المركبة الجديدة + هوية الموظف الجديد.</p><div class=\"info-box\">التصاريح الحكومية فعّالة فقط في القطاع الذي توجد به الجهة ومن <strong>6 صباحاً حتى 6 مساءً</strong> فقط (وما عدا ذلك المواقف مدفوعة)، ولا تشمل المواقف السكنية. الصلاحية سنة والرسوم 1200 درهم.</p>", kw:"government permit documents rules sector 6am 6pm 1200 employee work card emirates id ownership kinship change vehicle coordinator entity", id:"FAQ-PB-GOVPERMIT", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Government Permits"},

  // --- Villa visitor permit ---
  {q:"How do villa visitor parking permits work (SMS format, fees, limits)?", a:"<p>Holders of a <strong>villa resident permit</strong> can issue visitor permits and add visitor phone numbers via SMS.</p><h4>Issue a visitor permit</h4><p>Format: <code>Emirate code | Category | Plate number | Sector | Hours</code><br>Example: <code>AUH10 1234 E18 6</code></p><h4>Fees &amp; limits</h4><ul><li>Maximum stay per visitor permit: <strong>6 hours</strong></li><li><strong>Emirati-plated</strong> vehicle: <strong>free</strong></li><li>Non-Emirati plate: <strong>AED 2 per hour</strong></li><li>Permit validity starts from sending the request; villa visitor service works <strong>2:00 PM – 8:00 AM</strong></li></ul><h4>Add a visitor phone number</h4><p>Format: <code>Add 050123456 E5</code> — sent from the number listed on the permit. Up to <strong>9 visitor phone numbers</strong>; the resident permit must be valid. Maximum <strong>10 permits per building per day</strong>.</p><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"كيف تعمل تصاريح زوار الفلل (صيغة الرسالة، الرسوم، الحدود)؟", a_ar:"<p>يستطيع حامل <strong>تصريح فلل سكني</strong> إصدار تصاريح زوار وإضافة أرقام هواتف الزوار عبر الرسائل.</p><h4>إصدار تصريح زائر</h4><p>الصيغة: <code>رمز الإمارة | الفئة | رقم اللوحة | القطاع | الساعات</code><br>مثال: <code>AUH10 1234 E18 6</code></p><h4>الرسوم والحدود</h4><ul><li>أقصى مدة للتصريح: <strong>6 ساعات</strong></li><li>المركبة الإماراتية: <strong>مجاناً</strong></li><li>غير الإماراتية: <strong>درهمان للساعة</strong></li><li>خدمة زوار الفلل تعمل <strong>2:00 ظهراً – 8:00 صباحاً</strong></li></ul><h4>إضافة رقم هاتف زائر</h4><p>الصيغة: <code>Add 050123456 E5</code> تُرسل من الرقم المدرج على التصريح. حتى <strong>9 أرقام</strong>، ويجب أن يكون التصريح سارياً. الحد الأقصى <strong>10 تصاريح لكل مبنى يومياً</strong>.</p>", kw:"villa visitor permit SMS format AUH10 1234 E18 add phone number 050 9 numbers 10 per building 6 hours emirati free 2 aed resident", id:"FAQ-PB-VILLAVIS", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Resident Permits"},

  // --- POD permit status / Dubai RTA ---
  {q:"How do I check a POD permit status, or use a Dubai POD permit in Abu Dhabi?", a:"<p>To check a People of Determination (POD) parking permit, provide the <strong>permit number, the POD person's Emirates ID, or the vehicle number</strong>.</p><ul><li>Apply/renew via the <strong>TAMM</strong> platform or app; for help contact <strong>Zayed Higher Organization on 800 555</strong>.</li><li>A POD permit issued by <strong>Dubai RTA</strong> is not automatically active in Abu Dhabi — it must be linked to the Abu Dhabi system. Contact <strong>RTA on 800 9090</strong>.</li></ul><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"كيف أتحقق من حالة تصريح أصحاب الهمم أو أستخدم تصريح دبي في أبوظبي؟", a_ar:"<p>للتحقق من تصريح أصحاب الهمم، زوّدنا برقم التصريح أو هوية صاحب الهمم أو رقم المركبة.</p><ul><li>التقديم/التجديد عبر منصة أو تطبيق <strong>تم</strong>؛ للمساعدة اتصل بـ<strong>مؤسسة زايد العليا 800 555</strong>.</li><li>التصريح الصادر من <strong>هيئة طرق دبي</strong> غير فعّال تلقائياً في أبوظبي ويجب ربطه بنظام أبوظبي — اتصل بـ<strong>RTA على 800 9090</strong>.</li></ul>", kw:"POD permit status check people of determination dubai RTA 8009090 zayed 800555 tamm emirates id vehicle number active abu dhabi link", id:"FAQ-PB-PODSTATUS", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"POD Permits"},

  // --- Kinship degrees reference ---
  {q:"What are the degrees of kinship (for permits and exemptions)?", a:"<table><tr><th>Degree</th><th>Relatives</th></tr><tr><td><strong>First degree</strong></td><td>Father, Mother, Spouse, Children</td></tr><tr><td><strong>First degree in-laws</strong></td><td>Spouse's father, Spouse's mother, Stepchildren</td></tr><tr><td><strong>Second degree</strong></td><td>Grandfather, Grandmother, Brother, Sister, Grandson</td></tr><tr><td><strong>Third degree</strong></td><td>Uncles &amp; Aunts (paternal &amp; maternal), Nephews &amp; Nieces</td></tr><tr><td><strong>Fourth degree</strong></td><td>Cousins (children of uncles &amp; aunts)</td></tr></table><div class=\"info-box\">Most parking permits/exemptions that allow a relative require <strong>first or second degree</strong> kinship.</div><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"ما هي درجات القرابة (للتصاريح والإعفاءات)؟", a_ar:"<table><tr><th>الدرجة</th><th>الأقارب</th></tr><tr><td><strong>الأولى</strong></td><td>الأب، الأم، الزوج/الزوجة، الأبناء</td></tr><tr><td><strong>الأصهار من الدرجة الأولى</strong></td><td>والد الزوج، والدة الزوجة، أبناء الزوج</td></tr><tr><td><strong>الثانية</strong></td><td>الجد، الجدة، الأخ، الأخت، ابن الابن</td></tr><tr><td><strong>الثالثة</strong></td><td>الأعمام والعمات، الأخوال والخالات، أبناء الأخ والأخت</td></tr><tr><td><strong>الرابعة</strong></td><td>أبناء العم والعمة والخال والخالة</td></tr></table><div class=\"info-box\">معظم التصاريح/الإعفاءات التي تسمح بالأقارب تتطلب قرابة من الدرجة الأولى أو الثانية.</div>", kw:"kinship degrees relatives first second third fourth degree father mother spouse children brother sister uncle permit exemption proof", id:"FAQ-PB-KINSHIP", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Documents Required"},

  // --- DARB itc.toll.migration email fix (agent steps) ---
  {q:"A customer can't log in to DARB and the email shows @itc.toll.migration.ae — how to fix it?", a:"<p>When a customer has an active DARB account but the linked email is <strong>@itc.toll.migration.ae</strong> (migration placeholder), follow these steps:</p><ol><li>Go to the DARB login page; enter the customer's <strong>traffic number</strong> and a dummy password (<code>123</code>) → Login</li><li>The system prompts for a new email — enter the customer's preferred email → Next</li><li>Verify the email via the <strong>OTP</strong> sent to it</li><li>Verify the phone number; if not shown, add it via <em>Add New Registration Mobile Number</em>, then enter the phone <strong>OTP</strong></li><li>When prompted to reset the password, set a temporary password <code>Test@123</code></li><li>Ask the customer to click <strong>Forgot Password</strong>, receive an OTP on the new email, and set their own new password</li></ol><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"العميل لا يستطيع الدخول لدرب والبريد يظهر @itc.toll.migration.ae — كيف نحل المشكلة؟", a_ar:"<p>عندما يكون حساب درب فعّالاً لكن البريد المرتبط هو <strong>@itc.toll.migration.ae</strong>، اتبع الخطوات:</p><ol><li>صفحة دخول درب؛ أدخل <strong>الرمز المروري</strong> وكلمة مرور وهمية (<code>123</code>) ثم دخول</li><li>سيطلب النظام بريداً جديداً — أدخل بريد العميل المفضّل ثم التالي</li><li>تحقق من البريد عبر <strong>رمز OTP</strong></li><li>تحقق من رقم الهاتف؛ إن لم يظهر أضفه عبر إضافة رقم تسجيل جديد ثم أدخل OTP الهاتف</li><li>عند طلب إعادة التعيين، اجعل كلمة المرور المؤقتة <code>Test@123</code></li><li>اطلب من العميل الضغط على نسيت كلمة المرور واستلام OTP على بريده الجديد وتعيين كلمة مرور خاصة</li></ol>", kw:"darb login cannot access itc.toll.migration.ae migration email fix agent steps traffic number dummy password OTP reset Test@123 forgot password", id:"FAQ-PB-MIGEMAIL", page:"faq-darb-reg", cat:"DARB — Registration", subcat:"Registration"},

  // --- TC number not showing ---
  {q:"I added my traffic code (TC) in the Darb app but my vehicle isn't showing — why?", a:"<p>Two common causes:</p><ul><li><strong>Wrong TC number:</strong> you must use the traffic code printed on the <strong>vehicle registration card</strong>, not the one on the driving licence.</li><li><strong>Merged TC number:</strong> if your traffic codes were merged, contact <strong>RTA or MOI</strong> to obtain your merged TC number, then add it.</li></ul><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"أضفت الرمز المروري في تطبيق درب لكن مركبتي لا تظهر — لماذا؟", a_ar:"<p>سببان شائعان:</p><ul><li><strong>رمز مروري خاطئ:</strong> يجب استخدام الرمز المروري الموجود على <strong>بطاقة تسجيل المركبة</strong> وليس على رخصة القيادة.</li><li><strong>رمز مروري مدموج:</strong> إذا تم دمج الرموز المرورية، تواصل مع <strong>RTA أو الداخلية</strong> للحصول على الرمز المدموج ثم أضفه.</li></ul>", kw:"traffic code TC number vehicle not showing darb app registration card driving license merged miraged RTA MOI add", id:"FAQ-PB-TCNUM", page:"faq-darb-reg", cat:"DARB — Registration", subcat:"Registration"},

  // --- Establishment account creation / error ---
  {q:"How do I create a DARB account, and what about the 'No mobile phone number retrieved' error?", a:"<p><strong>Individuals:</strong> create the account through the Darb app or platform and log in using <strong>UAE Pass</strong>.</p><p><strong>Establishments:</strong> use the Darb platform → <em>Create a New Account (Establishment)</em> → enter an email <strong>not used before</strong> for any Darb account → follow the steps.</p><p><strong>Error \"No mobile phone number retrieved, please call 8003009\":</strong> the company has no linked mobile. The agent verifies the company name &amp; trade licence number, then adds the mobile the customer wants to link (the customer must have access to it to confirm the OTP).</p><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"كيف أنشئ حساب درب، وماذا عن خطأ \"لا يوجد رقم هاتف\"؟", a_ar:"<p><strong>الأفراد:</strong> أنشئ الحساب عبر تطبيق أو منصة درب وسجّل الدخول عبر <strong>الهوية الرقمية UAE Pass</strong>.</p><p><strong>المؤسسات:</strong> عبر منصة درب → إنشاء حساب جديد (مؤسسة) → أدخل بريداً لم يُستخدم من قبل → أكمل الخطوات.</p><p><strong>خطأ \"لا يوجد رقم هاتف، اتصل 8003009\":</strong> لا يوجد رقم مرتبط بالشركة. يتحقق الموظف من اسم الشركة ورقم الرخصة التجارية ثم يضيف الرقم المطلوب ربطه (يجب أن يكون لدى العميل وصول له لتأكيد OTP).</p>", kw:"create darb account individual establishment company UAE pass new email no mobile phone number retrieved 8003009 error trade license OTP", id:"FAQ-PB-ACCERR", page:"faq-darb-reg", cat:"DARB — Registration", subcat:"Registration"},

  // --- Machine receipt not received ---
  {q:"I paid at a Mawaqif machine but didn't get a receipt — can you send it?", a:"<p>Yes. Provide the following and we will forward them to the concerned department to email the receipt:</p><ul><li>Machine number</li><li>Car (plate) number</li><li>Date and time of payment</li><li>Customer email</li></ul><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"دفعت عبر جهاز مواقف ولم أستلم الإيصال — هل يمكن إرساله؟", a_ar:"<p>نعم. زوّدنا بالتالي وسنحوّلها للجهة المختصة لإرسال الإيصال عبر البريد:</p><ul><li>رقم الجهاز</li><li>رقم المركبة</li><li>تاريخ ووقت الدفع</li><li>بريد العميل</li></ul>", kw:"machine payment receipt not received mawaqif send email machine number car date time", id:"FAQ-PB-RECEIPT", page:"faq-maw-others", cat:"MAWAQIF — General", subcat:"Pay for Parking"},

  // --- Calls not related to Mawaqif ---
  {q:"Which enquiries are NOT handled by Q Mobility (Mawaqif)?", a:"<p>The following are <strong>not</strong> Q Mobility services — refer the customer to the relevant entity:</p><ul><li>Haflat, Asteel, Saeed Service</li><li>Police fines / Traffic fines (non-parking)</li><li>Private parking disputes outside our scope</li></ul><p>Vehicle issues outside Q Mobility coverage (e.g. Bani Yas, outside Abu Dhabi city, confiscations) → <strong>Emirates Auctions 800 0666666</strong> / Confiscated yard <strong>02 513 4278</strong>. Transport-violation grievances (rejected/delayed) → <strong>ITC 800 850</strong>.</p><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"ما الاستفسارات التي لا تتعامل معها كيو موبيليتي (مواقف)؟", a_ar:"<p>الخدمات التالية <strong>ليست</strong> من خدمات كيو موبيليتي — يُحال العميل للجهة المختصة:</p><ul><li>حفلات، أستيل، خدمة سعيد</li><li>مخالفات الشرطة / مخالفات المرور (غير المواقف)</li><li>نزاعات المواقف الخاصة خارج نطاقنا</li></ul><p>المركبات خارج التغطية (بني ياس، خارج مدينة أبوظبي، المصادرات) → <strong>مزادات الإمارات 800 0666666</strong> / ساحة المصادرة <strong>02 513 4278</strong>. تظلمات مخالفات النقل (المرفوضة/المتأخرة) → <strong>مركز النقل 800 850</strong>.</p>", kw:"not related mawaqif haflat asteel saeed service police traffic fines private parking other entities refer escalate emirates auctions ITC", id:"FAQ-PB-NOTOURS", page:"faq-maw-others", cat:"MAWAQIF — General", subcat:"General Info"},

  // --- Call greeting & closing scripts ---
  {q:"What is the standard call greeting and closing script?", a:"<h4>Opening</h4><p><em>\"Thank you for calling Q Mobility, this is [name]. How can I help you?\"</em></p><h4>Closing</h4><p><em>\"Thank you for calling Q Mobility and have a wonderful day.\"</em></p><h4>CRM case naming</h4><ul><li>Parking-related request on CRM → always name it <strong>MAWAQIF</strong></li><li>Toll-related request on CRM → always name it <strong>DARB</strong></li></ul><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"ما هي صيغة افتتاح وإغلاق المكالمة المعتمدة؟", a_ar:"<h4>الافتتاح</h4><p><em>«شكراً لاتصالك بكيوموبيليتي، معك [الاسم]. كيف أقدر أساعدك؟»</em></p><h4>الإغلاق</h4><p><em>«شكراً لاتصالك بكيوموبيليتي ونتمنى لك يوماً سعيداً.»</em></p><h4>تسمية الحالة في CRM</h4><ul><li>الطلب المتعلق بالمواقف → يُسمى دائماً <strong>MAWAQIF</strong></li><li>الطلب المتعلق بالتول → يُسمى دائماً <strong>DARB</strong></li></ul>", kw:"call greeting opening closing script welcome thank you q mobility CRM case naming mawaqif darb agent", id:"FAQ-PB-SCRIPT", page:"faq-maw-others", cat:"MAWAQIF — General", subcat:"Call Scripts"},

  // --- Abu Dhabi Mall parking ---
  {q:"How does Abu Dhabi Mall parking work (free hours, payment, packages, reservations)?", a:"<ul><li><strong>Free period:</strong> first <strong>3 hours free, once per day</strong>, when entering during mall visitor hours <strong>8:00 AM – 2:00 AM</strong>.</li><li>On entry you get an SMS that the session started; on exit you're notified of charges + a payment link <strong>only if</strong> you stayed beyond the 3 free hours.</li><li><strong>If no payment link / link issue:</strong> pay by scanning the <strong>QR code</strong> in the basement parking driveways.</li><li><strong>Monthly packages</strong> (1, 3, 12 months) are available exclusively for mall tenants &amp; their employees — overnight parking is not permitted even with packages.</li><li><strong>Reservations / enquiries:</strong> email <strong>admalls@qmobility.ae</strong>.</li></ul><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"كيف تعمل مواقف أبوظبي مول (الساعات المجانية، الدفع، الباقات، الحجز)؟", a_ar:"<ul><li><strong>المجاني:</strong> أول <strong>3 ساعات مجاناً مرة واحدة يومياً</strong> عند الدخول ضمن أوقات الزوار <strong>8:00 ص – 2:00 ص</strong>.</li><li>عند الدخول تصلك رسالة ببدء الجلسة، وعند الخروج تُبلّغ بالرسوم ورابط الدفع فقط إذا تجاوزت الـ3 ساعات.</li><li><strong>إن لم يصل الرابط:</strong> ادفع بمسح <strong>رمز QR</strong> في ممرات مواقف القبو.</li><li><strong>باقات شهرية</strong> (1، 3، 12 شهراً) حصراً لمستأجري المول وموظفيهم — لا يُسمح بالمبيت حتى مع الباقات.</li><li><strong>الحجز/الاستفسارات:</strong> بريد <strong>admalls@qmobility.ae</strong>.</li></ul>", kw:"abu dhabi mall parking 3 hours free 8am 2am QR code basement payment link monthly package tenant employee overnight admalls email reservation", id:"FAQ-PB-ADMALL", page:"faq-priv-general", cat:"Private Parking", subcat:"Abu Dhabi Mall"},
];

  {id:"E10", label_en:"Toll Fee Dispute", label_ar:"نزاع رسوم التعرفة", en:"Dear Customer,\n\nRegarding your toll fee dispute:\n\nPlease note that toll fees are charged automatically when passing through a toll gate with insufficient balance.\n\nTo dispute:\n1. Login to DARB app\n2. Go to Violations > Dispute\n3. Submit your grievance with supporting documents\n\nBest regards,\nQMobility Support", ar:"عميلنا العزيز،\n\nبخصوص نزاع رسوم التعرفة:\n\nيرجى ملاحظة أن رسوم التعرفة تُخصم تلقائياً عند المرور عبر بوابة التعرفة برصيد غير كافٍ.\n\nللتظلم:\n1. سجّل الدخول لتطبيق درب\n2. اذهب إلى المخالفات > تقديم تظلم\n3. قدم تظلمك مع المستندات الداعمة\n\nمع أطيب التحيات،\nفريق دعم كيوموبيليتي"},
  {id:"E11", label_en:"Vehicle Transfer - New Owner", label_ar:"نقل المركبة - مالك جديد", en:"Dear Customer,\n\nTo transfer a vehicle to a new owner in DARB:\n1. Remove vehicle from current account\n2. New owner adds vehicle to their account\n3. Update email/TAMM if company vehicle\n\nBest regards,\nQMobility Support", ar:"عميلنا العزيز،\n\nلنقل مركبة إلى مالك جديد في درب:\n1. إزالة المركبة من الحساب الحالي\n2. يقوم المالك الجديد بإضافة المركبة إلى حسابه\n3. تحديث البريد/تم إذا كانت مركبة شركة\n\nمع أطيب التحيات،\nفريق دعم كيوموبيليتي"},
  {id:"E12", label_en:"Court Fine / Old Fine", label_ar:"غرامة المحكمة / الغرامة القديمة", en:"Dear Valued Customer,\n\nThank you for contacting us via email.\n\nIn order to assist you effectively, we kindly request that you provide the following documents related to your request:\n\n• Stop search document\n• Court judgment or judge's order\n• Emirates ID\n• Vehicle registration card (both sides)\n• Official fines statement stamped by the relevant authority\n\nOnce we receive the above documents, our team will proceed accordingly.\n\nShould you have any further questions or require additional assistance, please do not hesitate to contact us via email or call us at 800 3009.\n\nBest regards,\nCustomer Service Team – Q Mobility", ar:"عزيزي العميل،\n\nشكرًا لتواصلك معنا عبر البريد الإلكتروني.\n\nحرصًا منا على تقديم المساعدة بالشكل المناسب، نرجو منكم تزويدنا بالمستندات التالية المتعلقة بطلبكم:\n\n• مستند إيقاف البحث\n• حكم المحكمة أو أمر القاضي\n• بطاقة الهوية الإماراتية\n• بطاقة تسجيل المركبة (الجانبان)\n• بيان المخالفات الرسمي مختوم من الجهة المختصة\n\nبمجرد استلام المستندات المذكورة أعلاه، سيقوم فريقنا بمراجعتها واتخاذ اللازم.\n\nفي حال وجود أي استفسارات إضافية أو الحاجة إلى مزيد من المساعدة، لا تترددوا في التواصل معنا عبر البريد الإلكتروني أو الاتصال على الرقم 800 3009.\n\nمع أطيب التحيات،\nفريق خدمة العملاء – كيو موبيليتي"},
  {id:"E13", label_en:"Exemption Request Status", label_ar:"حالة طلب الإعفاء", en:"Dear Customer,\n\nYour exemption request status:\n\nYou can check the status through:\n1. DARB app > Exemptions\n2. TAMM portal\n3. Call Center 8003009\n\nProcessing time: Up to 10 working days\n\nBest regards,\nQMobility Support", ar:"عميلنا العزيز،\n\nحالة طلب الإعفاء:\n\nيمكنك التحقق من الحالة من خلال:\n1. تطبيق درب > الإعفاءات\n2. بوابة تم\n3. مركز الاتصال 8003009\n\nمدة المعالجة: حتى 10 أيام عمل\n\nمع أطيب التحيات،\nفريق دعم كيوموبيليتي"},
  {id:"E14", label_en:"Refund Request", label_ar:"طلب استرداد", en:"Dear Customer,\n\nYour refund request has been received.\n\nRefund processing time: 5-10 working days\nThe refund will be credited to the original payment method.\n\nReference: [REF]\n\nBest regards,\nQMobility Support", ar:"عميلنا العزيز،\n\nتم استلام طلب الاسترداد.\n\nمدة معالجة الاسترداد: 5-10 أيام عمل\nسيتم إيداع المبلغ في طريقة الدفع الأصلية.\n\nالمرجع: [الرقم]\n\nمع أطيب التحيات،\nفريق دعم كيوموبيليتي"},
  {id:"E15", label_en:"Technical Support Escalation", label_ar:"رفع شكوى تقنية", en:"Dear Customer,\n\nYour technical issue has been escalated to our IT department.\n\nTicket Number: [TICKET]\nExpected Resolution: 24-48 hours\n\nWe will contact you once resolved.\n\nBest regards,\nQMobility Support", ar:"عميلنا العزيز،\n\nتم رفع المشكلة التقنية إلى قسم تكنولوجيا المعلومات.\n\nرقم التذكرة: [الرقم]\nالحل المتوقع: 24-48 ساعة\n\nسنقوم بالتواصل معك فور الحل.\n\nمع أطيب التحيات،\nفريق دعم كيوموبيليتي"}

// ===== ANALYTICS AND SHARED STORE =====
function _kbSyncEndpoint() {
  return (window.KB_SYNC_ENDPOINT || '').replace(/\/+$/, '');
}

function _kbSyncHeaders(auth) {
  var h = {'Content-Type':'application/json'};
  if (auth && KB_SYNC_TOKEN) h.Authorization = 'Bearer ' + KB_SYNC_TOKEN;
  return h;
}

async function _kbFetchJson(url, opts) {
  var ctl = new AbortController();
  var t = setTimeout(function(){ ctl.abort(); }, 9000);
  try {
    opts = opts || {};
    opts.signal = ctl.signal;
    var res = await fetch(url, opts);
    var txt = await res.text();
    var body = txt ? JSON.parse(txt) : null;
    if (!res.ok || (body && body.error)) throw new Error((body && body.error) || ('HTTP ' + res.status));
    return body;
  } finally {
    clearTimeout(t);
  }
}

async function kbStoreLogin(username, password) {
  var endpoint = _kbSyncEndpoint();
  if (!endpoint) return {ok:false, reason:'no-endpoint'};
  var body = await _kbFetchJson(endpoint + '/login', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({username: username, password: password})
  });
  if (body && body.token) {
    KB_SYNC_TOKEN = body.token;
    sessionStorage.setItem('kb_sync_token', KB_SYNC_TOKEN);
    return {ok:true};
  }
  return {ok:false, reason:'no-token'};
}

function kbStoreLogout() {
  KB_SYNC_TOKEN = '';
  KB_GITHUB_TOKEN = '';
  KB_GITHUB_USER = '';
  sessionStorage.removeItem('kb_sync_token');
  sessionStorage.removeItem('kb_github_token');
  sessionStorage.removeItem('kb_github_user');
}
