    return raw ? JSON.parse(raw) : {};
  } catch(e) { return {}; }
}

function _kbGithubUrlConfig() {
  var cfg = {};
  var host = (location.hostname || '').toLowerCase();
  var parts = (location.pathname || '').split('/').filter(Boolean);
  if (/\.github\.io$/i.test(host)) {
    cfg.owner = host.replace(/\.github\.io$/i, '');
    cfg.repo = parts.length ? parts[0] : (cfg.owner + '.github.io');
  } else if (host === 'raw.githubusercontent.com' && parts.length >= 3) {
    cfg.owner = parts[0];
    cfg.repo = parts[1];
    cfg.branch = parts[2];
  }
  return cfg;
}

function _kbGithubConfig() {
  var base = window.KB_GITHUB_SYNC || {};
  var saved = _kbGithubSavedConfig();
  var detected = _kbGithubUrlConfig();
  var cfg = {
    owner: saved.owner || base.owner || detected.owner || '',
    repo: saved.repo || base.repo || detected.repo || '',
    branch: saved.branch || base.branch || detected.branch || 'main',
    dataPath: saved.dataPath || base.dataPath || 'kb-admin-data.json'
  };
  cfg.owner = (cfg.owner || '').trim();
  cfg.repo = (cfg.repo || '').trim();
  cfg.branch = (cfg.branch || 'main').trim();
  cfg.dataPath = (cfg.dataPath || 'kb-admin-data.json').trim().replace(/^\/+/, '');
  return (cfg.owner && cfg.repo) ? cfg : null;
}

function _kbGithubFileForKey(key) {
  var cfg = _kbGithubConfig();
  if (key === 'kb_admin_data') return cfg ? cfg.dataPath : 'kb-admin-data.json';
  if (key === 'kb_analytics') return 'kb-analytics.json';
  if (key.indexOf('kb_table_') === 0) return 'kb-table-' + key.replace(/^kb_table_/, '').replace(/[^a-z0-9_-]/gi, '-') + '.json';
  return 'kb-store-' + key.replace(/[^a-z0-9_-]/gi, '-') + '.json';
}

function _kbGithubHeaders(auth) {
  var h = {
    'Accept': 'application/vnd.github+json',
    'X-GitHub-Api-Version': '2022-11-28'
  };
  if (auth && KB_GITHUB_TOKEN) h.Authorization = 'Bearer ' + KB_GITHUB_TOKEN;
  return h;
}

function _kbB64EncodeUnicode(text) {
  var bytes = new TextEncoder().encode(text);
  var bin = '';
  bytes.forEach(function(b){ bin += String.fromCharCode(b); });
  return btoa(bin);
}

function _kbB64DecodeUnicode(text) {
  var bin = atob((text || '').replace(/\s/g, ''));
  var bytes = new Uint8Array(bin.length);
  for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return new TextDecoder().decode(bytes);
}

function _kbGithubApiUrl(key) {
  var cfg = _kbGithubConfig();
  if (!cfg) return '';
  return 'https://api.github.com/repos/' + encodeURIComponent(cfg.owner) + '/' + encodeURIComponent(cfg.repo) + '/contents/' + _kbGithubFileForKey(key).split('/').map(encodeURIComponent).join('/');
}

function _kbGithubRawUrl(key) {
  var cfg = _kbGithubConfig();
  if (!cfg) return '';
  var file = _kbGithubFileForKey(key);
  if (/\.github\.io$/i.test(location.hostname || '')) {
    return new URL(file, location.href).href;
  }
  return 'https://raw.githubusercontent.com/' + encodeURIComponent(cfg.owner) + '/' + encodeURIComponent(cfg.repo) + '/' + encodeURIComponent(cfg.branch) + '/' + file.split('/').map(encodeURIComponent).join('/');
}

async function kbGithubLogin(username, token) {
  var cfg = _kbGithubConfig();
  if (!cfg) return {ok:false, reason:'missing-github-config'};
  var res = await fetch('https://api.github.com/user', {headers:_kbGithubHeaders(false)});
  if (!res.ok) {
    res = await fetch('https://api.github.com/user', {headers:{
      'Accept':'application/vnd.github+json',
      'X-GitHub-Api-Version':'2022-11-28',
      'Authorization':'Bearer ' + token
    }});
  }
  var user = await res.json().catch(function(){ return {}; });
  if (!res.ok) return {ok:false, reason:user.message || ('GitHub HTTP ' + res.status)};
  KB_GITHUB_TOKEN = token;
  KB_GITHUB_USER = username || user.login || '';
  sessionStorage.setItem('kb_github_token', KB_GITHUB_TOKEN);
  sessionStorage.setItem('kb_github_user', KB_GITHUB_USER);
  return {ok:true, user:user.login || KB_GITHUB_USER, repo:cfg.owner + '/' + cfg.repo};
}

async function kbGithubGet(key) {
  var url = _kbGithubRawUrl(key);
  if (!url) return null;
  var sep = url.indexOf('?') >= 0 ? '&' : '?';
  var res = await fetch(url + sep + 'v=' + Date.now(), {cache:'no-store'});
  if (res.status === 404) return null;
  if (!res.ok) throw new Error('GitHub read failed: HTTP ' + res.status);
  var row = await res.json();
  if (row && row.value !== undefined) return {value: row.value, updated_at: row.updated_at || null};
  return row ? {value: row, updated_at: row.updated_at || null} : null;
}

async function kbGithubSet(key, value) {
  var cfg = _kbGithubConfig();
  if (!cfg || !KB_GITHUB_TOKEN) throw new Error('GitHub sync is not configured or token is missing');
  var api = _kbGithubApiUrl(key);
  var sha = '';
  var getRes = await fetch(api + '?ref=' + encodeURIComponent(cfg.branch), {headers:_kbGithubHeaders(true)});
  if (getRes.ok) {
    var cur = await getRes.json();
    sha = cur.sha || '';
  } else if (getRes.status !== 404) {
    var errGet = await getRes.json().catch(function(){ return {}; });
    throw new Error(errGet.message || ('GitHub read current file failed: HTTP ' + getRes.status));
  }
  var row = {value:value, updated_at:new Date().toISOString()};
  var body = {
    message: 'Update QMobility KB data: ' + key,
    content: _kbB64EncodeUnicode(JSON.stringify(row, null, 2)),
    branch: cfg.branch
  };
  if (sha) body.sha = sha;
  var putRes = await fetch(api, {
    method:'PUT',
    headers:Object.assign({'Content-Type':'application/json'}, _kbGithubHeaders(true)),
    body: JSON.stringify(body)
  });
  var out = await putRes.json().catch(function(){ return {}; });
  if (!putRes.ok) throw new Error(out.message || ('GitHub save failed: HTTP ' + putRes.status));
  return row;
}

async function kbGithubDelete(key) {
  var cfg = _kbGithubConfig();
  if (!cfg || !KB_GITHUB_TOKEN) throw new Error('GitHub sync is not configured or token is missing');
  var api = _kbGithubApiUrl(key);
  var getRes = await fetch(api + '?ref=' + encodeURIComponent(cfg.branch), {headers:_kbGithubHeaders(true)});
  if (getRes.status === 404) return true;
  var cur = await getRes.json().catch(function(){ return {}; });
  if (!getRes.ok || !cur.sha) throw new Error(cur.message || 'GitHub delete failed: file SHA missing');
  var delRes = await fetch(api, {
    method:'DELETE',
    headers:Object.assign({'Content-Type':'application/json'}, _kbGithubHeaders(true)),
    body: JSON.stringify({message:'Delete QMobility KB data: ' + key, sha:cur.sha, branch:cfg.branch})
  });
  var out = await delRes.json().catch(function(){ return {}; });
  if (!delRes.ok) throw new Error(out.message || ('GitHub delete failed: HTTP ' + delRes.status));
  return true;
}

function _kbLocalKey(key) {
  return 'qmobility_kb_store_' + key;
}

function _kbLocalGet(key) {
  try {
    var raw = localStorage.getItem(_kbLocalKey(key));
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}

function _kbLocalSet(key, value) {
  var row = {value:value, updated_at:new Date().toISOString(), local:true};
  localStorage.setItem(_kbLocalKey(key), JSON.stringify(row));
  return row;
}

function _kbLocalDelete(key) {
  localStorage.removeItem(_kbLocalKey(key));
}

function kbSaveLabel() {
  if (KB_LAST_SAVE_MODE === 'shared') return 'synced to all users';
  if (KB_LAST_SAVE_MODE === 'github') return 'synced to GitHub users';
  return 'saved locally';
}

async function kbStoreGet(key) {
  var endpoint = _kbSyncEndpoint();
  if (endpoint) {
    try {
      var body = await _kbFetchJson(endpoint + '/data/' + encodeURIComponent(key), {method:'GET'});
      return body && body.found ? {value: body.value, updated_at: body.updated_at || null} : null;
    } catch(e) {
      try {
        var ghRow = await kbGithubGet(key);
        if (ghRow) return ghRow;
      } catch(ghErr) {}
      return _kbLocalGet(key);
    }
  }
  try {
    var githubRow = await kbGithubGet(key);
    if (githubRow) return githubRow;
  } catch(e) {}
  if (!_sb) return _kbLocalGet(key);
  try {
    var res = await _sb.from('kb_data').select('value,updated_at').eq('key', key).maybeSingle();
    if (res && res.error) throw res.error;
    return (res.data && res.data.value !== undefined) ? {value: res.data.value, updated_at: res.data.updated_at || null} : _kbLocalGet(key);
  } catch(e) {
    return _kbLocalGet(key);
  }
}

async function kbStoreSet(key, value, opts) {
  opts = opts || {};
  var endpoint = _kbSyncEndpoint();
  if (endpoint) {
    try {
      await _kbFetchJson(endpoint + '/data/' + encodeURIComponent(key), {
        method:'PUT',
        headers:_kbSyncHeaders(opts.auth),
        body: JSON.stringify({value: value})
      });
      KB_LAST_SAVE_MODE = 'shared';
      return true;
    } catch(e) {
      try {
        if (opts.auth && _kbGithubConfig() && KB_GITHUB_TOKEN) {
          await kbGithubSet(key, value);
          KB_LAST_SAVE_MODE = 'github';
          return true;
        }
      } catch(ghErr) {}
      _kbLocalSet(key, value);
      KB_LAST_SAVE_MODE = 'local';
      return true;
    }
  }
  if (opts.auth && _kbGithubConfig() && KB_GITHUB_TOKEN) {
    try {
      await kbGithubSet(key, value);
      KB_LAST_SAVE_MODE = 'github';
      return true;
    } catch(e) {
      console.warn('GitHub sync failed, using local fallback', e);
    }
  }
  if (!_sb) {
    _kbLocalSet(key, value);
    KB_LAST_SAVE_MODE = 'local';
    return true;
  }
  try {
    var res = await _sb.from('kb_data').upsert({
      key: key,
      value: value,
      updated_at: new Date().toISOString()
    }, {onConflict:'key'});
    if (res && res.error) throw res.error;
    KB_LAST_SAVE_MODE = 'shared';
    return true;
  } catch(e) {
    _kbLocalSet(key, value);
    KB_LAST_SAVE_MODE = 'local';
    return true;
  }
}

async function kbStoreDelete(key, opts) {
  opts = opts || {};
  var endpoint = _kbSyncEndpoint();
  if (endpoint) {
    try {
      await _kbFetchJson(endpoint + '/data/' + encodeURIComponent(key), {
        method:'DELETE',
        headers:_kbSyncHeaders(opts.auth)
      });
      _kbLocalDelete(key);
      KB_LAST_SAVE_MODE = 'shared';
      return true;
    } catch(e) {
      try {
        if (opts.auth && _kbGithubConfig() && KB_GITHUB_TOKEN) {
          await kbGithubDelete(key);
          _kbLocalDelete(key);
          KB_LAST_SAVE_MODE = 'github';
          return true;
        }
      } catch(ghErr) {}
      _kbLocalDelete(key);
      KB_LAST_SAVE_MODE = 'local';
      return true;
    }
  }
  if (opts.auth && _kbGithubConfig() && KB_GITHUB_TOKEN) {
    try {
      await kbGithubDelete(key);
      _kbLocalDelete(key);
      KB_LAST_SAVE_MODE = 'github';
      return true;
    } catch(e) {
      console.warn('GitHub delete failed, using local fallback', e);
    }
  }
  _kbLocalDelete(key);
  if (!_sb) {
    KB_LAST_SAVE_MODE = 'local';
    return true;
  }
  try {
    var res = await _sb.from('kb_data').delete().eq('key', key);
    if (res && res.error) throw res.error;
    KB_LAST_SAVE_MODE = 'shared';
    return true;
  } catch(e) {
    KB_LAST_SAVE_MODE = 'local';
    return true;
  }
}

function kbSyncProblemMessage(e) {
  var msg = (e && e.message) ? e.message : String(e || 'Unknown error');
  if (/Failed to fetch|fetch failed|NetworkError|Load failed/i.test(msg)) {
    msg = 'Shared sync backend is unreachable. Configure KB_SYNC_ENDPOINT to the deployed KB sync worker.';
  }
  return msg;
}

var ANALYTICS = {
  _trackMemo: {},
  _get: async function() {
    try {
      var row = await kbStoreGet('kb_analytics');
      return (row && row.value) ? row.value : {};
    } catch(e) { return {}; }
  },
  _set: async function(data) {
    try {
      await kbStoreSet('kb_analytics', data, {auth:false});
    } catch(e) {}
  },
  _bucket: function(ts) {
    var d = new Date(ts);
    var month = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
    var first = new Date(d.getFullYear(), 0, 1);
    var week = Math.ceil((((d - first) / 86400000) + first.getDay() + 1) / 7);
    return {month:month, week:d.getFullYear() + '-W' + String(week).padStart(2,'0')};
  },
  _addCount: function(map, key, q, delta) {
    map[key] = map[key] || {};
    map[key][q] = (map[key][q] || 0) + (delta || 1);
  },
  // Track a search query with long-lived weekly/monthly aggregates.
  trackSearch: function(query, meta) {
    if (!query || query.length < 2) return;
    meta = meta || {};
    var normalized = query.toLowerCase().trim().replace(/\s+/g,' ');
    var now = Date.now();
    if (this._trackMemo[normalized] && now - this._trackMemo[normalized] < 4000) return;
    this._trackMemo[normalized] = now;
    var self = this;
    self._get().then(function(data) {
      var bucket = self._bucket(now);
      data.searches = data.searches || [];
      data.searchTotals = data.searchTotals || {};
      data.searchWeekly = data.searchWeekly || {};
      data.searchMonthly = data.searchMonthly || {};
      data.zeroResultTotals = data.zeroResultTotals || {};
      data.zeroResultWeekly = data.zeroResultWeekly || {};
      data.zeroResultMonthly = data.zeroResultMonthly || {};
      data.searches.push({q: normalized, t: now, results: meta.results || 0, page: S.page || ''});
      data.searchTotals[normalized] = (data.searchTotals[normalized] || 0) + 1;
      self._addCount(data.searchWeekly, bucket.week, normalized, 1);
      self._addCount(data.searchMonthly, bucket.month, normalized, 1);
      if ((meta.results || 0) === 0) {
        data.zeroResultTotals[normalized] = (data.zeroResultTotals[normalized] || 0) + 1;
        self._addCount(data.zeroResultWeekly, bucket.week, normalized, 1);
        self._addCount(data.zeroResultMonthly, bucket.month, normalized, 1);
      }
      if (data.searches.length > 5000) data.searches = data.searches.slice(-5000);
      self._set(data);
    });
  },
  // Track a page/topic click with weekly/monthly aggregates.
  trackClick: function(page, label) {
    var self = this;
    var now = Date.now();
    self._get().then(function(data) {
      var bucket = self._bucket(now);
      data.clicks = data.clicks || [];
      data.clickTotals = data.clickTotals || {};
      data.clickWeekly = data.clickWeekly || {};
      data.clickMonthly = data.clickMonthly || {};
      var key = label || page;
      data.clicks.push({p: page, l: key, t: now});
      data.clickTotals[key] = (data.clickTotals[key] || 0) + 1;
      self._addCount(data.clickWeekly, bucket.week, key, 1);
      self._addCount(data.clickMonthly, bucket.month, key, 1);
      if (data.clicks.length > 5000) data.clicks = data.clicks.slice(-5000);
      self._set(data);
    });
  },
  // Sync versions used by the analytics dashboard (called from renderAnalytics)
  getSearchStats: function() {
    if (!ANALYTICS._syncCache) return [];
    var totals = ANALYTICS._syncCache.searchTotals || (ANALYTICS._syncCache.searches||[]).reduce(function(acc,s){acc[s.q]=(acc[s.q]||0)+1;return acc;},{});
    return Object.entries(totals).sort(function(a,b){return b[1]-a[1];});
  },
  getClickStats: function() {
    if (!ANALYTICS._syncCache) return [];
    var totals = ANALYTICS._syncCache.clickTotals || (ANALYTICS._syncCache.clicks||[]).reduce(function(acc,c){var k=c.l||c.p;acc[k]=(acc[k]||0)+1;return acc;},{});
    return Object.entries(totals).sort(function(a,b){return b[1]-a[1];});
  },
  getZeroResultStats: function() {
    if (!ANALYTICS._syncCache) return [];
    var totals = ANALYTICS._syncCache.zeroResultTotals || (ANALYTICS._syncCache.searches||[]).reduce(function(acc,s){ if ((s.results||0) === 0) acc[s.q]=(acc[s.q]||0)+1; return acc; }, {});
    return Object.entries(totals).sort(function(a,b){return b[1]-a[1];});
  },
  getPeriodStats: function(kind, period) {
    if (!ANALYTICS._syncCache) return [];
    var key = kind + (period === 'month' ? 'Monthly' : 'Weekly');
    var data = ANALYTICS._syncCache[key] || {};
    var latest = Object.keys(data).sort().pop();
    return latest ? {label: latest, rows: Object.entries(data[latest]).sort(function(a,b){return b[1]-a[1];})} : {label:'', rows:[]};
  },
  getRecentSearches: function(n) {
    return ANALYTICS._syncCache ? (ANALYTICS._syncCache.searches||[]).slice(-(n||20)).reverse() : [];
  },
  // Load analytics into sync cache (called before rendering the analytics page)
  loadSync: async function() {
    ANALYTICS._syncCache = await ANALYTICS._get();
  },
  // Clear all analytics
  clear: async function() {
    ANALYTICS._syncCache = {};
    await kbStoreDelete('kb_analytics', {auth:true});
  },
  _syncCache: null
};

// ===== SUPABASE DATA LAYER — Full Mutation Persistence =====
// Strategy: store a complete "diff" that captures every admin action.
// On load, replay the diff on top of the base data so ALL users see the same state.
//
// Diff schema:
// {
//   custom_faqs:    { [id]: faqObject }        — new FAQs added by admin
//   edited_faqs:    { [id]: faqObject }        — built-in FAQs with full edits
//   deleted_faqs:   [id, ...]                  — FAQs removed by admin
//   faq_overrides:  { [id]: {page,cat,subcat}} — FAQ moved between pages
//   custom_topics:  { [sector]: [topicObj] }   — new topics added by admin
//   topic_overrides:{ [id]: overrideObj }      — built-in topic renamed/edited
//   topic_deletions:[id, ...]                  — built-in topics removed
// }

function _emptyAdminCache() {
  return {
    custom_faqs: {},
    edited_faqs: {},
    deleted_faqs: [],
    faq_overrides: {},
    custom_topics: {},
    topic_overrides: {},
    topic_deletions: [],
    draft_faqs: {},
    sources: {},
    change_log: [],
    snapshots: []
  };
}

var _adminCache = _emptyAdminCache();

function _adminClone(obj) {
  return JSON.parse(JSON.stringify(obj || {}));
}

function _normalizeAdminCache(data) {
  var base = _emptyAdminCache();
  data = data || {};
  Object.keys(base).forEach(function(k){
    if (data[k] !== undefined && data[k] !== null) base[k] = data[k];
  });
  if (!Array.isArray(base.deleted_faqs)) base.deleted_faqs = [];
  if (!Array.isArray(base.topic_deletions)) base.topic_deletions = [];
  if (!Array.isArray(base.change_log)) base.change_log = [];
  if (!Array.isArray(base.snapshots)) base.snapshots = [];
  return base;
}

function _captureAdminState() {
  var snap = _adminClone(_adminCache);
  delete snap.snapshots;
  return snap;
}

function _pushAdminSnapshot(action, target) {
  _adminCache.snapshots = _adminCache.snapshots || [];
  _adminCache.snapshots.push({
    id: 'SNAP-' + Date.now(),
    ts: new Date().toISOString(),
    action: action || 'Admin publish',
    target: target || '',
    payload: _captureAdminState()
  });
  if (_adminCache.snapshots.length > 20) _adminCache.snapshots = _adminCache.snapshots.slice(-20);
}

function _addAdminLog(action, target, details) {
  _adminCache.change_log = _adminCache.change_log || [];
  _adminCache.change_log.unshift({
    ts: new Date().toISOString(),
    action: action || 'Update',
    target: target || '',
    details: details || '',
    by: 'admin'
  });
  if (_adminCache.change_log.length > 80) _adminCache.change_log.length = 80;
}

function _sourceLabelById(sourceId) {
  if (!sourceId || !_adminCache.sources) return '';
  var s = _adminCache.sources[sourceId];
  return s ? (s.title || s.name || sourceId) : '';
}

// Apply a saved diff on top of the live FAQS/TOPICS arrays
function _applyAdminPayload(data) {
  if (!data) return;

  // 1. Add custom (admin-created) topics
  if (data.custom_topics) {
    for (var sk in data.custom_topics) {
      if (!TOPICS[sk]) TOPICS[sk] = [];
      data.custom_topics[sk].forEach(function(st) {
        if (!TOPICS[sk].find(function(x){return x.id===st.id;})) TOPICS[sk].push(st);
      });
    }
  }
  // Legacy: support old 'topics' key
  if (data.topics) {
    for (var sk0 in data.topics) {
      if (!TOPICS[sk0]) TOPICS[sk0] = [];
      data.topics[sk0].forEach(function(st) {
        if (!TOPICS[sk0].find(function(x){return x.id===st.id;})) TOPICS[sk0].push(st);
      });
    }
  }

  // 2. Apply topic overrides (renames, icon, desc, url, page, sector, hide)
  if (data.topic_overrides) {
    for (var tid in data.topic_overrides) {
      var ov = data.topic_overrides[tid];
      var currentSector = null;
      var topicIndex = -1;
      var t = null;
      for (var sk2 in TOPICS) {
        topicIndex = TOPICS[sk2].findIndex(function(x){return x.id===tid;});
        if (topicIndex >= 0) {
          currentSector = sk2;
          t = TOPICS[sk2][topicIndex];
          break;
        }
      }
      if (t) {
        if (ov.label_en  !== undefined) t.label_en  = ov.label_en;
        if (ov.label_ar  !== undefined) t.label_ar  = ov.label_ar;
        if (ov.icon      !== undefined) t.icon      = ov.icon;
        if (ov.desc_en   !== undefined) t.desc_en   = ov.desc_en;
        if (ov.desc_ar   !== undefined) t.desc_ar   = ov.desc_ar;
        if (ov.page      !== undefined) t.page      = ov.page;
        if (ov.url       !== undefined) t.url       = ov.url || undefined;
        if (ov.hidden    !== undefined) t.hidden    = ov.hidden;
        if (ov.sector && ov.sector !== currentSector) {
          TOPICS[currentSector].splice(topicIndex, 1);
          if (!TOPICS[ov.sector]) TOPICS[ov.sector] = [];
          if (!TOPICS[ov.sector].find(function(x){return x.id===tid;})) TOPICS[ov.sector].push(t);
        }
      }
    }
  }

  // 3. Remove deleted topics
  if (data.topic_deletions && Array.isArray(data.topic_deletions)) {
    data.topic_deletions.forEach(function(tid) {
      for (var sk3 in TOPICS) {
        var idx = TOPICS[sk3].findIndex(function(t){return t.id===tid;});
        if (idx >= 0) { TOPICS[sk3].splice(idx, 1); break; }
      }
    });
  }

  // 4. Add custom (admin-created) FAQs
  var customFaqsMap = data.custom_faqs || {};
  // Legacy: support old 'faqs' array
  if (Array.isArray(data.faqs)) {
    data.faqs.forEach(function(sf){ customFaqsMap[sf.id] = sf; });
  }
  Object.keys(customFaqsMap).forEach(function(fid){
    var sf = customFaqsMap[fid];
    if (!FAQS.find(function(x){return x.id===sf.id;})) FAQS.push(sf);
  });

  // 5. Apply full edits to built-in FAQs (replaces the object in place)
  if (data.edited_faqs) {
    Object.keys(data.edited_faqs).forEach(function(fid){
      var edited = data.edited_faqs[fid];
      var idx = FAQS.findIndex(function(x){return x.id===fid;});
      if (idx >= 0) FAQS[idx] = edited;
    });
  }

  // 6. Remove deleted FAQs
  if (data.deleted_faqs && Array.isArray(data.deleted_faqs)) {
    data.deleted_faqs.forEach(function(fid){
      var idx = FAQS.findIndex(function(f){return f.id===fid;});
      if (idx >= 0) FAQS.splice(idx, 1);
    });
  }

  // 7. Apply FAQ page/cat/subcat moves
  if (data.faq_overrides) {
    for (var fid2 in data.faq_overrides) {
      var fov = data.faq_overrides[fid2];
      var f = FAQS.find(function(x){return x.id===fid2;});
      if (f) {
        if (fov.page   !== undefined) f.page   = fov.page;
        if (fov.cat    !== undefined) f.cat    = fov.cat;
        if (fov.subcat !== undefined) f.subcat = fov.subcat;
      }
    }
  }
}

// Full FAQ edit — persist the entire updated FAQ object
async function persistFaqEdit(faqObj) {
  try {
    if (!faqObj || !faqObj.id) return;
    _pushAdminSnapshot('Publish FAQ', faqObj.id);
    if (faqObj.id.indexOf('ADMIN-') === 0) {
      // Custom FAQ — store in custom_faqs
      _adminCache.custom_faqs[faqObj.id] = faqObj;
    } else {
      // Built-in FAQ — store full edited copy in edited_faqs
      _adminCache.edited_faqs[faqObj.id] = faqObj;
    }
    if (_adminCache.draft_faqs && _adminCache.draft_faqs[faqObj.id]) delete _adminCache.draft_faqs[faqObj.id];
    _addAdminLog('Publish FAQ', faqObj.id, faqObj.q || '');
    return await _persistCache();
  } catch(e) { console.log('persistFaqEdit err', e); return false; }
}

// FAQ deletion — mark as deleted so it's removed on load for all users
async function persistFaqDelete(faqId) {
  try {
    _pushAdminSnapshot('Delete FAQ', faqId);
    // Remove from custom_faqs if it was admin-created
    if (_adminCache.custom_faqs[faqId]) delete _adminCache.custom_faqs[faqId];
    // Remove from edited_faqs if it was edited
    if (_adminCache.edited_faqs[faqId]) delete _adminCache.edited_faqs[faqId];
    // Remove from faq_overrides
    if (_adminCache.faq_overrides[faqId]) delete _adminCache.faq_overrides[faqId];
    // Only record deletion for built-in FAQs (custom ones just removed from custom_faqs)
    if (faqId.indexOf('ADMIN-') !== 0) {
      if (_adminCache.deleted_faqs.indexOf(faqId) < 0) _adminCache.deleted_faqs.push(faqId);
    }
    if (_adminCache.draft_faqs && _adminCache.draft_faqs[faqId]) delete _adminCache.draft_faqs[faqId];
    _addAdminLog('Delete FAQ', faqId, 'FAQ removed from published KB');
    return await _persistCache();
  } catch(e) { console.log('persistFaqDelete err', e); return false; }
}

function adminQualityScan() {
  var deprecated = 0;
  var missingSource = 0;
  var stale = 0;
  var dupes = {};
  var seen = {};
  var today = new Date();
  FAQS.forEach(function(f){
    var all = [f.q, f.a, f.kw].join(' ');
    if (/customers@qmobility\.ae|customer\.care@qmobility\.ae/i.test(all)) deprecated++;
    if ((f.id || '').indexOf('ADMIN-') === 0 || f.source || f.source_id || f.reviewed_at || f.owner) {
      if (!f.source && !f.source_id) missingSource++;
    }
    if (f.reviewed_at) {
      var d = new Date(f.reviewed_at);
      if (!isNaN(d.getTime()) && (today - d) > 1000*60*60*24*90) stale++;
    }
    var sig = _kbSig(f.q || '');
    if (sig && seen[sig]) dupes[sig] = (dupes[sig] || 1) + 1; else if (sig) seen[sig] = true;
  });
  return {
    deprecated: deprecated,
    missingSource: missingSource,
    stale: stale,
    duplicateQuestions: Object.keys(dupes).length,
    drafts: Object.keys(_adminCache.draft_faqs || {}).length,
    sources: Object.keys(_adminCache.sources || {}).length,
    snapshots: (_adminCache.snapshots || []).length
  };
}

  } catch(e) { alert('Error: ' + e.message); }
}

function stripHtml(html) {
  if (!html) return '';
  var tmp = document.createElement('div');
  tmp.innerHTML = html;
  return tmp.textContent || tmp.innerText || '';
}
function escHtml(t) {
  if (!t) return '';
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function adminLogin() {
  var u = document.getElementById('admUser').value;
  var p = document.getElementById('admPass').value;
  if (_kbSyncEndpoint()) {
    try {
      var remote = await kbStoreLogin(u, p);
      if (!remote.ok) throw new Error(remote.reason || 'Login failed');
      S.admin = true; hideAdminModal(); showToast('Admin logged in'); render(S.page); buildNav();
      return;
    } catch(e) {
      if (!_isLocalAdminHost() || !_isLocalAdminCredential(u, p)) {
        document.getElementById('admErr').textContent = 'Remote admin login failed: ' + kbSyncProblemMessage(e);
        return;
      }
    }
  }
  if (_isLocalAdminCredential(u, p)) {
    S.admin = true; hideAdminModal(); showToast('Admin logged in'); render(S.page); buildNav();
    return;
  }
  var ghCfg = _kbGithubConfig();
  if (ghCfg && p) {
    try {
      var ghLogin = await kbGithubLogin(u, p);
      if (!ghLogin.ok) throw new Error(ghLogin.reason || 'GitHub login failed');
      S.admin = true; hideAdminModal(); showToast('Admin logged in with GitHub sync'); render(S.page); buildNav();
      return;
    } catch(e) {
      document.getElementById('admErr').textContent = 'GitHub admin login failed: ' + kbSyncProblemMessage(e);
      return;
    }
  }
  if (!_isLocalAdminHost()) {
    document.getElementById('admErr').textContent = 'Invalid admin credentials';
    return;
  }
  document.getElementById('admErr').textContent = 'Invalid credentials';
}

function showExemptTab(tab) {
  document.querySelectorAll('.exempt-tab-content').forEach(function(el){el.style.display='none';});
  document.querySelectorAll('.services-tab').forEach(function(el){el.classList.remove('active');});
  if (tab === 'auto') { document.getElementById('exempt-auto').style.display='block'; document.getElementById('tab-auto').classList.add('active'); }
  if (tab === 'app') { document.getElementById('exempt-app').style.display='block'; document.getElementById('tab-app').classList.add('active'); }
  if (tab === 'not') { document.getElementById('exempt-not').style.display='block'; document.getElementById('tab-not').classList.add('active'); }
}

  var el = document.getElementById('content');

  if (page === 'dashboard') renderDashboard(el);

  else if (page === 'sector-darb') renderSector(el, 'sector-darb');
  else if (page === 'sector-priv') renderSector(el, 'sector-priv');
  else if (page === 'kb-fines') renderFinesTable(el);

  else if (page === 'vehicle-types') renderVehicleTypes(el);
  else if (page === 'faq-maw-mussafah') renderMussafah(el);
  else if (page === 'faq-maw-mbz') renderMBZCity(el);
  else if (page === 'smart-map') renderSmartMap(el);

  else if (page === 'email') renderEmailTemplates(el);
  else if (page === 'darb-x') renderDarbX(el);
  else if (page === 'darb-exemptions') renderDarbExemptions(el);
  else if (page === 'faq-darb-exempt') renderDarbExemptions(el);
  else if (page === 'general') renderGeneral(el);
  else if (page === 'services') renderServices(el);
  else if (page === 'call-scripts') renderCallScripts(el);
  else if (page === 'admin-panel') renderAdminPanel(el);
  else if (page === 'admin-analytics') renderAnalytics(el);
  else if (page === 'search') renderSearch(el, _lastSearchQuery || (document.getElementById('searchInput')||{}).value || '');
  else if (page === 'faqview') { if (_lastOpenedFaqId) openFaqById(_lastOpenedFaqId); else renderSearch(el, _lastSearchQuery||''); }
  else if (page && page.indexOf('faq-') === 0) renderFaqPage(el, page);
  else el.innerHTML = '<div class="card"><p>Page not found: ' + escHtml(page) + '</p></div>';
  el.classList.remove('page-enter'); void el.offsetWidth; el.classList.add('page-enter');
}

// ===== SECTOR RENDERER =====
function renderSector(el, sectorId) {
  var sector = SECTORS.find(function(s){return s.id===sectorId;});
  var topics = TOPICS[sectorId] || [];

  // Filter out subcat for maw-parking if selected
  var filterFn = null;
  if (sectorId==='sector-maw' && S.subcat) {
    filterFn = function(f){
      if (f.cat) {
        var c = f.cat.toLowerCase();
        var sub = (f.subcat||'').toLowerCase();
        var kw = (f.kw||'').toLowerCase();
        if (S.subcat==='maw-payment') return c.indexOf('payment')>=0 || c.indexOf('pay for')>=0 || sub.indexOf('sms')>=0 || sub.indexOf('payment')>=0 || kw.indexOf('payment')>=0 || kw.indexOf('sms')>=0;
        if (S.subcat==='maw-permit') return c.indexOf('permit')>=0 || sub.indexOf('permit')>=0;
        if (S.subcat==='maw-grievance') return c.indexOf('grievance')>=0 || sub.indexOf('grievance')>=0;
        if (S.subcat==='maw-pound') return c.indexOf('pound')>=0 || sub.indexOf('pound')>=0;
        if (S.subcat==='maw-vehicle') return c.indexOf('vehicle')>=0 || sub.indexOf('vehicle')>=0;
        if (S.subcat==='maw-mscp') return c.indexOf('mscp')>=0 || sub.indexOf('mscp')>=0;
      }
      return false;
    };
  }

  var sectorTitle = S.lang==='ar'&&sector ? (sector.name_ar||sector.name_en) : sector ? (sector.name_en||sectorId) : sectorId;

// ===== FAQ CARD with optional highlighting, collapsible, and source badge =====
function repairAnswerHtml(html) {
  if (!html) return '';
  var out = String(html);
  var openDivs = (out.match(/<div\b/gi) || []).length;
  var closeDivs = (out.match(/<\/div>/gi) || []).length;
  while (closeDivs < openDivs) {
    out += '</div>';
    closeDivs++;
  }
  return out;
}

function _kbJsArg(value) {
  return String(value || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/\r?\n/g, ' ');
}

function _kbVisualIcon(text) {
  var s = String(text || '').toLowerCase();
  if (/fine|violation|grievance|appeal|discount|court/.test(s)) return '&#128203;';
  if (/permit|resident|villa|limited|mscp|pod|determination|zho/.test(s)) return '&#127380;';
  if (/darb x|complaint|app|registration|vehicle/.test(s)) return '&#128241;';
  if (/darb|toll|gate|exemption/.test(s)) return '&#128739;';
  if (/sms|3009|template|message/.test(s)) return '&#128172;';
  if (/free flow|mall|private|mushrif|abu dhabi mall/.test(s)) return '&#127970;';
  if (/pay|payment|wallet|top up|recharge|fee|aed|card/.test(s)) return '&#128179;';
  if (/tow|pound|yard|release/.test(s)) return '&#128663;';
  if (/script|greeting|closing|call/.test(s)) return '&#127911;';
  return '&#128269;';
}

function renderFaqCard(f, highlightQuery) {
  var q = S.lang === 'ar' && f.q_ar ? f.q_ar : f.q;
  var a = repairAnswerHtml(S.lang === 'ar' && f.a_ar ? f.a_ar : f.a);
  var cardId = 'faq-' + f.id;

  // Highlight matching text without breaking HTML
  if (highlightQuery && typeof highlightQuery === 'string' && highlightQuery.length > 0) {
    var hq = highlightQuery.toLowerCase();
    var escHQ = escHtml(hq).replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    try {
      var re = new RegExp('(' + escHQ + ')', 'gi');
      q = q.replace(re, '<mark>$1</mark>');
      if (a) {
        var parts = a.split(/(<[^>]+>)/g);

  var sourceLabel = f.source || f.source_title || _sourceLabelById(f.source_id) || (isOfficial ? 'Official QMobility FAQ' : '');

function renderFaqPage(el, page) {
  var h = '';
  var bc = '<div class="breadcrumb"><a onclick="goHome()">Home</a> / FAQ</div>';

  var faqs = FAQS.filter(function(f){return f.page===page;}).sort(function(a,b){return (a.order||0)-(b.order||0);});

  // Official source banner
  var srcBanner = _officialSourceBanner(page);

  // Check if this is a parent topic with children
  var allTopics = [];
  for (var sk in TOPICS) allTopics = allTopics.concat(TOPICS[sk]);
  var topic = allTopics.find(function(t){return t.page===page && t.children;});

  if (topic && topic.children) {
    bc = '<div class="breadcrumb"><a onclick="goHome()">Home</a> / ' + (topic.label_en||page) + '</div>';
    h += bc;
    h += _kbPageHero(
      S.lang==='ar'&&topic.label_ar ? topic.label_ar : topic.label_en,
      S.lang==='ar'&&topic.desc_ar ? topic.desc_ar : (topic.desc_en || ''),
      _kbAssetForPage(page),
      _kbToneForPage(page),
      [
        {value: String(topic.children.length), label: 'Subtopics'},
        {value: String(faqs.length), label: 'Answers'},
        {value: page.indexOf('mscp') >= 0 ? '15 / 30 days' : 'Current', label: 'Agent context'}
      ]
    );
    // Show child topic cards
    h += '<div class="submenu-grid">';
    var usedChildAssets = {};
    topic.children.forEach(function(ch){
      var fl = ch.filter.toLowerCase();
      var count = FAQS.filter(function(f){
        if (f.page !== ch.page) return false;
        var kw  = (f.kw||'').toLowerCase();
        var sub = (f.subcat||'').toLowerCase();
        var cat = (f.cat||'').toLowerCase();
        return kw.indexOf(fl)>=0 || sub.indexOf(fl)>=0 || cat.indexOf(fl)>=0;
      }).length;
      var childAsset = _kbTopicAsset(ch, ch.page || page);
      var childSoft = _kbTopicShouldStaySoft(ch) || usedChildAssets[childAsset];
      var childClass = 'submenu-card visual-topic-card' + (childSoft ? ' visual-topic-soft' : '');
      if (!childSoft) usedChildAssets[childAsset] = true;
      h += '<div class="' + childClass + '"' + _kbPhotoStyle(childAsset) + ' onclick="S.subcat=&#39;' + ch.filter + '&#39;;renderFaqPage(document.getElementById(&#39;content&#39;),&#39;' + ch.page + '&#39;);window.scrollTo(0,0);">';
      h += '<div class="icon">' + (ch.icon||'&#128221;') + '</div>';
      h += '<div class="title">' + (S.lang==='ar'&&ch.label_ar?ch.label_ar:ch.label_en) + '</div>';
      h += '<div class="count">' + count + ' articles</div>';
      h += '</div>';
    });
    h += '</div>';

    // If a subcat is selected, filter the FAQ list
    if (S.subcat) {
      var filter = S.subcat.toLowerCase();
      var filters = filter.split('|');
      faqs = faqs.filter(function(f){
        var kw = (f.kw||'').toLowerCase();
        var cat = (f.cat||'').toLowerCase();
        var sub = (f.subcat||'').toLowerCase();
        return filters.some(function(fl){return kw.indexOf(fl)>=0 || cat.indexOf(fl)>=0 || sub.indexOf(fl)>=0;});
      });
      h += '<div class="faq-list">';
      faqs.forEach(function(f){h += renderFaqCard(f);});
      h += '</div>';
    }
  } else {
    // Find topic info

// Arabic normalization (strip diacritics, unify alef/yaa/taa marbuta)
function _norm(s){
  if(!s) return '';
  s = s.toLowerCase();
  s = s.replace(/[ً-ٰٟ]/g,'')      // harakat
       .replace(/[أإآٱ]/g,'ا') // alef variants -> alef
       .replace(/ى/g,'ي')                // alef maqsura -> yaa
       .replace(/ة/g,'ه');               // taa marbuta -> haa
  return s;
}

// Bounded Levenshtein (returns >max early)
function _lev(a,b,max){
  var la=a.length, lb=b.length;
  if(Math.abs(la-lb)>max) return max+1;
  var prev=[], cur=[], i, j;
  for(j=0;j<=lb;j++) prev[j]=j;
  for(i=1;i<=la;i++){
    cur[0]=i; var best=i;
    for(j=1;j<=lb;j++){
      var cost=a.charCodeAt(i-1)===b.charCodeAt(j-1)?0:1;
      cur[j]=Math.min(prev[j]+1, cur[j-1]+1, prev[j-1]+cost);
      if(cur[j]<best) best=cur[j];
    }
    if(best>max) return max+1;
    for(j=0;j<=lb;j++) prev[j]=cur[j];
  }
  return prev[lb];
}

// Build a per-FAQ search index once (cached on the object).

        q_ar: s.label_ar || '', a_ar: '',

function initSearchIndex(){
  injectAuxIntoSearch();
  FAQS.forEach(function(f){
    if(f._idx) return;
    f._qN   = _norm(f.q || '');
    f._kwN  = _norm((f.kw||'') + ' ' + (f.subcat||'') + ' ' + (f.cat||''));
    f._catN = _norm((f.cat||'') + ' ' + (f.subcat||''));
    f._aN   = _norm(stripHtml(f.a||''));
    f._qArN = _norm((f.q_ar||'') + ' ' + (f.a_ar||''));
    // word set from question + keywords for fuzzy matching
    var words = (f._qN + ' ' + f._kwN).split(/[^0-9a-z؀-ۿ]+/).filter(function(w){return w.length>2;});
    f._words = words;
    f._idx = true;
  });
}

// Expand a raw query into normalized phrase + weighted term list (with synonyms).
function expandQuery(raw){
  var phrase = _norm(raw.trim());
  var baseTokens = phrase.split(/[^0-9a-z؀-ۿ]+/).filter(function(w){return w.length>1;});
  var stop = {'the':1,'a':1,'an':1,'is':1,'are':1,'do':1,'i':1,'to':1,'of':1,'for':1,'how':1,'can':1,'what':1,'my':1,'on':1,'in':1,'and':1};
  var origSet = {};
  var tokens = baseTokens.filter(function(t){return !stop[t];});
  tokens.forEach(function(t){ origSet[t]=1; });
  // synonym expansion: match groups against the full phrase; collect extras only
  var synSet = {};
  SEARCH_SYNONYMS.forEach(function(group){
    var hit = group.some(function(m){ return phrase.indexOf(_norm(m))>=0; });
    if(hit){
      group.forEach(function(m){
        _norm(m).split(/\s+/).forEach(function(t){ if(t.length>1 && !stop[t] && !origSet[t]) synSet[t]=1; });
      });
    }
  });
  return { phrase: phrase, tokens: tokens, syn: Object.keys(synSet) };
}

function _scoreFaq(f, ex){
  var score = 0;
  var phrase = ex.phrase;
  // exact phrase bonuses
  if(phrase.length>2){
    if(f._qN.indexOf(phrase)>=0) score += 120;
    if(f._kwN.indexOf(phrase)>=0) score += 50;
    if(f._aN.indexOf(phrase)>=0) score += 18;
    if(f._qArN.indexOf(phrase)>=0) score += 60;
  }
  // Original query words — full weight (these carry the user's real intent)
  var hitsInQK = 0;
  ex.tokens.forEach(function(t){
    var inQ = f._qN.indexOf(t)>=0;
    var inK = f._kwN.indexOf(t)>=0;
    var inA = f._aN.indexOf(t)>=0;
    var inAr= f._qArN.indexOf(t)>=0;
    if(inQ) score += 16;
    if(inK) score += 9;
    if(f._catN.indexOf(t)>=0) score += 6;
    if(inA) score += 2;
    if(inAr) score += 8;
    if(inQ||inK) hitsInQK++;
    // fuzzy typo tolerance against question/keyword words
    if(!inQ && !inK && !inA && t.length>=4){
      var max = t.length>=7?2:1;
      for(var i=0;i<f._words.length;i++){
        if(_lev(t, f._words[i], max) <= max){ score += 6; break; }
      }
    }
  });
  // Synonym-derived terms — reduced weight, capped so they can't dominate
  var synScore = 0;
  ex.syn.forEach(function(t){
    if(f._qN.indexOf(t)>=0) synScore += 5;
    else if(f._kwN.indexOf(t)>=0) synScore += 3;
    else if(f._aN.indexOf(t)>=0) synScore += 1;
    else if(f._qArN.indexOf(t)>=0) synScore += 3;
  });
  score += Math.min(synScore, 18);
  // all original query words present in question/keywords => strong intent match
  if(ex.tokens.length>1 && hitsInQK>=ex.tokens.length) score += 40;
  return score;
}

// Core: return scored, sorted FAQ list for a query.
function runSearch(raw){
  initSearchIndex();
  var ex = expandQuery(raw);
  if(!ex.phrase) return [];
  var scored = [];
  FAQS.forEach(function(f){
    var s = _scoreFaq(f, ex);
    if(s>0) scored.push({f:f,s:s});
  });
  scored.sort(function(a,b){ return b.s - a.s; });
  return scored.map(function(x){ return x.f; });
}

// ---- Instant dropdown ----
var _ddResults = [], _ddActive = -1;

function _snippet(f, ex){
  var txt = stripHtml(f.a||'');
  if(!txt) return '';
  var low = _norm(txt);
  var pos = -1;
  if(ex.phrase) pos = low.indexOf(ex.phrase);
  if(pos<0 && ex.tokens.length) pos = low.indexOf(ex.tokens[0]);
  var start = pos>40 ? pos-40 : 0;
  var snip = txt.substr(start, 140).trim();
  if(start>0) snip='…'+snip;
  return snip;
}

function _hl(text, ex){
  var out = escHtml(text);
  var marks = (ex.tokens.length?ex.tokens:[ex.phrase]).filter(Boolean);
  marks.forEach(function(t){
    if(t.length<2) return;
    try{
      var re = new RegExp('('+t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
      out = out.replace(re,'<mark>$1</mark>');
    }catch(e){}
  });
  return out;
}

function instantSearch(){
  var input = document.getElementById('searchInput');

    dd.innerHTML = '<div class="sd-empty">No quick matches for "'+escHtml(raw)+'".<br>Press <kbd>Enter</kbd> for full search &amp; official sources.</div>';

function _ddSetActive(i){
  _ddActive = i;
  var items = document.querySelectorAll('#searchDropdown .sd-item');
  items.forEach(function(el,idx){ el.classList.toggle('active', idx===i); });
}

function hideSearchDropdown(){
  var dd = document.getElementById('searchDropdown');
  if(dd){ dd.style.display='none'; }
  _ddActive=-1;
}

function searchKeyNav(e){
  var dd = document.getElementById('searchDropdown');
  var open = dd && dd.style.display==='block' && _ddResults.length>0;
  if(e.key==='ArrowDown'){
    if(open){ e.preventDefault(); _ddSetActive(Math.min(_ddActive+1, _ddResults.length-1)); _scrollActive(); }
  } else if(e.key==='ArrowUp'){
    if(open){ e.preventDefault(); _ddSetActive(Math.max(_ddActive-1, 0)); _scrollActive(); }
  } else if(e.key==='Enter'){
    e.preventDefault();
    if(open && _ddActive>=0){ openFaqById(_ddResults[_ddActive].id); }
    else { doSearch(); }
  } else if(e.key==='Escape'){
    hideSearchDropdown();
  }
}

  }

    h += '<h3 style="color:' + g.color + ';border-bottom:2px solid ' + g.color + ';padding-bottom:6px;margin-bottom:12px;">' + g.icon + ' ' + gk + ' (' + g.items.length + ')</h3>';
    g.items.forEach(function(e){
      var isAr = S.lang === 'ar';
      var label = isAr && e.label_ar ? e.label_ar : e.label_en;
      var body = isAr && e.ar ? e.ar : e.en;
      var preview = body.length > 200 ? body.substring(0, 200) + '...' : body;
      var _eid = 'eml_' + e.id;
      window[_eid] = body;
      h += '<div class="email-card" data-label="' + escHtml(label.toLowerCase()) + '" style="border-left:4px solid ' + g.color + ';">';
      h += '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px;flex-wrap:wrap;">';

      h += '<strong style="font-size:14px;">' + escHtml(label) + '</strong></div>';
      h += '<button class="btn" style="font-size:11px;padding:4px 10px;background:' + g.color + ';" onclick="copyText(window[&#39;' + _eid + '&#39;]);showToast(&#39;Template copied&#39;)">' + t('copy') + '</button>';
      h += '</div>';
      h += '<div class="email-body' + (isAr ? ' ar' : '') + '" style="background:#fafbfc;padding:10px 12px;border-radius:6px;font-size:12px;line-height:1.6;max-height:160px;overflow:auto;border:1px solid var(--border);">' + escHtml(preview).replace(/\n/g, '<br>') + '</div>';
      h += '</div>';
    });
    h += '</div>';
  });

  el.innerHTML = h;
}

function filterEmailTemplates() {
  var q = document.getElementById('emailFilter').value.toLowerCase();
  var cards = document.querySelectorAll('.email-card');
  cards.forEach(function(c){
    var label = c.getAttribute('data-label') || '';
    c.style.display = (!q || label.indexOf(q) >= 0) ? '' : 'none';
  });
  // Hide groups that have no visible cards
  document.querySelectorAll('.email-group').forEach(function(g){
    var visible = g.querySelectorAll('.email-card');
    var anyVis = false;
    visible.forEach(function(c){ if (c.style.display !== 'none') anyVis = true; });
    g.style.display = anyVis ? '' : 'none';
  });
}

function showServiceTab(tabId) {
  document.querySelectorAll('.services-tab-content').forEach(function(el){el.style.display='none';});
  document.querySelectorAll('.services-tab').forEach(function(el){el.classList.remove('active');});
  var t = document.getElementById(tabId);
  if (t) t.style.display = 'block';
  // Find the button that triggered this
  var btns = document.querySelectorAll('.services-tab');
  for (var i = 0; i < btns.length; i++) {
    if (btns[i].getAttribute('onclick') && btns[i].getAttribute('onclick').indexOf(tabId)>=0) {
      btns[i].classList.add('active');
    }
  }
}

function saveGithubSyncSettings() {
  if (!S.admin) { showToast('Admin login required'); return; }
  var owner = (document.getElementById('ghSyncOwner').value || '').trim();
  var repo = (document.getElementById('ghSyncRepo').value || '').trim();
  var branch = (document.getElementById('ghSyncBranch').value || '').trim() || 'main';
  var dataPath = (document.getElementById('ghSyncPath').value || '').trim() || 'kb-admin-data.json';
  var token = (document.getElementById('ghSyncToken').value || '').trim();
  if (!owner || !repo) { alert('GitHub owner and repo are required.'); return; }
  localStorage.setItem('kb_github_sync_config', JSON.stringify({owner:owner, repo:repo, branch:branch, dataPath:dataPath}));
  if (token) {
    KB_GITHUB_TOKEN = token;
    sessionStorage.setItem('kb_github_token', token);
  }
  KB_LAST_SAVE_MODE = token ? 'github' : 'local';
  showToast(token ? 'GitHub sync ready' : 'GitHub repo saved - token still needed to publish');
  render(S.page);
}

function clearGithubSyncSettings() {
  if (!S.admin) { showToast('Admin login required'); return; }
  localStorage.removeItem('kb_github_sync_config');
  KB_GITHUB_TOKEN = '';
  KB_GITHUB_USER = '';
  sessionStorage.removeItem('kb_github_token');

async function saveTopic() {
  if (!S.admin) { showToast('Admin login required'); return; }
  var sector = document.getElementById('topicSector').value;
  var labelEn = document.getElementById('topicLabelEn').value.trim();
  var labelAr = document.getElementById('topicLabelAr').value.trim();
  var icon = document.getElementById('topicIcon').value.trim();
  var descEn = (document.getElementById('topicDescEn').value || '').trim();
  var descAr = (document.getElementById('topicDescAr').value || '').trim();
  var page = document.getElementById('topicPage').value.trim();
  var url = (document.getElementById('topicUrl').value || '').trim();

  if (!labelEn) { alert('Label EN is required'); return; }
  if (!page && !url) { alert('Either Page or External URL is required'); return; }

  var oldId = document.getElementById('topicOldId');
  var oldSector = document.getElementById('topicOldSector');
  var saved = false;

  if (oldId && oldId.value) {
    // Edit existing — save as override (works for built-in AND admin topics)
    var os = oldSector.value;
    var idx = TOPICS[os].findIndex(function(t){return t.id===oldId.value;});
    if (idx >= 0) {
      var t = TOPICS[os][idx];
      t.label_en = labelEn;
      t.label_ar = labelAr;
      t.icon = icon;
      t.desc_en = descEn;
      t.desc_ar = descAr;
      t.page = page;
      t.url = url || undefined;
      // Move to new sector if changed
      if (os !== sector) {
        TOPICS[os].splice(idx, 1);
        if (!TOPICS[sector]) TOPICS[sector] = [];
        TOPICS[sector].push(t);
      }
      // Persist as override (handles both built-in and admin)
      saved = await setTopicOverride(oldId.value, {
        label_en: labelEn, label_ar: labelAr, icon: icon,
        desc_en: descEn, desc_ar: descAr, page: page,
        url: url || '', sector: sector
      });
    }
  } else {
    // Add new
    var newId = 'ADMIN-TOPIC-' + Date.now();
    if (!TOPICS[sector]) TOPICS[sector] = [];
    var newTopic = {id:newId, page:page, label_en:labelEn, label_ar:labelAr, icon:icon, desc_en:descEn, desc_ar:descAr};
    if (url) newTopic.url = url;
    TOPICS[sector].push(newTopic);
    saved = await saveAdminData();
  }

  if (!saved) return;
  hideTopicModal();
  render(S.page);
  buildNav();
  showToast('Topic saved - ' + kbSaveLabel());
}

async function deleteTopic(topicId) {
  if (!S.admin) { showToast('Admin login required'); return; }
  if (!confirm('Delete topic ' + topicId + '? This will remove it for ALL users.')) return;
  // Count FAQs that would be orphaned
  var topicPage = null;
  for (var sk in TOPICS) {
    var t = TOPICS[sk].find(function(x){return x.id===topicId;});
    if (t) { topicPage = t.page; break; }
  }
  var orphanCount = topicPage ? FAQS.filter(function(f){return f.page===topicPage;}).length : 0;
  if (orphanCount > 0) {
    if (!confirm(orphanCount + ' FAQ(s) live on this page (' + topicPage + ') and will become unreachable. Continue?')) return;
  }
  for (var sk2 in TOPICS) {
    var idx = TOPICS[sk2].findIndex(function(t){return t.id===topicId;});
    if (idx >= 0) { TOPICS[sk2].splice(idx, 1); break; }
  }
  // Built-in topics: record deletion so it's replayed for all users on load
  var saved = false;
  if (topicId.indexOf('ADMIN-') !== 0) {
    saved = await addTopicDeletion(topicId);
  } else {
    if (_adminCache.topic_overrides[topicId]) delete _adminCache.topic_overrides[topicId];
    saved = await saveAdminData();
  }
  if (!saved) return;
  render(S.page);
  buildNav();
  showToast('Topic deleted - ' + kbSaveLabel());
}

function openMoveFaqModal() {
  if (!S.admin) { showToast('Admin login required'); return; }
  // Build sector→topics→pages list
  var pageMap = {};   // page -> "Sector / Topic"
  for (var sk in TOPICS) {

  });

  var body = '<div style="font-size:13px;color:#666;margin-bottom:12px;">Move a single FAQ to a different page (tab), or bulk-move all FAQs from one page to another.</div>';
  body += '<div style="border-bottom:1px solid #eee;padding-bottom:14px;margin-bottom:14px;">';

  body += '<div><label>New page</label><select id="mvFaqPage">' + pageOptions + '</select></div>';
  body += '<div><label>New subcategory (optional)</label><input type="text" id="mvFaqSubcat" placeholder="leave blank to keep current"></div>';

  body += '</div>';
  body += '<div>';
  body += '<h4 style="margin:0 0 8px 0;">Move ALL FAQs from a page</h4>';
  body += '<div><label>From page</label><select id="mvBulkFrom">' + pageOptions + '</select></div>';
  body += '<div><label>To page</label><select id="mvBulkTo">' + pageOptions + '</select></div>';

async function executeMoveSingle() {
  var fid = document.getElementById('mvFaqId').value.trim();
  var newPage = document.getElementById('mvFaqPage').value;
  var newSub = document.getElementById('mvFaqSubcat').value.trim();
  if (!fid) { alert('FAQ ID required'); return; }
  var f = FAQS.find(function(x){return x.id===fid;});
  if (!f) { alert('FAQ not found: ' + fid); return; }
  if (!confirm('Move "' + (f.q||fid).substring(0,60) + '" from ' + f.page + ' to ' + newPage + '?')) return;
  f.page = newPage;
  if (newSub) f.subcat = newSub;
  // Persist full FAQ state (page change visible to all users)
  var savedFaq = await persistFaqEdit(f);
  var savedMove = await setFaqOverride(fid, {page: newPage, cat: f.cat, subcat: newSub || f.subcat});
  if (!savedFaq || !savedMove) return;
  hideTopicModal();
  render(S.page);
  showToast('FAQ moved - ' + kbSaveLabel());
}

async function executeMoveBulk() {
  var from = document.getElementById('mvBulkFrom').value;
  var to = document.getElementById('mvBulkTo').value;
  if (from === to) { alert('From and To must be different'); return; }
  var affected = FAQS.filter(function(f){return f.page===from;});
  if (affected.length === 0) { alert('No FAQs on that page'); return; }
  if (!confirm('Move ' + affected.length + ' FAQ(s) from ' + from + ' to ' + to + '? This affects ALL users.')) return;
  for (var i = 0; i < affected.length; i++) {
    var f = affected[i];
    f.page = to;
    var savedFaq = await persistFaqEdit(f);
    var savedMove = await setFaqOverride(f.id, {page: to, cat: f.cat, subcat: f.subcat});
    if (!savedFaq || !savedMove) return;
  }
  hideTopicModal();
  render(S.page);
  showToast(affected.length + ' FAQs moved - ' + kbSaveLabel());
}

function editFaq(faqId) {
  var f = FAQS.find(function(x){return x.id===faqId;});
  if (!f) return;

  // Build category dropdown options from existing FAQ categories
  var cats = {};
  FAQS.forEach(function(x){ if(x.cat) cats[x.cat]=1; });
  var catOptions = '<option value="">-- Select Category --</option>';
  Object.keys(cats).sort().forEach(function(c){
    catOptions += '<option value="' + escHtml(c) + '"' + (c===(f.cat||'')?' selected':'') + '>' + escHtml(c) + '</option>';
  });

  // Build subcategory dropdown options from existing FAQ subcategories
  var subs = {};
  FAQS.forEach(function(x){ if(x.subcat) subs[x.subcat]=1; });
  var subOptions = '<option value="">-- Select Subcategory --</option>';
  Object.keys(subs).sort().forEach(function(s){
    subOptions += '<option value="' + escHtml(s) + '"' + (s===(f.subcat||'')?' selected':'') + '>' + escHtml(s) + '</option>';
  });

  // Build page dropdown options from topics
  var pageMap = {};
  for (var sk in TOPICS) {
    TOPICS[sk].forEach(function(t){
      if (t.page && !t.url) pageMap[t.page] = (t.label_en || t.page);
    });
  }
  var pageOptions = '<option value="">-- Select Page --</option>';
  Object.keys(pageMap).sort().forEach(function(p){
    pageOptions += '<option value="' + escHtml(p) + '"' + (p===(f.page||'')?' selected':'') + '>' + escHtml(pageMap[p]) + ' (' + escHtml(p) + ')</option>';

  var body = '<div><label>ID</label><input type="text" id="faqId" value="' + escHtml(f.id) + '" readonly></div>';
  body += '<div><label>Question EN</label><input type="text" id="faqQ" value="' + escHtml(f.q||'') + '"></div>';

  body += '<div><label>Subcategory</label><select id="faqSubcat">' + subOptions + '</select></div>';

async function saveFaq(asDraft) {
  var id = document.getElementById('faqId').value.trim();
  var q = document.getElementById('faqQ').value.trim();
  var a = document.getElementById('faqA').value.trim();
  var qAr = document.getElementById('faqQAr').value.trim();
  var aAr = document.getElementById('faqAAr').value.trim();
  var cat = document.getElementById('faqCat').value.trim();
  var subcat = document.getElementById('faqSubcat').value.trim();
  var page = document.getElementById('faqPage').value.trim();
  var kw = document.getElementById('faqKw').value.trim();
  var sourceId = document.getElementById('faqSourceId') ? document.getElementById('faqSourceId').value.trim() : '';
  var sourceText = document.getElementById('faqSource') ? document.getElementById('faqSource').value.trim() : '';
  var sourceUrl = document.getElementById('faqSourceUrl') ? document.getElementById('faqSourceUrl').value.trim() : '';
  var reviewedAt = document.getElementById('faqReviewedAt') ? document.getElementById('faqReviewedAt').value : '';
  var owner = document.getElementById('faqOwner') ? document.getElementById('faqOwner').value.trim() : '';
  var accuracy = document.getElementById('faqAccuracy') ? document.getElementById('faqAccuracy').value : '';

  if (!id || !q || !a) { alert('ID, Question EN and Answer EN are required'); return; }

  var entry = {
    id:id, q:q, a:a, q_ar:qAr||q, a_ar:aAr||a,
    cat:cat||'General', subcat:subcat||'', page:page||'faq-maw-others', kw:kw||'', icon:'&#128231;',
    source_id: sourceId || '',
    source: sourceText || _sourceLabelById(sourceId) || '',
    source_url: sourceUrl || '',
    reviewed_at: reviewedAt || '',
    owner: owner || '',
    accuracy: accuracy || 'Verified'
  };

  if (asDraft) {
    var drafted = await persistFaqDraft(entry);
    if (!drafted) return;
    hideFaqModal();
    render(S.page);
    showToast('FAQ draft saved');
    return;
  }

  var existing = FAQS.findIndex(function(x){return x.id===id;});
  if (existing >= 0) {
    FAQS[existing] = entry;
  } else {
    FAQS.push(entry);
  }

  // Persist to shared store when configured, otherwise local fallback.
  var saved = await persistFaqEdit(entry);
  if (!saved) return;
  hideFaqModal();
  render(S.page);
  showToast('FAQ saved - ' + kbSaveLabel());
}

async function deleteFaq(faqId) {
  if (!confirm('Delete FAQ ' + faqId + '? This will remove it for ALL users.')) return;
  var idx = FAQS.findIndex(function(f){return f.id===faqId;});
  if (idx >= 0) FAQS.splice(idx, 1);
  // Persist deletion to shared store when configured, otherwise local fallback.
  var saved = await persistFaqDelete(faqId);
  if (!saved) return;
  render(S.page);
  showToast('FAQ deleted - ' + kbSaveLabel());
}

function saveTableEditFromModal(tableName) {
  var jsonData = document.getElementById('tableEditData').value;
  saveTableEdit(tableName, jsonData);
  hideTopicModal();
}

async function saveTableEdit(tableName, jsonData) {
  if (!S.admin) { showToast('Admin login required'); return; }
  try {
    var data = JSON.parse(jsonData);
    await kbStoreSet('kb_table_' + tableName, data, {auth:true});
    showToast(tableName + ' updated - ' + kbSaveLabel());
    render(S.page);
  } catch(e) {
    alert('Could not save table: ' + kbSyncProblemMessage(e));
  }
}

async function loadTableData(tableName, defaultData) {
  try {
    var row = await kbStoreGet('kb_table_' + tableName);
    return (row && row.value) ? row.value : defaultData;
  } catch(e) { return defaultData; }
}

async function applySavedTableData() {
  var savedPermits = await loadTableData('permits', null);
  if (Array.isArray(savedPermits)) PERMITS = savedPermits;
  var savedVehicleTypes = await loadTableData('vtypeData', null);
  if (Array.isArray(savedVehicleTypes)) VTYPE_DATA = savedVehicleTypes;
  var savedRates = await loadTableData('quickRates', null);
  if (Array.isArray(savedRates)) QUICK_RATES = savedRates;
}

function applyFaqDataQualityPass() {

  var byId = {};

  KB_OPERATIONAL_FAQS.forEach(function(f){
    if (!byId[f.id]) {
      FAQS.push(f);
      byId[f.id] = f;
    }
  });

  Object.keys(FAQ_CORRECTIONS).forEach(function(id){
    if (byId[id]) {
      Object.assign(byId[id], FAQ_CORRECTIONS[id]);
      byId[id]._idx = false;
      byId[id].source = FAQ_CORRECTIONS[id].source || 'KB source reconciliation 2026-06-11';
    }
  });

  _kbNormalizeOperationalText();

  if (byId['MM-011']) {
    Object.assign(byId['MM-011'], {
      q: 'How should Mushrif Mall parking complaints be raised?',
      a: '<p>For Mushrif Mall parking complaints, ask the customer to raise the complaint through the <strong>Darb App</strong> or <strong>Darb X App</strong> complaint/support section. Do not route Mushrif Mall parking complaints by email.</p>' + _kbFooter(),

      source: 'Entry signage: Free Flow Paid Parking briefing',
      reviewed_at: '2026-06-19',
      _idx: false
    });
  }

  Object.keys(FAQ_MERGE_MAP).forEach(function(aliasId){
    var canonicalId = FAQ_MERGE_MAP[aliasId];
    if (byId[aliasId] && byId[canonicalId]) _kbMergeFaq(byId[canonicalId], byId[aliasId]);
  });

  var seen = {};
  var cleaned = [];
  FAQS.forEach(function(f){
    if (!f || f._mergedInto) return;
    if (FAQ_REMOVED_IDS[f.id]) return;
    var sig = _kbSig(f.q || '');
    if (sig && seen[sig]) {

    cleaned.push(f);

  ALL_FAQ = FAQS;
}

// ===== INIT =====
async function init() {
  var urlP = location.search.match(/[?&]p=([^&]+)/);
  if (urlP && urlP[1]) S.page = decodeURIComponent(urlP[1]);
  var mobileSidebar = document.getElementById('sidebar');
  if (window.innerWidth <= 600 && mobileSidebar && !mobileSidebar.classList.contains('collapsed')) {
    mobileSidebar.classList.add('collapsed');
    S.menu = false;
  }

  // Show loading state while fetching saved KB data
  document.getElementById('content').innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:60vh;flex-direction:column;gap:12px;"><div style="font-size:36px;">⏳</div><p style="color:var(--text2);font-size:14px;">Loading Knowledge Base…</p></div>';

  var adminLoaded = false;
  var adminLoad = loadAdminData().then(function(){ adminLoaded = true; return true; }).catch(function(){ return false; });
  await Promise.race([adminLoad, _kbDelay(1800)]);
  await applySavedTableData();
  applyFaqDataQualityPass();
  buildNav();
  render(S.page);

  if (!adminLoaded) {
    adminLoad.then(async function(){
      await applySavedTableData();
      applyFaqDataQualityPass();
      buildNav();
      render(S.page);
    });
  }

  // Real-time sync: poll the shared store every 10s for admin changes.
  // Non-admin users get a silent reload; admin users get a toast prompt.
  var _lastUpdatedAt = null;
  async function _checkForUpdates() {
    try {
      var row = await kbStoreGet('kb_admin_data');
      if (!row) {
        if (_lastUpdatedAt !== null && !S.admin) location.reload();
        _lastUpdatedAt = null;
        return;
      }
      var ts = row.updated_at || JSON.stringify(row.value || {}).length;
      if (_lastUpdatedAt === null) {
        _lastUpdatedAt = ts;
        await loadAdminData();
        applyFaqDataQualityPass();
        render(S.page);
        buildNav();
        return;
      }
      if (ts !== _lastUpdatedAt) {
        _lastUpdatedAt = ts;
        // Reload the shared admin data and re-render the current page.
        await loadAdminData();
        applyFaqDataQualityPass();
        render(S.page);
        buildNav();
      }
    } catch(e) {}
  }
  setInterval(_checkForUpdates, 10000); // every 10 seconds

  // Keyboard shortcuts
  document.addEventListener('keydown', function(e){
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
      e.preventDefault();
      focusSearch();
    }
    if (e.key === 'Escape') {
      hideAdminModal();
      hideTopicModal();
      hideFaqModal();
    }
  });

  // Close the instant-search dropdown when clicking outside the search box
  document.addEventListener('click', function(e){
    var box = document.querySelector('.search-box');
    if (box && !box.contains(e.target)) hideSearchDropdown();
  });
}

// Start
init();
</script>
