<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>QMobility Knowledge Base v19</title>
<style>
:root{--qm:#2e7d32;--qm-l:#e8f5e9;--darb:#1976d2;--darb-l:#e3f2fd;--priv:#7b1fa2;--priv-l:#f3e8ff;--tech:#ef6c00;--tech-l:#fff3e0;--feed:#c62828;--feed-l:#ffebee;--bg:#f0f2f5;--surf:#fff;--text:#1a1a2e;--text2:#6b7280;--border:#e5e7eb}
*{box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);margin:0;height:100vh;display:flex;overflow:hidden;-webkit-font-smoothing:antialiased}
.app{display:flex;height:100vh;width:100vw}
.sidebar{width:260px;flex-shrink:0;background:var(--surf);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;transition:transform .3s}
.main{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden}
#content{flex:1;overflow-y:auto;padding:24px 32px}
.topbar{background:var(--surf);padding:12px 24px;display:flex;align-items:center;gap:12px;flex-shrink:0;flex-wrap:wrap;border-bottom:1px solid var(--border)}
.menu-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 10px;cursor:pointer;font-size:18px}
.lang-toggle{padding:6px 12px;border:1px solid #ddd;border-radius:20px;background:#fff;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:6px}
.lang-toggle:hover{background:var(--qm-l)}
.card{background:var(--surf);border:1px solid var(--border);border-radius:14px;padding:20px;box-shadow:0 1px 2px rgba(16,24,40,.04),0 1px 3px rgba(16,24,40,.06);margin-bottom:14px}
.faq-list{display:flex;flex-direction:column;gap:14px;max-width:100%}
.faq-card{background:var(--surf);border:1px solid var(--border);border-radius:12px;padding:16px 18px;box-shadow:0 1px 2px rgba(16,24,40,.05);transition:box-shadow .15s ease,border-color .15s ease;min-width:0;max-width:100%}
.faq-card:hover{border-color:#cdd3da;box-shadow:0 2px 8px rgba(16,24,40,.08)}
.faq-q{font-weight:700;font-size:15px;margin-bottom:12px;color:var(--text);line-height:1.45;letter-spacing:-.1px}
.faq-a{font-size:13.5px;line-height:1.72;color:#3b4453;overflow-wrap:break-word;word-break:break-word;max-width:100%}.faq-a p{margin:0 0 9px 0}.faq-a ul,.faq-a ol{margin:6px 0 10px 0;padding-left:22px}.faq-a li{margin-bottom:5px}.faq-a h3,.faq-a h4{margin:14px 0 6px 0;font-size:13.5px;font-weight:700;color:var(--text)}.faq-a a{color:var(--darb);text-decoration:none;border-bottom:1px solid rgba(25,118,210,.3)}.faq-a a:hover{border-bottom-color:var(--darb)}
.faq-a table{font-size:12.5px;margin:10px 0;table-layout:fixed;width:100%;word-break:break-word;border:1px solid var(--border);border-radius:10px;border-collapse:collapse}
.faq-a th{background:var(--qm);color:#fff;text-align:left;padding:8px 11px;font-weight:600}
.faq-a td{padding:8px 11px;border-top:1px solid var(--border)}
.faq-a tr:nth-child(even) td{background:#f8fafb}
.faq-a strong{color:#111827}
.faq-a .amount{font-weight:700;color:var(--qm)}
.faq-a .info-box{background:var(--qm-l);border-left:3px solid var(--qm);border-radius:0 8px 8px 0;padding:10px 14px;margin:10px 0;font-size:13px;color:#2f4733}
.faq-a .footer{background:#f4f7f5;border:1px solid #e3ece5;border-radius:10px;padding:11px 14px;margin-top:12px;font-size:12.5px;color:#4b5563}
.faq-meta{display:flex;justify-content:space-between;align-items:center;margin-top:16px;padding-top:12px;border-top:1px solid var(--border);flex-wrap:wrap;gap:8px}
.faq-tags{display:flex;gap:6px;flex-wrap:wrap}
.tag{font-size:11px;padding:3px 10px;border-radius:20px;background:var(--qm-l);color:var(--qm);display:inline-block;margin-right:6px;font-weight:500}
.btn{background:var(--qm);color:#fff;border:none;border-radius:9px;padding:8px 16px;cursor:pointer;font-size:13px;font-weight:500;transition:transform .12s ease,box-shadow .2s ease,opacity .2s ease}
.btn:hover{opacity:.94;box-shadow:0 4px 12px -3px rgba(46,125,50,.5)}
.btn:active{transform:scale(.96)}
/* ===== Animations ===== */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes ddIn{from{opacity:0;transform:translateY(-6px) scale(.99)}to{opacity:1;transform:none}}
@keyframes pop{0%{transform:scale(.96);opacity:.5}100%{transform:scale(1);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
.page-enter{animation:fadeIn .28s ease}
.faq-list>.faq-card{animation:fadeIn .22s ease both}
.sector-grid>*,.quick-grid>*,.submenu-grid>*{animation:fadeUp .34s ease both}
.sector-grid>*:nth-child(2),.quick-grid>*:nth-child(2){animation-delay:.05s}
.sector-grid>*:nth-child(3),.quick-grid>*:nth-child(3){animation-delay:.10s}
.quick-grid>*:nth-child(4){animation-delay:.15s}
.search-dropdown{animation:ddIn .16s ease}
.sd-item{animation:fadeUp .2s ease both}
.sd-item:nth-child(2){animation-delay:.03s}.sd-item:nth-child(3){animation-delay:.05s}.sd-item:nth-child(4){animation-delay:.07s}.sd-item:nth-child(5){animation-delay:.09s}.sd-item:nth-child(n+6){animation-delay:.11s}
.faq-body-anim{animation:fadeIn .18s ease}
.menu-btn,.lang-toggle{transition:background .15s ease,transform .12s ease,border-color .15s ease}
.menu-btn:hover{background:var(--qm-l);border-color:var(--qm)}
.menu-btn:active,.lang-toggle:active{transform:scale(.93)}
.spinner{width:34px;height:34px;border:3px solid var(--qm-l);border-top-color:var(--qm);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
@media(prefers-reduced-motion:reduce){*{animation:none!important;scroll-behavior:auto!important;transition-duration:.01ms!important}}
.toast{position:fixed;bottom:24px;right:24px;background:var(--qm);color:#fff;padding:12px 20px;border-radius:10px;opacity:0;transform:translateY(10px);transition:opacity .3s,transform .3s;z-index:100;box-shadow:0 8px 24px -6px rgba(46,125,50,.5)}
.toast.show{opacity:1;transform:translateY(0)}
body[dir="rtl"] .toast{left:24px;right:auto}
.sector-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
.sector-card{background:var(--surf);border-radius:12px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.08);cursor:pointer;transition:transform .15s,box-shadow .15s;border-top:4px solid var(--qm);text-align:center}
.sector-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.12)}
.sector-card .icon{font-size:32px;margin-bottom:8px}
.sector-card .title{font-weight:700;font-size:16px;margin-bottom:4px}
.sector-card .desc{font-size:12px;color:var(--text2)}
.sector-card .count{font-size:13px;color:var(--qm);margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.quick-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.quick-card{background:var(--surf);border-radius:12px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.08);cursor:pointer;transition:transform .15s;text-align:center}
.quick-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.12)}
.quick-card .icon{font-size:28px;margin-bottom:8px}
.quick-card .title{font-weight:700;font-size:14px}
.quick-card .desc{font-size:12px;color:var(--text2);margin-top:4px}
.submenu-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
.submenu-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:20px;cursor:pointer;transition:all .2s;text-align:center}
.submenu-card:hover{border-color:var(--qm);transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.1)}
.submenu-card .icon{font-size:28px;margin-bottom:8px}
.submenu-card .title{font-size:16px;font-weight:700;margin-bottom:4px}
.submenu-card .desc{font-size:13px;color:var(--text2)}
.submenu-card .count{font-size:12px;color:var(--qm);margin-top:8px}
.opt-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
.opt-card{background:var(--surf);border-radius:12px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.08);cursor:pointer;transition:transform .15s;border-left:4px solid var(--qm)}
.opt-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.12)}
.breadcrumb{font-size:13px;color:var(--text2);margin-bottom:12px}
.breadcrumb a{color:var(--qm);cursor:pointer;text-decoration:none}
.breadcrumb a:hover{text-decoration:underline}
.page-title{font-size:24px;font-weight:700;margin-bottom:4px}
.page-subtitle{font-size:14px;color:var(--text2);margin-bottom:20px}
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:12px}
.page-header .actions{display:flex;gap:8px}
.search-box{flex:1 1 220px;min-width:200px;max-width:480px;position:relative;order:5}
@media(max-width:760px){.search-box{order:9;flex-basis:100%;max-width:none}}
.search-box input{width:100%;padding:8px 14px;border:1px solid var(--border);border-radius:8px;font-size:13px}
.search-box input:focus{outline:none;border-color:var(--qm);box-shadow:0 0 0 3px var(--qm-l)}
.search-dropdown{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--surf);border:1px solid var(--border);border-radius:10px;box-shadow:0 8px 28px rgba(0,0,0,.16);max-height:70vh;overflow-y:auto;z-index:200;display:none;padding:4px}
.sd-item{padding:9px 12px;border-radius:8px;cursor:pointer;display:block;border:1px solid transparent}
.sd-item:hover,.sd-item.active{background:var(--qm-l);border-color:var(--qm)}
.sd-q{font-size:13px;font-weight:600;color:var(--text);line-height:1.35;margin-bottom:3px}
.sd-snip{font-size:11.5px;color:var(--text2);line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.sd-cat{display:inline-block;font-size:10px;color:var(--qm);background:var(--qm-l);border-radius:10px;padding:1px 8px;margin-top:4px}
.sd-item mark,.faq-a mark,.faq-q mark{background:#fff3b0;color:inherit;border-radius:2px;padding:0 1px}
.sd-foot{padding:8px 12px;font-size:11px;color:var(--text2);border-top:1px solid var(--border);margin-top:4px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:6px}
.sd-foot kbd{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:1px 5px;font-size:10px}
.sd-empty{padding:18px 14px;text-align:center;color:var(--text2);font-size:12.5px}
.email-card{background:var(--surf);border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.email-cat-badge{font-size:12px;padding:4px 14px;border-radius:20px;background:var(--darb-l);color:var(--darb);display:inline-block;margin-bottom:12px;font-weight:600}
.email-subject{font-weight:600;margin-bottom:10px}
.email-body{background:#f8f9fa;border-radius:8px;padding:14px;margin-bottom:10px;font-size:13px;line-height:1.6;white-space:pre-wrap}
.email-body.ar{text-align:right;direction:rtl}
.sms-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
.sms-card{background:#fff;border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px}
.sms-title{font-weight:600;margin-bottom:4px}
.sms-body{font-family:monospace;font-size:13px;background:#f8f9fa;padding:8px;border-radius:4px;margin:8px 0}
.sms-tmpl-card{background:var(--surf);border-radius:12px;padding:16px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.08);display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.sms-tmpl-text{font-size:13px;flex:1;word-break:break-word}
.darb-x-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;margin-bottom:24px}
.darb-x-card{background:var(--surf);border-radius:12px;padding:24px;box-shadow:0 1px 3px rgba(0,0,0,.08);border-top:4px solid var(--darb);transition:transform .15s}
.darb-x-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.12)}
.darb-x-title{font-size:18px;font-weight:700;margin-bottom:8px;color:var(--darb);display:flex;align-items:center;gap:8px}
.darb-x-desc{font-size:14px;color:var(--text2);line-height:1.6;margin-bottom:8px}
.darb-x-desc.ar{text-align:right;direction:rtl;color:#555}
.admin-modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;justify-content:center;align-items:center}
.admin-modal.show{display:flex}
.admin-box{background:var(--surf);border-radius:16px;padding:32px;width:380px;box-shadow:0 10px 40px rgba(0,0,0,.2)}
.admin-box input,.admin-box select{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;margin-bottom:12px;font-size:14px}
.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;justify-content:center;align-items:center;overflow-y:auto}
.modal.show{display:flex}
.modal-box{background:var(--surf);border-radius:16px;padding:32px;width:500px;max-height:90vh;overflow-y:auto;box-shadow:0 10px 40px rgba(0,0,0,.2)}
.modal-box h3{margin-top:0}
.modal-box input,.modal-box select,.modal-box textarea{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;margin-bottom:10px;font-size:14px;font-family:inherit}
.modal-box textarea{min-height:100px;resize:vertical}
.edit-form{background:var(--surf);border-radius:12px;padding:24px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.08);display:none}
.edit-form.show{display:block}
.edit-form input,.edit-form textarea{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;margin-bottom:10px;font-size:14px;font-family:inherit}
.edit-form textarea{min-height:120px;resize:vertical}
.nav-sidebar-item{padding:10px 16px;cursor:pointer;border-radius:8px;margin:2px 8px;font-size:13px;display:flex;align-items:center;gap:8px;transition:background .15s;color:var(--text)}
.nav-sidebar-item:hover{background:var(--qm-l)}
.nav-sidebar-item.active{background:var(--qm-l);color:var(--qm);font-weight:600}
.nav-sidebar-label{padding:16px 16px 6px;font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.nav-sidebar-group{margin:2px 0}
.nav-sidebar-sub{padding:8px 16px 8px 36px;cursor:pointer;border-radius:8px;margin:1px 8px;font-size:12px;color:var(--text2);transition:background .15s}
.nav-sidebar-sub:hover{background:var(--qm-l);color:var(--qm)}
.nav-sidebar-sub.active{background:var(--qm-l);color:var(--qm);font-weight:600}
.nav-has-sub{cursor:pointer;position:relative;padding-right:24px}
.nav-has-sub:after{content:"\25B8";position:absolute;right:12px;transition:transform .2s;font-size:11px;color:var(--text2)}
.nav-has-sub.open:after{transform:rotate(90deg)}
.nav-sub-menu{display:none;padding-left:16px;border-left:2px solid var(--qm-l);margin-left:12px;margin-bottom:4px}
.nav-sub-menu.show{display:block}
.sidebar-header{padding:16px 20px;font-size:16px;font-weight:700;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.sidebar-header .logo-dot{width:10px;height:10px;border-radius:50%;background:var(--qm);display:inline-block}
.sidebar-footer{padding:12px 16px;border-top:1px solid var(--border);font-size:11px;color:var(--text2);text-align:center}
table{border-collapse:collapse;width:100%;margin:10px 0}
th,td{border:1px solid var(--border);padding:8px 12px;font-size:13px;text-align:left}
th{background:var(--qm-l);font-weight:600}
.danger-box{background:#ffebee;border:1px solid #ef9a9a;border-radius:8px;padding:14px;margin:10px 0}
.info-box{background:var(--darb-l);border:1px solid #90caf9;border-radius:8px;padding:14px;margin:10px 0}
.highlight{background:var(--qm-l);border:1px solid #a5d6a7;border-radius:8px;padding:14px;margin:10px 0}
.category-section{margin-bottom:28px}
.category-header{font-size:15px;font-weight:700;margin-bottom:14px;padding:10px 16px;border-radius:8px;background:var(--qm-l);color:var(--qm);border-left:4px solid var(--qm)}
/* RTL Support */
body[dir="rtl"] .app{flex-direction:row-reverse}
body[dir="rtl"] .sidebar{border-left:none;border-right:1px solid var(--border)}
body[dir="rtl"] .nav-sidebar-sub{padding:8px 36px 8px 16px;text-align:right}
body[dir="rtl"] .nav-has-sub{padding-left:24px;padding-right:16px}
body[dir="rtl"] .nav-has-sub:after{left:12px;right:auto}
body[dir="rtl"] .nav-sub-menu{padding-right:16px;padding-left:0;border-right:2px solid var(--qm-l);border-left:none;margin-right:12px;margin-left:0}
body[dir="rtl"] .faq-a{direction:rtl;text-align:right}
body[dir="rtl"] .breadcrumb{direction:rtl;text-align:right}
body[dir="rtl"] .page-header{flex-direction:row-reverse}
body[dir="rtl"] .page-title{text-align:right}
body[dir="rtl"] .page-subtitle{text-align:right}
body[dir="rtl"] .opt-card{border-left:none;border-right:4px solid var(--qm)}
/* Tow yard items */
.tow-yard-item{padding:12px;border:1px solid var(--border);border-radius:8px;margin-bottom:8px}
.tow-yard-item a{color:var(--qm);text-decoration:none}
/* Service links */
.service-link{display:block;padding:10px 12px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px;text-decoration:none;color:var(--text);transition:all .2s}
.service-link:hover{border-color:var(--qm);background:var(--qm-l)}
.services-tabs{display:flex;gap:8px;margin-bottom:12px}
.services-tab{padding:6px 16px;border:1px solid var(--border);border-radius:20px;background:#fff;cursor:pointer}
.services-tab.active{background:var(--qm);color:#fff}
.services-tab-content{display:block}
/* Updates */
.updates-list{display:flex;flex-direction:column;gap:8px;margin-bottom:24px}
.update-item{padding:12px 16px;border:1px solid var(--border);border-radius:8px;border-left:3px solid var(--qm)}
body[dir="rtl"] .update-item{border-left:none;border-right:3px solid var(--qm)}
.update-date{font-size:12px;color:var(--text2)}
.update-title{font-weight:600;margin:4px 0}
.update-desc{font-size:13px;color:var(--text2)}
/* Script cards */
.script-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
.script-section{margin-top:12px;padding-top:12px;border-top:1px solid #eee}
.script-text{background:#f8f9fa;padding:12px;border-radius:8px;font-family:monospace;font-size:13px;line-height:1.6;margin:8px 0}
/* Data tables */
.data-table{width:100%;border-collapse:collapse}
.data-table th{background:var(--qm-l);padding:10px;text-align:left;font-size:13px}
.data-table td{padding:10px;border-bottom:1px solid var(--border);font-size:13px}
/* Search tabs */
.search-tabs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.search-tab{padding:6px 14px;border:1px solid var(--border);border-radius:20px;background:#fff;cursor:pointer;font-size:13px;white-space:nowrap}
.search-tab.active{background:var(--qm);color:#fff;border-color:var(--qm)}
.search-tab:hover{border-color:var(--qm)}
/* Mark/highlight for search */
mark{background:#ffeb3b;padding:1px 2px;border-radius:2px}
@media(max-width:900px){.sector-grid{grid-template-columns:repeat(2,1fr)}.quick-grid{grid-template-columns:repeat(2,1fr)}.opt-grid{grid-template-columns:repeat(2,1fr)}.submenu-grid{grid-template-columns:repeat(2,1fr)}.darb-x-grid{grid-template-columns:1fr}}
@media(max-width:600px){.sector-grid{grid-template-columns:1fr}.quick-grid{grid-template-columns:1fr}.opt-grid{grid-template-columns:1fr}.submenu-grid{grid-template-columns:1fr}.sms-grid{grid-template-columns:1fr}.darb-x-grid{grid-template-columns:1fr}.sidebar{position:absolute;z-index:50;height:100%}}

.faq-a .footer{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:10px 14px;margin-top:12px;font-size:12px;color:#166534}
.faq-a .info-box{background:var(--darb-l);border:1px solid #90caf9;border-radius:8px;padding:10px 14px;margin:8px 0;font-size:13px}
.faq-a .danger-box{background:#ffebee;border:1px solid #ef9a9a;border-radius:8px;padding:10px 14px;margin:8px 0;font-size:13px}
.faq-a .highlight{background:var(--qm-l);border:1px solid #a5d6a7;border-radius:8px;padding:10px 14px;margin:8px 0;font-size:13px}
/* ===== Agent cockpit refresh ===== */
@keyframes softRise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes glowLine{0%,100%{transform:translateX(-30%);opacity:.25}50%{transform:translateX(30%);opacity:.65}}
.agent-shell{display:flex;flex-direction:column;gap:18px}
.agent-hero{position:relative;overflow:hidden;display:grid;grid-template-columns:minmax(0,1.05fr) minmax(320px,.95fr);gap:22px;padding:24px;border:1px solid #d9e7df;border-radius:8px;background:linear-gradient(135deg,#ffffff 0%,#f7fbf9 52%,#eef7f4 100%);box-shadow:0 10px 32px rgba(15,23,42,.07)}
.agent-hero:before{content:"";position:absolute;left:18px;right:18px;top:0;height:3px;background:linear-gradient(90deg,var(--qm),var(--darb),var(--priv),var(--tech));animation:glowLine 4.5s ease-in-out infinite}
.agent-eyebrow{font-size:12px;font-weight:800;color:var(--qm);letter-spacing:0;text-transform:uppercase;margin-bottom:8px}
.agent-hero h1{font-size:32px;line-height:1.1;margin:0 0 10px;color:#101828;letter-spacing:0}
.agent-hero p{font-size:14px;line-height:1.7;color:#475467;margin:0 0 16px;max-width:760px}
.agent-search-panel{display:flex;gap:8px;background:#fff;border:1px solid #cbd8d0;border-radius:8px;padding:8px;box-shadow:0 8px 20px rgba(46,125,50,.08)}
.agent-search-panel input{flex:1;min-width:0;border:0;font-size:15px;padding:11px 12px;outline:none}
.agent-search-panel button{white-space:nowrap}
.agent-kpis{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-top:14px}
.agent-kpi{background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:12px;animation:softRise .35s ease both}
.agent-kpi strong{display:block;font-size:22px;color:#111827;line-height:1}
.agent-kpi span{font-size:12px;color:#667085}
.agent-panel{background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:16px;animation:softRise .35s ease both}
.agent-panel h2{font-size:16px;margin:0 0 12px;color:#101828}
.agent-actions{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
.agent-action{border:1px solid #e5e7eb;border-radius:8px;background:#fff;padding:13px;min-height:92px;cursor:pointer;text-align:left;transition:transform .16s ease,border-color .16s ease,box-shadow .16s ease}
.agent-action:hover{transform:translateY(-2px);border-color:#9fc7aa;box-shadow:0 9px 22px rgba(15,23,42,.08)}
.agent-action b{display:block;font-size:14px;margin-bottom:5px;color:#111827}
.agent-action span{font-size:12px;line-height:1.45;color:#667085}
.agent-alerts{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
.agent-alert{border-radius:8px;border:1px solid #e5e7eb;background:#fff;padding:13px;position:relative;overflow:hidden}
.agent-alert:before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--qm)}
.agent-alert.darb:before{background:var(--darb)}
.agent-alert.priv:before{background:var(--priv)}
.agent-alert.warn:before{background:var(--tech)}
.agent-alert b{display:block;font-size:13px;margin-bottom:5px;color:#111827}
.agent-alert span{font-size:12px;line-height:1.5;color:#667085}
.agent-source-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
.agent-source{border:1px dashed #cfd8dc;border-radius:8px;padding:12px;background:#fbfcfd}
.agent-source b{display:block;font-size:13px;color:#111827;margin-bottom:4px}
.agent-source span{font-size:12px;color:#667085;line-height:1.45}
.agent-badge{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:4px 9px;background:#eef7f4;color:#246b35;border:1px solid #cce4d3;font-size:11px;font-weight:700;margin:0 6px 6px 0}
.agent-grid-two{display:grid;grid-template-columns:1.15fr .85fr;gap:18px}
.agent-chip-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.agent-chip{border:1px solid #d0d5dd;background:#fff;border-radius:999px;padding:6px 10px;font-size:12px;color:#344054;cursor:pointer;transition:background .15s ease,border-color .15s ease}
.agent-chip:hover{background:#f4fbf6;border-color:#9fc7aa}
@media(max-width:1100px){.agent-hero,.agent-grid-two{grid-template-columns:1fr}.agent-actions,.agent-alerts,.agent-source-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media(max-width:680px){#content{padding:16px}.agent-hero{padding:18px}.agent-hero h1{font-size:25px}.agent-search-panel{flex-direction:column}.agent-kpis,.agent-actions,.agent-alerts,.agent-source-grid{grid-template-columns:1fr}}
/* ===== Visual KB polish 2026 ===== */
:root{--warm:#fff7ed;--warm2:#ffedd5;--mint:#ecfdf3;--mint2:#d1fadf;--sky:#eaf4ff;--sky2:#cfe8ff;--violet:#f4ecff;--coral:#fff0ed;--ink:#101828;--soft-shadow:0 18px 42px rgba(16,24,40,.09);--card-shadow:0 9px 24px rgba(16,24,40,.075)}
body{background:linear-gradient(135deg,#f6fbf7 0%,#f3f8ff 48%,#fff8f0 100%)}
.main{background:linear-gradient(135deg,#f6fbf7 0%,#f4f8ff 48%,#fff8f0 100%)}
.topbar{background:rgba(255,255,255,.88);backdrop-filter:saturate(1.1) blur(12px);box-shadow:0 10px 26px rgba(16,24,40,.045)}
.sidebar{box-shadow:8px 0 24px rgba(16,24,40,.04);background:linear-gradient(180deg,#ffffff 0%,#fbfdfc 100%)}
.sidebar.collapsed{transform:translateX(-100%);margin-left:-260px}
body[dir="rtl"] .sidebar.collapsed{transform:translateX(100%);margin-left:0;margin-right:-260px}
.sidebar-header{font-size:17px;background:linear-gradient(90deg,#ffffff,#f2fbf4)}
.nav-sidebar-item,.nav-sidebar-sub{transition:background .18s ease,color .18s ease,transform .18s ease}
.nav-sidebar-item:hover,.nav-sidebar-sub:hover{transform:translateX(2px)}
body[dir="rtl"] .nav-sidebar-item:hover,body[dir="rtl"] .nav-sidebar-sub:hover{transform:translateX(-2px)}
@keyframes laneSweep{0%{transform:translateX(-45%);opacity:.18}50%{opacity:.55}100%{transform:translateX(45%);opacity:.18}}
@keyframes pulseDot{0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(46,125,50,.22)}50%{transform:scale(1.06);box-shadow:0 0 0 9px rgba(46,125,50,0)}}
@keyframes floatIn{from{opacity:0;transform:translateY(12px) scale(.985)}to{opacity:1;transform:none}}
@keyframes routeBlink{0%,100%{opacity:.45;stroke-dashoffset:0}50%{opacity:1;stroke-dashoffset:-18}}
.agent-shell{gap:20px}
.agent-hero{border:1px solid rgba(46,125,50,.18);border-radius:24px;padding:28px;background:linear-gradient(120deg,rgba(255,255,255,.96) 0%,rgba(236,253,243,.92) 45%,rgba(234,244,255,.88) 72%,rgba(255,247,237,.92) 100%);box-shadow:var(--soft-shadow);isolation:isolate}
.agent-hero:before{left:24px;right:24px;height:5px;border-radius:999px;background:linear-gradient(90deg,#2e7d32,#16a34a,#1976d2,#7b1fa2,#ef6c00);animation:laneSweep 5s ease-in-out infinite}
.agent-hero:after{content:"";position:absolute;inset:auto -10% -28% 44%;height:68%;background:linear-gradient(135deg,rgba(46,125,50,.12),rgba(25,118,210,.12),rgba(239,108,0,.1));transform:rotate(-8deg);border-radius:38px;z-index:-1}
.agent-hero>*{position:relative;z-index:1}
.agent-eyebrow{display:inline-flex;align-items:center;gap:8px;border-radius:999px;padding:7px 11px;background:#ffffff;border:1px solid rgba(46,125,50,.2);box-shadow:0 5px 16px rgba(46,125,50,.08);color:#1f7a35}
.agent-eyebrow:before{content:"";width:8px;height:8px;border-radius:50%;background:#25b45a;animation:pulseDot 2.4s ease-in-out infinite}
.agent-hero h1{font-size:36px;max-width:660px}
.agent-hero p{font-size:15px;color:#344054}
.agent-search-panel{border-radius:18px;border:1px solid rgba(46,125,50,.2);box-shadow:0 15px 32px rgba(46,125,50,.1);overflow:hidden}
.agent-search-panel input{font-size:15px}
.agent-search-panel button{border-radius:13px}
.agent-chip{border-color:rgba(25,118,210,.18);background:rgba(255,255,255,.82);box-shadow:0 4px 12px rgba(16,24,40,.045)}
.agent-chip:hover{transform:translateY(-1px);box-shadow:0 8px 18px rgba(16,24,40,.07)}
.agent-visual{min-height:300px;border-radius:22px;padding:18px;background:rgba(255,255,255,.74);border:1px solid rgba(255,255,255,.88);box-shadow:inset 0 1px 0 rgba(255,255,255,.86),0 18px 44px rgba(16,24,40,.08);display:flex;flex-direction:column;gap:14px}
.agent-visual-head{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
.agent-visual-head b{font-size:16px;color:#12201a}
.agent-live-dot{display:inline-flex;align-items:center;gap:7px;font-size:11px;font-weight:800;color:#1f7a35;background:#ecfdf3;border:1px solid #bbf7d0;border-radius:999px;padding:5px 9px}
.agent-live-dot:before{content:"";width:8px;height:8px;border-radius:50%;background:#25b45a;animation:pulseDot 2s ease-in-out infinite}
.agent-visual-stage{position:relative;min-height:190px;border-radius:18px;background:linear-gradient(140deg,#ffffff 0%,#effaf2 45%,#eef6ff 100%);border:1px solid rgba(46,125,50,.14);overflow:hidden}
.agent-visual-stage svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.agent-route{fill:none;stroke:url(#kbRouteGradient);stroke-width:4;stroke-linecap:round;stroke-dasharray:9 10;animation:routeBlink 3.4s ease-in-out infinite}
.agent-visual-node{position:absolute;display:flex;align-items:center;gap:9px;background:#fff;border:1px solid rgba(16,24,40,.08);border-radius:16px;padding:10px 12px;box-shadow:0 10px 24px rgba(16,24,40,.08);animation:floatIn .45s ease both}
.agent-visual-node i{font-style:normal;display:grid;place-items:center;width:32px;height:32px;border-radius:12px;background:var(--mint);color:#1f7a35;font-size:17px}
.agent-visual-node b{display:block;font-size:13px;color:#111827}
.agent-visual-node span{display:block;font-size:11px;color:#667085;margin-top:1px}
.agent-visual-node.n1{left:5%;top:18%;animation-delay:.05s}.agent-visual-node.n2{right:7%;top:36%;animation-delay:.13s}.agent-visual-node.n3{left:24%;bottom:12%;animation-delay:.2s}
.agent-rhythm{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
.agent-rhythm div{background:rgba(255,255,255,.82);border:1px solid rgba(16,24,40,.08);border-radius:14px;padding:10px}
.agent-rhythm b{display:block;font-size:18px;color:#111827}.agent-rhythm span{font-size:11px;color:#667085}
.agent-panel{border-radius:20px;border-color:rgba(16,24,40,.08);box-shadow:var(--card-shadow);background:rgba(255,255,255,.88)}
.agent-panel h2{display:flex;align-items:center;gap:9px;font-size:17px}
.agent-panel h2:before{content:"";width:10px;height:10px;border-radius:50%;background:linear-gradient(135deg,var(--qm),var(--darb))}
.agent-actions{gap:12px}
.agent-action{position:relative;overflow:hidden;border-radius:18px;min-height:118px;padding:15px;background:linear-gradient(180deg,#ffffff 0%,#fbfdfc 100%);box-shadow:0 6px 18px rgba(16,24,40,.045)}
.agent-action:after{content:"";position:absolute;left:0;right:0;bottom:0;height:4px;background:linear-gradient(90deg,var(--qm),var(--darb),var(--priv),var(--tech));transform:scaleX(.18);transform-origin:left;transition:transform .22s ease}
.agent-action:hover:after{transform:scaleX(1)}
.agent-action-icon{display:grid;place-items:center;width:36px;height:36px;border-radius:14px;background:var(--mint);color:#1f7a35;font-size:18px;margin-bottom:10px}
.agent-action b{font-size:14px}.agent-action span{font-size:12.5px}
.agent-action-arrow{position:absolute;right:13px;top:13px;width:24px;height:24px;border-radius:999px;display:grid;place-items:center;background:#f2f4f7;color:#475467;transition:transform .18s ease,background .18s ease}
.agent-action:hover .agent-action-arrow{transform:translateX(2px);background:#e8f5e9;color:#1f7a35}
.agent-alerts{gap:12px}
.agent-grid-two .agent-alerts{grid-template-columns:1fr}
.agent-alert{border-radius:18px;padding:14px 14px 14px 52px;min-height:102px;box-shadow:0 6px 18px rgba(16,24,40,.045);transition:transform .16s ease,box-shadow .16s ease}
.agent-alert:hover{transform:translateY(-2px);box-shadow:0 12px 26px rgba(16,24,40,.09)}
.agent-alert:before{width:5px}
.agent-alert-icon{position:absolute;left:15px;top:15px;display:grid;place-items:center;width:28px;height:28px;border-radius:11px;background:var(--mint);color:#1f7a35;font-size:15px}
.agent-alert.darb .agent-alert-icon{background:var(--sky);color:#1565c0}.agent-alert.priv .agent-alert-icon{background:var(--violet);color:#6b21a8}.agent-alert.warn .agent-alert-icon{background:var(--warm);color:#c05621}
.agent-alert-status{display:inline-flex;margin-top:9px;border-radius:999px;padding:3px 8px;background:#f8fafc;border:1px solid #e5e7eb;font-size:10px;font-weight:800;color:#475467;text-transform:uppercase}
.agent-source-grid{gap:12px}
.agent-source{border-radius:18px;border-style:solid;background:linear-gradient(180deg,#ffffff 0%,#f8fbff 100%);box-shadow:0 6px 18px rgba(16,24,40,.04);position:relative;padding:14px 14px 14px 48px}
.agent-source:before{content:attr(data-icon);position:absolute;left:13px;top:14px;width:26px;height:26px;border-radius:10px;display:grid;place-items:center;background:#eef7f4;color:#1f7a35;font-size:14px}
.page-title{font-size:28px;letter-spacing:0;color:#101828}
.page-subtitle{font-size:14px;max-width:860px;color:#667085}
.breadcrumb{background:rgba(255,255,255,.68);display:inline-flex;border:1px solid rgba(16,24,40,.07);border-radius:999px;padding:7px 12px}
.category-section{margin-bottom:34px}
.category-header{position:relative;overflow:hidden;border-radius:18px;padding:14px 18px 14px 52px;background:linear-gradient(100deg,#e8f5e9 0%,#eaf4ff 58%,#fff7ed 100%);box-shadow:0 8px 20px rgba(16,24,40,.05);border-left:0;color:#237132}
.category-header:before{content:"";position:absolute;left:18px;top:50%;width:18px;height:18px;border-radius:8px;background:linear-gradient(135deg,var(--qm),var(--darb));transform:translateY(-50%) rotate(8deg)}
.category-header:after{content:"";position:absolute;left:0;right:0;bottom:0;height:3px;background:linear-gradient(90deg,var(--qm),var(--darb),var(--priv),var(--tech));opacity:.55}
.faq-list{gap:16px}
.faq-card{position:relative;overflow:hidden;border-radius:20px;border:1px solid rgba(16,24,40,.08);padding:18px 20px 16px 20px;background:rgba(255,255,255,.96);box-shadow:var(--card-shadow);transition:transform .18s ease,box-shadow .18s ease,border-color .18s ease}
.faq-card:before{content:"";position:absolute;left:0;top:0;bottom:0;width:6px;background:var(--accent,var(--qm))}
.faq-card:after{content:"";position:absolute;left:6px;right:0;top:0;height:4px;background:linear-gradient(90deg,var(--accent,var(--qm)),rgba(25,118,210,.28),rgba(239,108,0,.22));opacity:.32}
.faq-card:hover{transform:translateY(-2px);border-color:rgba(46,125,50,.25);box-shadow:0 16px 34px rgba(16,24,40,.12)}
.faq-card-top{cursor:pointer;display:flex;justify-content:space-between;align-items:flex-start;gap:14px}
.faq-q{margin:0;color:#111827}
.faq-q-main{display:flex;align-items:flex-start;gap:12px;min-width:0}
.faq-q-icon{flex:0 0 auto;display:grid;place-items:center;width:34px;height:34px;border-radius:14px;background:linear-gradient(135deg,#ffffff,#eef7f4);border:1px solid rgba(46,125,50,.16);box-shadow:0 8px 16px rgba(46,125,50,.08);font-size:16px}
.faq-q-text{display:block;font-weight:800;font-size:16px;line-height:1.5;color:#101828;min-width:0}
.verified-badge{display:inline-flex;vertical-align:middle;margin-left:8px;align-items:center;gap:5px;font-size:10px;background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7;border-radius:999px;padding:2px 8px}
.faq-arrow{flex:0 0 auto;width:28px;height:28px;border-radius:999px;display:grid;place-items:center;background:#f2f4f7;color:#475467;transition:transform .2s ease,background .2s ease}
.faq-a{margin-top:14px;font-size:14.5px;line-height:1.78;color:#344054}
.faq-a h3,.faq-a h4{font-size:14px;margin-top:16px;color:#182230}
.faq-a ul,.faq-a ol{padding-left:24px}
.faq-a li{padding-left:2px}
.faq-a table{border-radius:16px;overflow:hidden;border:1px solid #dbe7de;box-shadow:0 8px 18px rgba(16,24,40,.04)}
.faq-a th{background:#e8f5e9;color:#111827;font-size:12px;text-transform:uppercase;letter-spacing:.02em}
.faq-a td{background:#fff}
.faq-a tr:nth-child(even) td{background:#fbfdfc}
.faq-a .info-box,.faq-a .danger-box,.faq-a .highlight,.faq-a .footer{border-radius:16px;padding:13px 15px;margin:12px 0;box-shadow:0 6px 16px rgba(16,24,40,.035)}
.faq-a .info-box{background:#eef7ff;border:1px solid #b7dcff;color:#1e3a5f}
.faq-a .danger-box{background:#fff0ed;border:1px solid #fecaca;color:#7f1d1d}
.faq-a .highlight{background:#ecfdf3;border:1px solid #bbf7d0;color:#14532d}
.faq-a .footer{background:#f0fdf4;border:1px solid #bbf7d0;color:#14532d}
.faq-source-row{display:flex;flex-wrap:wrap;gap:7px;align-items:center;margin:13px 0 3px 0;font-size:11px;color:#667085}
.faq-source-pill{display:inline-flex;align-items:center;gap:5px;background:#f8fafc;border:1px solid #e5e7eb;border-radius:999px;padding:4px 9px;color:#475467;text-decoration:none}
.faq-source-pill.source{background:#f4fbf6;color:#1f7a35;border-color:#cfead6}.faq-source-pill.reviewed{background:#eef7ff;color:#1565c0;border-color:#bbdefb}.faq-source-pill.owner{background:#fff8e1;color:#7a4f00;border-color:#ffe082}.faq-source-pill.accuracy{background:#e8f5e9;color:#1b5e20;border-color:#a5d6a7}
.faq-meta{border-top:1px solid #edf1f3;margin-top:17px;padding-top:13px}
.faq-tags .tag{box-shadow:0 4px 10px rgba(16,24,40,.04)}
.faq-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.faq-copy-btn{border-radius:14px;padding:9px 17px;box-shadow:0 9px 16px rgba(46,125,50,.16)}
.admin-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.admin-actions .btn{font-size:12px;border-radius:12px}
@media(max-width:1100px){.agent-visual{min-height:270px}.agent-rhythm{grid-template-columns:repeat(3,minmax(0,1fr))}}
@media(max-width:680px){.agent-hero{border-radius:18px;padding:18px}.agent-hero h1{font-size:28px}.agent-visual-stage{min-height:240px}.agent-visual-node{position:relative;left:auto!important;right:auto!important;top:auto!important;bottom:auto!important;margin:10px}.agent-visual-stage svg{display:none}.agent-rhythm{grid-template-columns:1fr}.faq-card{border-radius:16px;padding:16px 15px 14px 17px}.faq-q-text{font-size:15px}.faq-q-icon{width:30px;height:30px}.category-header{padding-left:46px}}
@media(max-width:600px){.sidebar{position:absolute;z-index:50;height:100%;margin-left:0}.sidebar.collapsed{transform:translateX(-100%);margin-left:0}body[dir="rtl"] .sidebar.collapsed{transform:translateX(100%);margin-right:0}.main{width:100vw}.topbar{padding:10px 12px}.search-box{min-width:0}}
@media(prefers-reduced-motion:reduce){.agent-hero:before,.agent-live-dot:before,.agent-eyebrow:before,.agent-route{animation:none!important}}
/* ===== High-visual agent journey ===== */
@keyframes routeDash{to{stroke-dashoffset:-120}}
@keyframes packetRun{0%{offset-distance:0%;opacity:0}8%,90%{opacity:1}100%{offset-distance:100%;opacity:0}}
@keyframes sceneSweep{0%{transform:translateX(-115%)}100%{transform:translateX(115%)}}
@keyframes stepLift{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes meterRise{0%,100%{height:12px}50%{height:36px}}
.agent-visual.agent-wow{position:relative;min-height:460px;padding:18px;border-radius:26px;background:linear-gradient(135deg,#ffffff 0%,#eefaf2 42%,#eef6ff 72%,#fff7ed 100%);overflow:hidden}
.agent-visual.agent-wow:before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.55),transparent);animation:sceneSweep 7s linear infinite;pointer-events:none}
.wow-stage{position:relative;min-height:332px;border-radius:22px;overflow:hidden;border:1px solid rgba(46,125,50,.16);background:linear-gradient(135deg,rgba(255,255,255,.96),rgba(236,253,243,.82))}
.wow-stage:before{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(46,125,50,.08) 1px,transparent 1px),linear-gradient(90deg,rgba(25,118,210,.07) 1px,transparent 1px);background-size:34px 34px;mask-image:linear-gradient(180deg,rgba(0,0,0,.72),rgba(0,0,0,.18));pointer-events:none}
.flow-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}

var FAQ_DATA = [
{q:"How will I be informed that my exemption or grievance request has been approved or rejected?", a:"<p>Through the app or a notification email or SMS will be sent to you once the exemption or grievance request has been <strong>approved</strong> or <strong>rejected</strong>.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Toll Exemptions & Discounts How will I be informed that my exemption or grievance request has been approved ", id:"FAQ-0113", page:"faq-darb-exempt", cat:"DARB — Exemptions", subcat:"Exemptions"},
  {q:"How can I apply for a Darb toll exemption?", a:"<h4>To apply for a Darb toll exemption</h4>\n<ul>\n<li>Open the Darb app on your mobile device</li>\n\n<li>Go to the \"Requests\" section from the main menu</li>\n\n<li>Tap \"Add New Request\"</li>\n\n<li>Select \"Exemption\" as the request type</li>\n\n<li>Choose the applicable exemption category (People of Determination, Senior Citizen, Pensioner, or Low Income)</li>\n\n<li>Upload the required supporting documents</li>\n\n<li>Submit the request</li>\n</ul>\n<p>Processing typically takes 3-5 working days. You will be notified of the outcome via the app and SMS.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Toll Exemptions & Discounts How can I apply for a Darb toll exemption", id:"FAQ-0226", page:"faq-darb-exempt", cat:"DARB — Exemptions", subcat:"Exemptions"},
  {q:"What are the exempted/excluded vehicles from Toll fees?", a:"<h4>Exempted/Excluded Vehicles from Toll Fees</h4>\n<p>These are vehicles that are not subject to toll charges when crossing toll gates. Based on approved regulations, exemptions are categorized as follows:</p>\n<h4>1. Automatic Exemptions (No Request Required)</h4>\n<p>The following vehicles are automatically exempt from toll fees:</p>\n<ul>\n<li>Ambulances, Armed Forces, and Civil Defence vehicles (with official numbers and logos)</li>\n\n<li>Public transport buses licensed in Abu Dhabi</li>\n\n<li>Motorcycles</li>\n\n<li>Authorized public taxis in Abu Dhabi</li>\n\n<li>Authorized school buses</li>\n\n<li>All passenger buses with a capacity of 26 passengers or more (as specified by the licensing authority)</li>\n\n<li>Vehicles with official numbers and logos of Abu Dhabi Police, Ministry of Interior, and other local Emirates Police</li>\n\n<li>Trailer vehicles</li>\n</ul>\n<h4>2. Conditional Exemptions (Exemption Request Required)</h4>\n<h4>A. People of Determination</h4>\n<ul>\n<li>Vehicle owners in this category can apply for an exemption</li>\n\n<li>Proof of belonging to this category is mandatory</li>\n\n<li>The vehicle does not need to be registered directly in the name of the person, provided it is owned by a first- or second-degree relative</li>\n</ul>\n<p>The Required documents</p>\n<p>People of Determination Card issued by the Ministry of Community Development or Zayed Higher Organization</p>\n<p>Proof of kinship (if vehicle is owned by a relative)</p>\n<h4>B. Low-Income Emirati Families</h4>\n<ul>\n<li>One vehicle per eligible family is exempted</li>\n\n<li>Proof from the competent authority (Ministry of Community Development or Abu Dhabi Social Support Authority) is required</li>\n</ul>\n<p>C. Senior Citizens</p>\n<ul>\n<li>Defined as UAE citizens aged 60 years or above</li>\n\n<li>Vehicle must be registered in the name of the senior citizen</li>\n\n<li>No documents required when submitting the application</li>\n</ul>\n<p>D. Retired Citizens</p>\n<p>Proof from the competent authority is required: a letter from the Pension and Retirement Fund.</p>\n<p>Please note</p>\n<ul>\n<li>The exemption for the four conditional categories is limited to one vehicle per person/family</li>\n\n<li>Applications can be submitted via the Darb website (darb.qmobility.ae) or the Darb mobile app</li>\n\n<li>Exemptions can be transferred from one vehicle to another, provided the exemption on the first vehicle is cancelled</li>\n\n<li>Registration in Darb is mandatory for all users, including those eligible for exemptions</li>\n</ul>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Toll Exemptions & Discounts What are the exempted excluded vehicles from Toll fees", id:"FAQ-0108", page:"faq-darb-exempt", cat:"DARB — Exemptions", subcat:"Exemptions"},
  {q:"Which vehicles are exempted/excluded from Toll fees?", a:"<p>Certain vehicles are exempt from Darb toll charges. Some are automatically excluded, while others require you to submit an exemption request.</p>\n\n<h4>Automatically Exempt Vehicles</h4>\n<p>No application needed for the following:</p>\n<ul>\n<li>Ambulances, Armed Forces, and Civil Defence vehicles (with official numbers and logo)</li>\n<li>Public transport buses licensed in the Emirate of Abu Dhabi</li>\n<li>Motorcycles</li>\n<li>Authorized public taxis in Abu Dhabi</li>\n<li>Authorized school buses</li>\n<li>Passenger buses (26+ passengers as specified by the licensing authority)</li>\n<li>Abu Dhabi Police, Ministry of Interior, and other local police vehicles (with official numbers and logo)</li>\n<li>Trailer vehicles</li>\n</ul>\n\n<h4>Exemption by Request</h4>\n<p>The following categories can apply for a toll exemption — limited to <strong>one vehicle per person</strong>:</p>\n<table>\n<tr><th>Category</th><th>Eligibility</th><th>Documents</th></tr>\n<tr><td><strong>People of Determination</strong></td><td>Vehicle owner or a 1st/2nd degree relative of a Person of Determination</td><td>PoD Card (mandatory) + Proof of kinship if vehicle is not in PoD person's name</td></tr>\n<tr><td><strong>Low-Income Emirati Families</strong></td><td>One vehicle per low-income Emirati family (&amp; family members)</td><td>Proof from Ministry of Community Development or Abu Dhabi Social Support Authority (optional)</td></tr>\n<tr><td><strong>Senior Citizens</strong></td><td>UAE citizens aged 60+ years; vehicle must be in their name</td><td>No documents required</td></tr>\n<tr><td><strong>Retired Citizens</strong></td><td>UAE retired citizens</td><td>Letter from the Pension and Retirement Fund</td></tr>\n</table>\n\n<h4>How to Apply</h4>\n<ol>\n<li>Visit <a href=\"https://darb.qmobility.ae\" target=\"_blank\">darb.qmobility.ae</a> or open the <strong>Darb App</strong></li>\n<li>Register or sign in to your account</li>\n<li>Go to <strong>Requests</strong> and select <strong>Exemption</strong></li>\n<li>Choose your exemption category</li>\n<li>Upload the required supporting documents</li>\n<li>Submit the request</li>\n</ol>\n\n<div class=\"info-box\"><strong>Good to know:</strong> You can transfer your exemption from one vehicle to another, but the exemption on the first vehicle must be cancelled first. Registration in Darb is compulsory for all users, including those eligible for exemptions.</div>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Toll Exemptions & Discounts Which vehicles are exempted excluded from Toll fees", id:"FAQ-0146", page:"faq-darb-exempt", cat:"DARB — Exemptions", subcat:"Exemptions"},
  {q:"Can I receive more than one exemption?", a:"<p>Account holders who are classified as People of Determination are entitled to receive an additional exemption if they meet any of the criteria of other categories (such as senior citizens, retirees, low income, or People of Determination).</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Toll Exemptions & Discounts Can I receive more than one exemption", id:"FAQ-0109", page:"faq-darb-exempt", cat:"DARB — Exemptions", subcat:"Exemptions"},
  {q:"Can I receive more than one toll exemption?", a:"<p>Account holders who are classified as <strong>People of Determination</strong> are entitled to receive an <strong>additional exemption</strong> if they meet any of the criteria of other categories, such as:</p>\n<ul>\n<li>Senior Citizens</li>\n<li>Retirees</li>\n<li>Low Income</li>\n</ul>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Toll Exemptions & Discounts Can I receive more than one toll exemption", id:"FAQ-0147", page:"faq-darb-exempt", cat:"DARB — Exemptions", subcat:"Exemptions"},
  {q:"Can I request a toll exemption for a relative?", a:"<p>The account holder can apply for an exemption under the People of Determination category only for <strong>first and second-degree relatives</strong>, provided that proof of kinship is required.</p>\n<table>\n<tr><th>Degree</th><th>Relatives</th></tr>\n<tr><td><strong>First Degree</strong></td><td>Father, Mother, Spouse, Spouse's Father, Spouse's Mother, Children of the Spouse</td></tr>\n<tr><td><strong>Second Degree</strong></td><td>Grandfather, Grandmother, Brother, Sister, Grandchild</td></tr>\n</table>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Toll Exemptions & Discounts Can I request a toll exemption for a relative", id:"FAQ-0152", page:"faq-darb-exempt", cat:"DARB — Exemptions", subcat:"Exemptions"},
  {q:"Can I request an exemption for a relative to benefit from the exemption?", a:"<p>The account holder can apply for an exemption under the People of Determination category only for <strong>first and second-degree relatives</strong>, provided that proof of kinship is required.</p>\n<table>\n<tr><th>Degree</th><th>Relatives</th></tr>\n<tr><td><strong>First Degree</strong></td><td>Father, Mother, Spouse, Spouse's Father, Spouse's Mother, Children of the Spouse</td></tr>\n<tr><td><strong>Second Degree</strong></td><td>Grandfather, Grandmother, Brother, Sister, Grandchild</td></tr>\n</table>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Toll Exemptions & Discounts Can I request an exemption for a relative to benefit from the exemption", id:"FAQ-0114", page:"faq-darb-exempt", cat:"DARB — Exemptions", subcat:"Exemptions"},
  {q:"If I have an exempted vehicle and I sell it or change its plate number, do I need to submit a new exemption request for the new vehicle?", a:"<p>Yes, you must submit a <strong>new exemption request</strong> through the available channels.</p>\n<div class=\"info-box\">Exemptions can be transferred from one vehicle to another, provided that the exemption has been approved for a minimum of <strong>3 months</strong> on the first vehicle, and the vehicle is still under your ownership.</div>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Toll Exemptions & Discounts If I have an exempted vehicle and I sell it or change its plate number, do I nee", id:"FAQ-0112", page:"faq-darb-exempt", cat:"DARB — Exemptions", subcat:"Exemptions"},

  {q:"How can I apply for exemption or grievance request?", a:"<p>Log in to your registered account, then navigate to the <strong>Requests</strong> page to apply for an exemption or submit a complaint (fine, transaction, or technical issue).</p>\n<h4>Exempted Categories</h4>\n<ul>\n<li>Senior Citizens</li>\n<li>People of Determination</li>\n<li>Pensioner Citizens</li>\n<li>Low Income Citizens</li>\n</ul>\n<p>Upload the required documents depending on your chosen exemption/grievance reason.</p>\n<p>Watch the how-to video: <a href=\"https://youtube.com/shorts/wYmbIqqsetQ?si=YXv_EAlPWJ2-37oZ\" target=\"_blank\">How to Apply for an Exemption or Grievance</a></p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Toll Toll Disputes & Grievances How can I apply for exemption or grievance request", id:"FAQ-0110", page:"faq-darb-fines", cat:"DARB — Grievances", subcat:"Toll Grievances"},
  {q:"When should I apply for grievance request?", a:"<p>If you are facing one of the following: Incorrect Fine. Incorrect Toll transaction.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Toll Toll Disputes & Grievances When should I apply for grievance request", id:"FAQ-0111", page:"faq-darb-fines", cat:"DARB — Grievances", subcat:"Toll Grievances"},
  {q:"How will I be informed if I receive a toll gate violation ?", a:"<p>It is the responsibility of the vehicle owner to stay informed and update their contact details within the relevant channels.</p>\n<p>The Darb system will send an <strong>SMS</strong> to the registered phone number notifying the owner of any violation issued under the toll gate law, including details based on the type of violation.</p>\n<p>You can check the complete details of any violation by logging into your <strong>Darb App</strong>.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Toll Toll Violations & Fines How will I be informed if I receive a toll gate violation ", id:"FAQ-0206", page:"faq-darb-fines", cat:"DARB — Fines", subcat:"Toll Violations"},
  {q:"What are the main Darb violations and fines?", a:"", q_ar:"", a_ar:"", kw:"Toll Toll Violations & Fines What are the main Darb violations and fines", id:"FAQ-0227", page:"faq-darb-fines", cat:"DARB — Fines", subcat:"Toll Violations"},

  {q:"How can I contact Darb or Q Mobility support?", a:"<p>You can contact us via:</p>\n<ol>\n<li><strong>Darb / Q Mobility call center:</strong> <strong>800 3009</strong></li>\n<li><strong>Customer support email:</strong> <a href=\"/cdn-cgi/l/email-protection#44273137302b292136370435292b262d282d303d6a2521\"><span class=\"__cf_email__\" data-cfemail=\"1675636562797b73646556677b79747f7a7f626f387773\">[email&#160;protected]</span></a></li>\n<li>The <strong>Darb App</strong> support section</li>\n</ol>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Toll General Information How can I contact Darb or Q Mobility support", id:"FAQ-0228", page:"faq-darb-general", cat:"DARB — General", subcat:"General Info"},
  {q:"How can I contact Q Mobility customer service (Contact Detail)?", a:"<p>You can reach us through:</p>\n<ul>\n<li><strong>Call Center Hotline</strong> — <strong>800 3009</strong></li>\n<li><strong>Email</strong> — <a href=\"/cdn-cgi/l/email-protection#d5b6a0a6a1bab8b0a7a695a4b8bab7bcb9bca1acfbb4b0\"><span class=\"__cf_email__\" data-cfemail=\"c1a2b4b2b5aeaca4b3b281b0acaea3a8ada8b5b8efa0a4\">[email&#160;protected]</span></a></li>\n<li><strong>Abu Dhabi Service Center</strong> — <a href=\"https://maps.app.goo.gl/jB7fhKDoBnwVArUa8\" target=\"_blank\">View on Google Maps</a></li>\n<li><strong>Al Ain Service Center</strong> — <a href=\"https://maps.app.goo.gl/Dvt6DPEocT7ymPDW9\" target=\"_blank\">View on Google Maps</a></li>\n</ul>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Toll General Information How can I contact Q Mobility customer service (Contact Detail)", id:"FAQ-0001", page:"faq-darb-general", cat:"DARB — General", subcat:"General Info"},
  {q:"What is the Q Mobility call center?", a:"<p>The Q Mobility Call Center is available 24/7 and can be reached at <strong>8003009</strong> for any inquiries or assistance.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Toll General Information What is the Q Mobility call center", id:"FAQ-0003", page:"faq-darb-general", cat:"DARB — General", subcat:"General Info"},
  {q:"How does the Darb toll gate system work?", a:"<p>Darb is Abu Dhabi’s electronic toll system. There are no physical toll booth barriers or tags. The system automatically reads your vehicle plate when you pass a toll gate.</p>\n<p>Charges apply only during peak hours on designated days</p>\n<p>Standard Peak Hours.</p>\n<p>✔ 07:00 – 09:00 AM</p>\n<p>✔ 03:00 – 07:00 PM.</p>\n<p>Important note: Sundays &amp; official public holidays: no charges applied.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Toll General Information How does the Darb toll gate system work", id:"FAQ-0085", page:"faq-darb-general", cat:"DARB — General", subcat:"General Info"},
  {q:"How does the toll gate system work?", a:"<p>When passing through Darb toll gates during peak hours, all vehicles are identified through their <strong>plate number</strong>. The data is sent to the Darb system and processed automatically.</p>\n<p>The approved policies and regulations for toll gates are applied accordingly.</p>\n<div class=\"info-box\">There is <strong>no need</strong> to purchase an external tag or apply it to the vehicle windshield.</div>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Toll General Information How does the toll gate system work", id:"FAQ-0128", page:"faq-darb-general", cat:"DARB — General", subcat:"General Info"},
  {q:"What is Darb toll gate?", a:"<p><strong>Darb</strong> is the barrierless road toll system of Abu Dhabi.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Toll General Information What is Darb toll gate", id:"FAQ-0084", page:"faq-darb-general", cat:"DARB — General", subcat:"General Info"},
  {q:"Who is responsible for managing the toll gates?", a:"<p>The Q Mobility manages the toll gate system in Abu Dhabi.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Toll General Information Who is responsible for managing the toll gates", id:"FAQ-0088", page:"faq-darb-general", cat:"DARB — General", subcat:"General Info"},
  {q:"Where are Darb toll gates located?", a:"<p>Darb toll gates are installed on <strong>four major bridges</strong> leading into Abu Dhabi City:</p>\n<table>\n<tr><th>Bridge</th><th>Location</th></tr>\n<tr><td><strong>Sheikh Zayed Bridge</strong></td><td><a href=\"https://maps.app.goo.gl/G4bDp5CeBDbbN7D1A\" target=\"_blank\">View on Google Maps</a></td></tr>\n<tr><td><strong>Sheikh Khalifa bin Zayed Bridge</strong></td><td><a href=\"https://maps.app.goo.gl/q6pPdhg1f37xc85T6\" target=\"_blank\">View on Google Maps</a></td></tr>\n<tr><td><strong>Al Maqtaa Bridge</strong></td><td><a href=\"https://maps.app.goo.gl/2v2UziD3F3ybDN1Q9\" target=\"_blank\">View on Google Maps</a></td></tr>\n<tr><td><strong>Mussafah Bridge</strong></td><td><a href=\"https://maps.app.goo.gl/w7sFG5E2XG8r5Lav7\" target=\"_blank\">View on Google Maps</a></td></tr>\n</table>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Toll General Information Where are Darb toll gates located", id:"FAQ-0086", page:"faq-darb-general", cat:"DARB — General", subcat:"General Info"},
  {q:"What are the peak times during the holy month of Ramadan that are applied to the toll fees?", a:"<p>During the holy month of <strong>Ramadan</strong>, the toll fee of <span class=\"amount\">AED 4</span> per crossing applies during the following peak hours:</p>\n<table>\n<tr><th>Period</th><th>Hours</th><th>Days</th></tr>\n<tr><td>Morning</td><td><strong>8:00 AM – 10:00 AM</strong></td><td>Monday to Saturday</td></tr>\n<tr><td>Evening</td><td><strong>2:00 PM – 6:00 PM</strong></td><td>Monday to Saturday</td></tr>\n</table>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Toll General Information What are the peak times during the holy month of Ramadan that are applied to the", id:"FAQ-0099", page:"faq-darb-general", cat:"DARB — General", subcat:"General Info"},

  {q:"Do I need to create a new account to use the DARB app?", a:"<p>No. All you need to do is log in using your UAE Pass, and any balance linked to your personal profile will appear automatically.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Registration Do I need to create a new account to use the DARB app", id:"FAQ-0321", page:"faq-darb-reg", cat:"DARB — Registration", subcat:"Registration"},
  {q:"Are there any additional fees for using the DARB app?", a:"<p>No, there are no additional fees. The standard applicable fees remain the same.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Registration Are there any additional fees for using the DARB app", id:"FAQ-0323", page:"faq-darb-reg", cat:"DARB — Registration", subcat:"Registration"},
  {q:"Can I top up my balance via the DARB app?", a:"<p>Yes. The \"Darb\" app provides easy and secure options to top up your balance at any time.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Registration Can I top up my balance via the DARB app", id:"FAQ-0322", page:"faq-darb-reg", cat:"DARB — Registration", subcat:"Registration"},
  {q:"Should I register more than one account if I have more than one traffic number in different emirates?", a:"<p>No, once you register using one of your traffic codes, <strong>all vehicles related to you will be retrieved automatically</strong> using the integration with the Unified Traffic System.</p>\n<p>You also have the option to add another traffic code manually using the <strong>\"Add Traffic Code\"</strong> feature from:</p>\n<ul>\n<li>The <strong>Dashboard</strong> screen on the Darb portal</li>\n<li>The <strong>Profile</strong> screen on the Darb Mobile App</li>\n</ul>\n<div class=\"info-box\">You must own the other traffic code to add it to your account.</div>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Toll Registration Should I register more than one account if I have more than one traffic number i", id:"FAQ-0122", page:"faq-darb-reg", cat:"DARB — Registration", subcat:"Registration"},
  {q:"Should I register more than one account if I have multiple traffic number in different emirates?", a:"<p>No, once you register using one of your traffic codes, all vehicles related to you will be retrieved automatically using the integration with the Unified Traffic System. You also have the option to add another traffic code manually from the profile page using the \"Add Traffic Code\" feature, provided you own the other traffic code. The logged in user can add the traffic code from the dashboard screen of Darb portal or from the profile screen of Darb Mobile Application.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Toll Registration Should I register more than one account if I have multiple traffic number in dif", id:"FAQ-0074", page:"faq-darb-reg", cat:"DARB — Registration", subcat:"Registration"},
  {q:"Does the system provide a secondary Authentication mechanism when the user log in into an active account?", a:"<p>Yes, customers can log in securely via <strong>UAE Pass</strong>.</p>\n<p>If you choose to log in with a username and password, you will be requested to authenticate with a <strong>secondary authentication code</strong> via SMS or registered email address.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Toll Registration Does the system provide a secondary Authentication mechanism when the user log i", id:"FAQ-0092", page:"faq-darb-reg", cat:"DARB — Registration", subcat:"Registration"},
  {q:"What should I do if my phone number is not displayed in the contact numbers list when I am trying to register?", a:"<p>You should contact the customer service center (<strong>8003009</strong>) and talk to the system admin to register your contact details.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Toll Registration What should I do if my phone number is not displayed in the contact numbers list", id:"FAQ-0071", page:"faq-darb-reg", cat:"DARB — Registration", subcat:"Registration"},
  {q:"What is the procedure when changing the vehicle's license plate number?", a:"<p>If the vehicle is already registered in the Darb system and the <strong>license plate number is changed</strong> for the same owner, the registration remains valid. The customer must submit a request to re-register.</p>\n<p>However, if the vehicle is <strong>sold or ownership is transferred</strong>, the new owner must re-register the vehicle.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Toll Registration What is the procedure when changing the vehicle's license plate number", id:"FAQ-0078", page:"faq-darb-reg", cat:"DARB — Registration", subcat:"Registration"},
  {q:"How can I close my account?", a:"<p>Log in to your Darb Account. Go to My Profile Screen. Select Settings. Select Close Account. Enter your Bank Account details (IBAN), if there is a balance in the Wallet. Enter the Reason for Closure. Submit Please note that when requesting the closure of an account, all registered vehicles will be changed to unregistered status. Additionally, you will not be able to create a new account until the outstanding amount is refunded to their bank account. The refund process will take up to 45 working days to be completed.</p>\n<ul>\n<li>Log in to your Darb Account</li>\n\n<li>Go to My Profile Screen</li>\n\n<li>Select Settings</li>\n\n<li>Select Close Account</li>\n\n<li>Enter your Bank Account details (IBAN), if there is a balance in the Wallet</li>\n\n<li>Enter the Reason for Closure</li>\n\n<li>Submit</li>\n</ul>\n<p>Please note that when requesting the closure of an account, all registered vehicles will be changed to unregistered status. Additionally, you will not be able to create a new account until the outstanding amount is refunded to their bank account.</p>\n<p>The refund process will take up to 45 working days to be completed.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Toll Registration How can I close my account", id:"FAQ-0083", page:"faq-darb-reg", cat:"DARB — Registration", subcat:"Registration"},
  {q:"How do I update an old Darb account that uses a temporary email (e.g., @itc.toll.migration.ae)?", a:"<p>If your Darb account email appears as <strong>@itc.toll.migration.ae</strong>, it means your profile was migrated from the legacy Darb system and you can update it by contacting our call center.</p>\n<p>Once your email is updated, you can reset your password by following these steps:</p>\n<ol>\n<li>Click <strong>\"Forgot Password\"</strong></li>\n<li>You will receive an OTP on your email — enter it to verify</li>\n<li>You will then receive an OTP on your mobile number to verify your phone number</li>\n<li>You will be prompted to reset your password</li>\n<li>Set a new password of your choice</li>\n</ol>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Toll Registration How do I update an old Darb account that uses a temporary email (e.g., @itc.toll", id:"FAQ-0229", page:"faq-darb-reg", cat:"DARB — Registration", subcat:"Registration"},
  {q:"Can I register a vehicle that I do not own using my individual account or my establishment account in the system?", a:"<p>No, the user can't register a vehicle that he/she does not own using his/her individual account or establishment account since these accounts linked with the traffic codes defined in the account profiles.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Toll Registration Can I register a vehicle that I do not own using my individual account or my est", id:"FAQ-0075", page:"faq-darb-reg", cat:"DARB — Registration", subcat:"Registration"},
  {q:"How can I reset my password?", a:"<p>From the login page:</p>\n<ol>\n<li>Select <strong>\"Forgot Password\"</strong></li>\n<li>Enter your registered email, Emirates ID, or traffic file number</li>\n<li>The system will send you a reset link by <strong>email</strong> and by <strong>SMS</strong> to your registered mobile number</li>\n<li>Follow the link to reset your password</li>\n</ol>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Toll Registration How can I reset my password", id:"FAQ-0079", page:"faq-darb-reg", cat:"DARB — Registration", subcat:"Registration"},
  {q:"Is registration compulsory even if I do not cross the toll gates during peak times?", a:"<p>Customers have the freedom to choose not to register — they simply need to avoid passing through toll gates during peak hours.</p>\n<p>However, if a user crosses Darb toll gates during peak times, they will be given a <strong>10 working-day grace period</strong> to register in the system. Failure to register will result in a violation according to the executive regulations for the toll system in the Emirate of Abu Dhabi.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Toll Registration Is registration compulsory even if I do not cross the toll gates during peak tim", id:"FAQ-0093", page:"faq-darb-reg", cat:"DARB — Registration", subcat:"Registration"},
  {q:"What are the available channels for creating an account or logging into the Darb toll system?", a:"<p>You can access the Darb toll system through:</p>\n<ul>\n<li><strong>Website:</strong> <a href=\"https://darb.qmobility.ae\" target=\"_blank\">darb.qmobility.ae</a> (for establishments)</li>\n<li><strong>Darb App for smartphones</strong> — Available on App Store and Google Play (for individuals)</li>\n</ul>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Toll Registration What are the available channels for creating an account or logging into the Darb", id:"FAQ-0094", page:"faq-darb-reg", cat:"DARB — Registration", subcat:"Registration"},
  {q:"What do I need to register a Darb account?", a:"<h4>Registration Requirements</h4>\n<ul>\n<li>Valid traffic file number (10 digits for Abu Dhabi; 8 digits for some other emirates)</li>\n<li>Emirates ID</li>\n<li>Active email</li>\n<li>Mobile number linked with the traffic file</li>\n</ul>\n<h4>Vehicle Registration</h4>\n<ul>\n<li>New vehicles tied to your traffic file may be auto-added</li>\n<li>If you change plates or sell a vehicle, the system updates automatically or may require re-registration</li>\n</ul>\n<h4>Login Options</h4>\n<p>You can log in using any of the following:</p>\n<ul>\n<li>Emirates ID</li>\n<li>Registered email</li>\n<li>Traffic file number</li>\n</ul>\n<p>Watch the step-by-step registration video: <a href=\"https://youtube.com/shorts/hWjP6DCAdLY?si=2g75K0dJvihk6VcT\" target=\"_blank\">How to Register Your Vehicle</a></p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Toll Registration What do I need to register a Darb account", id:"FAQ-0222", page:"faq-darb-reg", cat:"DARB — Registration", subcat:"Registration"},
  {q:"Can I check that my personal information is updated in the system?", a:"<p>Yes, You can log in by your registered account, then click your name on the top right of the page to navigate to the personal profile page and press \"sync profile information\" to get the updated profile details using the integration with the Federal Authority for Identity and Citizenship.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Toll Registration Can I check that my personal information is updated in the system", id:"FAQ-0080", page:"faq-darb-reg", cat:"DARB — Registration", subcat:"Registration"},
  {q:"How can I add my new phone number to the system?", a:"<p>You can log in by your registered account, then click your name on the top right of the page which you will be navigated to profile page, then click add new number.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Toll Registration How can I add my new phone number to the system", id:"FAQ-0081", page:"faq-darb-reg", cat:"DARB — Registration", subcat:"Registration"},
  {q:"What should I do when I sell my vehicle?", a:"<p>You don’t need to do anything; the system within a few hours will automatically remove the vehicle information from your account and link it with the new owner's account after vehicle ownership is transferred to the new owner through the integration with the Unified Traffic system.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Toll Registration What should I do when I sell my vehicle", id:"FAQ-0204", page:"faq-darb-reg", cat:"DARB — Registration", subcat:"Registration"},
  {q:"How much does it cost to register my vehicles?", a:"<p>The registration fee per vehicle is <span class=\"amount\">AED 100</span>, broken down as follows:</p>\n<table>\n<tr><th>Component</th><th>Amount</th></tr>\n<tr><td>Registration fee</td><td class=\"amount\"><span class=\"amount\">AED 50</span></td></tr>\n<tr><td>Wallet balance (for toll gate crossings)</td><td class=\"amount\"><span class=\"amount\">AED 50</span></td></tr>\n</table>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Toll Registration How much does it cost to register my vehicles", id:"FAQ-0096", page:"faq-darb-reg", cat:"DARB — Registration", subcat:"Registration"},
  {q:"Can I register more than one vehicle that I own at the same time as an individual account?", a:"<p>Yes, the system provides the ability of registering a group of vehicles by selecting the vehicles to be registered from the Vehicles page and pressing the \"Register Vehicles\" button.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Toll Registration Can I register more than one vehicle that I own at the same time as an individua", id:"FAQ-0076", page:"faq-darb-reg", cat:"DARB — Registration", subcat:"Registration"},
  {q:"How can I register my new vehicle in the system if I have a previous account?", a:"<p>The system has been fully connected with the Federal Traffic System (Vehicle Licensing System), and accordingly, in the event that any new vehicle is owned, it will be automatically added to Darb system and you can register the vehicle directly by clicking on \"Register Vehicle\" icon shown on the dashboard of the new vehicle. Note: the traffic file number can be found on the vehicle's registration it contains 10 numbers. For Dubai drivers its 8 numbers.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Toll Registration How can I register my new vehicle in the system if I have a previous account", id:"FAQ-0073", page:"faq-darb-reg", cat:"DARB — Registration", subcat:"Registration"},
